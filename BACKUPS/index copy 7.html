<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SUBLUNA RADIO</title>
  <script>history.scrollRestoration='manual';</script>
  <meta name="theme-color" content="#0a0908">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'Futura FW';
      src: url('FONTS/FUTRFW.TTF') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: '52Sphere';
      src: url('FONTS/52SPHERE.TTF') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'FontAudio';
      src: url('FONTS/fontaudio.woff2') format('woff2'),
           url('FONTS/fontaudio.woff') format('woff'),
           url('FONTS/fontaudio.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Heading Now Book Italic';
      src: url('FONTS/HeadingNowTrial-53BookItalic.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Heading Now Medium';
      src: url('FONTS/HeadingNowTrial-55Medium.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root, [data-theme="light"] {
      --ink: #0a0908;
      --paper: #faf6ee;
      --dust: #6b5c48;
      --faint: #ddd5c6;
      --signal: #9a2015;
      --gold: #5a4318;
      --dim: #3d3530;
      --radio-scrim-strong: rgba(250, 246, 238, .92);
      --radio-scrim-weak: rgba(250, 246, 238, .62);
    }
    [data-theme="dark"] {
      --ink: #f7f2ea;
      --paper: #050404;
      --dust: #c1b8ad;
      --faint: #24211f;
      --signal: #e05540;
      --gold: #d6b56d;
      --dim: #d5cdc1;
      --radio-scrim-strong: rgba(5, 4, 4, .76);
      --radio-scrim-weak: rgba(5, 4, 4, .36);
    }

    :root {
      --topbar-h: 47px;
      --bottombar-h: 142px;
      --col-w: 400px;
      --star-chart-opacity: 1;
    }

    html {
      scroll-behavior: smooth;
      background: #050404;
    }

    body {
      background: transparent;
      color: var(--ink);
      opacity: 0.98;
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 300;
      font-size: 13px;
      line-height: 1.7;
      min-height: 100vh;
      transition: color .3s;
      overflow-x: hidden;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(to bottom, #050404 0%, transparent 50%, transparent 82%, #050404 100%);
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      opacity: .16;
    }

    #starChart-bg {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1.2s ease;
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      mix-blend-mode: screen;
    }

    #bg-moon-wrap {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(70vw, 70vh, 420px);
      height: min(70vw, 70vh, 420px);
      z-index: 1;
      pointer-events: none;
      opacity: 0.85;
    }
    #bg-moon-wrap canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    #starChart-opacity-ctrl {
      position: fixed;
      bottom: calc(var(--bottombar-h, 142px) + 12px);
      right: 10px;
      z-index: 10010;
      display: flex;
      align-items: center;
      gap: .4rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 8px;
      letter-spacing: .12em;
      color: var(--dust);
      opacity: 0;
      transition: opacity .3s;
      pointer-events: none;
    }
    #starChart-opacity-ctrl.visible {
      opacity: 1;
      pointer-events: auto;
    }
    #starChart-opacity-ctrl input[type=range] {
      width: 56px;
      accent-color: var(--signal);
      cursor: pointer;
    }

    #subluna-topbar {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: var(--topbar-h);
      z-index: 10020;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 calc(50% - var(--col-w) / 2 + .75rem);
      background: rgba(5,4,4,0.97);
      border-bottom: transparent;
      visibility: hidden;
    }
    #subluna-topbar.active { visibility: visible; }
    .topbar-wordmark {
      font-family: 'Futura FW', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.13em;
      color: var(--dim);
      line-height: 1;
      font-weight: 600;
      text-align: center;
      flex: 1;
    }
    .topbar-wordmark span { color: var(--signal); }
    .topbar-right { display: flex; align-items: center; gap: .75rem; }

    #subluna-bottombar {
      position: fixed;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%; max-width: 413px;
      z-index: 10020;
      display: flex;
      flex-direction: column;
      padding: .6rem .85rem 0.95rem;
      background: rgba(43, 5, 2, 0.92);
      border-top: var(--signal) 0.5px solid;
      border-left: var(--signal) 0.5px solid;
      border-right: var(--signal) 0.5px solid;
      gap: .45rem;
      visibility: hidden;
      overflow: hidden;
    }
    #subluna-bottombar.active { visibility: visible; }

    .bb-bg-chart {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 600px;
      z-index: -2;
      background-size: cover;
      background-position: center bottom;
      background-repeat: no-repeat;
      pointer-events: none;
      mix-blend-mode: screen;
      opacity: 1;
    }
    .bb-bg-tint {
      position: absolute;
      inset: 0;
      z-index: -1;
      background: rgba(43, 5, 2, 0.45);
      pointer-events: none;
    }

    .bb-station {
      display: flex; align-items: center;
      gap: .35rem; font-size: 10px;
      color: var(--ink); letter-spacing: .04em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .bb-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--signal); flex-shrink: 0;
      animation: livePulse 2.2s ease-in-out infinite;
    }
    @keyframes livePulse { 0%,100%{opacity:1} 50%{opacity:.2} }

    .bb-meta {
      font-size: 9px;
      color: var(--dust); letter-spacing: .04em; opacity: .55;
      display: flex; align-items: center; gap: .3rem;
    }
    .bb-meta .bb-country { color: var(--dust); }
    .bb-meta-sep { opacity: .4; }
    .bb-status-row {
      display: flex;
      align-items: center;
      height: 1.4em;
      margin-top: .15rem;
    }
    .bb-status-inline {
      font-size: 9px;
      color: var(--dust); letter-spacing: .04em; opacity: .8;
    }
    .bb-stamp {
      font-size: 11px;
      color: var(--ink);
      letter-spacing: .04em;
      opacity: 1;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: .25rem;
      margin-bottom: .15rem;
    }
    .bb-stamp-label { color: var(--dust); font-size: 9px; opacity: .6; }
    .bb-stamp-name  { color: var(--ink); font-weight: 400; }
    .bb-stamp-country { color: var(--gold); opacity: 1; }
    .bb-stamp-coords  { color: var(--dust); font-size: 9px; }
    .bb-stamp-sep   { opacity: .75; }
    .bb-scan-locked-msg {
      font-size: 9px;
      color: var(--signal);
      letter-spacing: .04em;
      opacity: .85;
    }
    #rbackbtn.scan-locked,
    #rskipbtn.scan-locked {
      opacity: .25;
      cursor: not-allowed;
    }
    .bb-controls {
      display: flex; align-items: center; gap: .4rem;
    }
    .bb-controls .btn {
      font-size: .72rem; letter-spacing: .12em;
      padding: .5rem .75rem;
      min-height: 38px; min-width: 44px;
    }
    .bb-controls .btn-icon {
      font-family: 'FontAudio';
      font-size: 2.0rem;
      letter-spacing: 0;
      padding: .3rem .5rem;
      line-height: 1;
      border: none;
      background: transparent;
      cursor: pointer;
    }
    .bb-vol {
      display: flex; align-items: center; gap: .3rem;
      font-size: 9px; letter-spacing: .1em; color: var(--dust);
      margin-left: auto;
    }
    .bb-vol input[type=range] { width: 64px; accent-color: var(--signal); height: 18px; cursor: pointer; }
    .bb-controls .btn-icon:hover {
      opacity: 1;
      background: transparent;
      color: var(--signal);
    }
    .bb-header {
      display: flex; align-items: center; justify-content: flex-start;
      gap: .5rem; overflow: hidden;
      cursor: pointer;
      user-select: none;
    }
    .bb-collapse-btn {
      margin-left: auto;
      color: var(--dust); font-size: 13px; line-height: 1;
      padding: 0 .1rem;
      transition: transform .2s ease, color .2s;
      flex-shrink: 0;
      pointer-events: none;
    }
    .bb-header:hover .bb-collapse-btn { color: var(--signal); }
    #subluna-bottombar.collapsed .bb-collapse-btn { transform: rotate(-180deg); }
    .bb-body {
      overflow: hidden;
      transition: max-height .25s ease, opacity .2s ease;
      max-height: 200px;
      opacity: 1;
    }
    #subluna-bottombar.collapsed .bb-body {
      max-height: 0;
      opacity: 0;
      pointer-events: none;
    }
    .bb-header-title {
      font-family: 'Heading Now Book Italic', sans-serif;
      font-size: 18px; letter-spacing: .07em;
      color: var(--signal); white-space: nowrap;
    }

    .btn {
      display: inline-block;
      padding: .55rem .88rem;
      font-family: 'Heading Now Medium', sans-serif;
      font-size: .67rem;
      letter-spacing: .25em;
      cursor: pointer;
      border: .5px solid var(--signal);
      background: transparent;
      color: var(--dust);
      transition: background .15s, color .15s;
    }
    .btn:hover {
      background: var(--signal);
      border-color: var(--signal);
      color: black;
    }
    .btn:disabled {
      opacity: .4;
      cursor: not-allowed;
    }
    .btn-ghost {
      background: transparent;
      color: var(--ink);
      border-color: var(--dust);
    }
    .btn-ghost:hover {
      background: var(--ink);
      color: var(--paper);
      border-color: var(--ink);
    }
    .btn-sm {
      padding: .1rem .4rem;
      font-size: .5rem;
    }

    #rrefresh {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: .20em;
      padding: 0.1rem 0.1rem;
      border: 0px solid var(--dust);
      background: transparent;
      color: var(--dim);
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color .12s, color .12s;
    }
    #rrefresh:hover {
      border-color: var(--gold);
      color: var(--gold);
    }
    #rrefresh:disabled {
      opacity: .3;
      cursor: not-allowed;
    }
    .rspinicon { display: inline-block; }
    .rspinning .rspinicon { animation: rspin .7s linear infinite; }
    @keyframes rspin { to { transform: rotate(360deg); } }

    .rspinsm {
      display: inline-block;
      width: 9px;
      height: 9px;
      border: 1px solid var(--dust);
      border-top-color: var(--ink);
      border-radius: 50%;
      animation: rspin .7s linear infinite;
      vertical-align: middle;
      margin-right: 4px;
    }
  </style>
</head>
<body>

  <div id="subluna-topbar" class="active">
    <div class="topbar-wordmark" id="subluna-secret-btn" style="cursor:default;user-select:none;" aria-label="day title"></div>
    <div class="topbar-right" style="display:none;">
      <button id="rrefresh" onclick="rRefresh()"><span class="rspinicon">↺</span></button>
    </div>
  </div>

  <div id="subluna-bottombar" class="active collapsed">
    <div class="bb-bg-chart" id="bb-bg-chart" aria-hidden="true"></div>
    <div class="bb-bg-tint" aria-hidden="true"></div>
    <div class="bb-header" onclick="bbToggleCollapse()" role="button" aria-label="collapse player">
      <span class="bb-dot"></span>
      <span class="bb-header-title">SUB<span style="color:var(--signal)">L</span>UNA RADIO</span>
      <span class="bb-stamp-sep" id="bb-header-coord-sep" style="font-size:10px;font-family:'52Sphere';color:rgba(219, 200, 73, 0.592);">L</span>
      <span class="bb-stamp-coords" id="bb-header-coords" style="font-size:9px;color:rgba(219, 200, 73, 0.489);letter-spacing:.025em;"></span>
      <span class="bb-collapse-btn" id="bb-collapse-btn">▾</span>
    </div>
    <div class="bb-controls" onclick="event.stopPropagation()">
      <button class="btn btn-ghost btn-sm btn-icon" id="rplaybtn" onclick="rTogglePlay()" disabled style="color:var(--signal)">&#xf169;</button>
      <button class="btn btn-ghost btn-sm btn-icon" id="rbackbtn" onclick="rBack()" disabled>&#xf170;</button>
      <button class="btn btn-ghost btn-sm btn-icon" id="rskipbtn" onclick="rSkip()" disabled>&#xf163;</button>
      <button class="btn btn-ghost btn-sm btn-icon" id="rlocation-refresh" onclick="rRadioRefresh()" title="Follow moon" disabled style="color:var(--dust);opacity:.3;font-family:'52Sphere',monospace;font-size:47px;min-width:unset;padding:0rem 0.8rem;cursor:default;transition:color .2s,opacity .2s;margin-bottom:0.5rem;">R</button>
      <div class="bb-vol">VOL <input type="range" id="rvol" min="0" max="1" step="0.01" value="0.3"></div>
    </div>
    <div class="bb-body" id="bb-body" onmouseenter="bbClearAutoCollapse()" ontouchstart="bbClearAutoCollapse()">
      <div style="height: 0.25rem;"></div>
      <div class="bb-stamp" id="rnow-stamp" style="display:none">
        <span class="bb-stamp-name" id="rstamp-name"></span>
        <span class="bb-stamp-sep">·</span>
        <span class="bb-stamp-country" id="rstamp-country"></span>
      </div>
      <div class="bb-meta">
        <span class="bb-stamp-label">current ➣</span>
        <span class="bb-country" id="rmoon-text"> </span>
        <span class="bb-meta-sep">·</span>
        <span id="rmoon-coords">—</span>
      </div>
      <div class="bb-status-row" style="gap:.5rem">
        <span id="rstatus" class="bb-status-inline"><span class="rspinsm"></span>loading…</span>
        <span id="rscan-locked-msg" class="bb-scan-locked-msg" style="display:none">update location to scan stations</span>
        <button id="rradio-refresh" onclick="rRadioRefresh()" title="Refresh radio" style="
          margin-left:auto;
          background:none; border:none; cursor:pointer;
          font-family:'IBM Plex Mono',monospace;
          font-size:11px; letter-spacing:.08em;
          color:var(--dust); opacity:.55;
          padding:0 .1rem;
          transition:color .2s,opacity .2s;
          white-space:nowrap;
        "></button>
      </div>
    </div>
    <div id="rnowplaying" style="display:none"></div>
    <div id="rmoon-loc" style="display:none"></div>
    <span id="rnowcount" style="display:none"></span>
  </div>

  <div id="starChart-bg" aria-hidden="true"></div>
  <div id="bg-moon-wrap" aria-hidden="true"><canvas id="bg-moon-canvas"></canvas></div>
  <div id="starChart-opacity-ctrl" title="star chart opacity">
    <label for="starChart-opacity-slider">STAR CHART</label>
    <input type="range" id="starChart-opacity-slider" min="0" max="1" step="0.01" value="0.18"
      oninput="starChartSetOpacity(this.value)">
  </div>

  <div style="display:none">
    <div id="footer-coords"></div>
    <div id="footer-station"></div>
  </div>

  <audio id="raud"></audio>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
  // ── Decorative background: photorealistic moon + distant Earth ───────────────
  (function(){
    const wrap = document.getElementById('bg-moon-wrap');
    const cvs = document.getElementById('bg-moon-canvas');
    if (!wrap || !cvs || !window.THREE) return;

    const TEX_BASE = 'https://raw.githubusercontent.com/mrdoob/three.js/r128/examples/textures/planets/';

    const DPR = Math.min(window.devicePixelRatio || 1, 2);

    function getSize(){
      const r = wrap.getBoundingClientRect();
      return r.width > 0 ? Math.round(r.width) : (wrap.offsetWidth || 300);
    }
    let SZ = getSize();
    cvs.width = SZ * DPR;
    cvs.height = SZ * DPR;

    const renderer = new THREE.WebGLRenderer({ canvas: cvs, antialias: true, alpha: true });
    renderer.setSize(SZ * DPR, SZ * DPR, false);
    renderer.setClearColor(0x000000, 0);

    const scene = new THREE.Scene();
    const cam = new THREE.PerspectiveCamera(42, 1, 0.1, 100);
    cam.position.z = 3.0;

    const loader = new THREE.TextureLoader();
    loader.crossOrigin = 'anonymous';

    // ── Moon ───────────────────────────────────────────────────────
    const MOON_R = 1;
    const moon = new THREE.Mesh(
      new THREE.SphereGeometry(MOON_R, 64, 64),
      new THREE.MeshPhongMaterial({ color: 0xffffff, shininess: 2, specular: 0x111111 })
    );
    scene.add(moon);
    moon.rotation.y = Math.PI * 0.5;

    loader.load(TEX_BASE + 'moon_1024.jpg', (tex) => {
      moon.material.map = tex;
      moon.material.bumpMap = tex;     // reuse diffuse as a cheap bump pass for crater depth
      moon.material.bumpScale = 0.012;
      moon.material.needsUpdate = true;
    }, undefined, (err) => console.warn('[bg-moon] failed to load moon texture', err));

    // ── Earth (distant, behind/beside the moon) ─────────────────────
    const EARTH_R = 0.46;
    const earthGroup = new THREE.Group();
    earthGroup.position.set(1.05, 1.05, -1.7);
    scene.add(earthGroup);

    const earth = new THREE.Mesh(
      new THREE.SphereGeometry(EARTH_R, 48, 48),
      new THREE.MeshPhongMaterial({ color: 0xffffff, shininess: 12 })
    );
    earthGroup.add(earth);

    loader.load(TEX_BASE + 'earth_atmos_2048.jpg', (tex) => {
      earth.material.map = tex; earth.material.needsUpdate = true;
    }, undefined, (err) => console.warn('[bg-moon] failed to load earth diffuse', err));
    loader.load(TEX_BASE + 'earth_normal_2048.jpg', (tex) => {
      earth.material.normalMap = tex; earth.material.needsUpdate = true;
    }, undefined, (err) => console.warn('[bg-moon] failed to load earth normal map', err));
    loader.load(TEX_BASE + 'earth_specular_2048.jpg', (tex) => {
      earth.material.specularMap = tex; earth.material.needsUpdate = true;
    }, undefined, (err) => console.warn('[bg-moon] failed to load earth specular map', err));
    loader.load(TEX_BASE + 'earth_lights_2048.png', (tex) => {
      earth.material.emissiveMap = tex;
      earth.material.emissive = new THREE.Color(0xffdd99);
      earth.material.emissiveIntensity = 1.1;
      earth.material.needsUpdate = true;
    }, undefined, (err) => console.warn('[bg-moon] failed to load earth night lights', err));

    // Clouds — separate slightly-larger sphere, independent slow rotation
    const clouds = new THREE.Mesh(
      new THREE.SphereGeometry(EARTH_R * 1.015, 48, 48),
      new THREE.MeshPhongMaterial({ color: 0xffffff, transparent: true, opacity: 0.55, depthWrite: false })
    );
    earthGroup.add(clouds);
    loader.load(TEX_BASE + 'earth_clouds_1024.png', (tex) => {
      clouds.material.map = tex;
      clouds.material.alphaMap = tex;
      clouds.material.needsUpdate = true;
    }, undefined, (err) => console.warn('[bg-moon] failed to load earth clouds', err));

    // Thin atmosphere glow — fresnel rim, additive, back-side only
    const atmosphere = new THREE.Mesh(
      new THREE.SphereGeometry(EARTH_R * 1.09, 48, 48),
      new THREE.ShaderMaterial({
        uniforms: {},
        vertexShader: `
          varying vec3 vNormal;
          void main(){
            vNormal = normalize(normalMatrix * normal);
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          varying vec3 vNormal;
          void main(){
            float intensity = pow(0.65 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 3.0);
            gl_FragColor = vec4(0.45, 0.65, 1.0, 1.0) * intensity;
          }
        `,
        blending: THREE.AdditiveBlending,
        side: THREE.BackSide,
        transparent: true
      })
    );
    earthGroup.add(atmosphere);

    // ── Lighting (shared by moon + Earth, same sun direction) ───────
    scene.add(new THREE.AmbientLight(0x888880, 0.35));
    const sun = new THREE.DirectionalLight(0xfff8f0, 1.1);
    sun.position.set(4, 1.5, 3);
    scene.add(sun);

    // ── Continuous slow auto-rotation ───────────────────────────
    const FPS = 23, FRAME_MS = 1000 / FPS;
    const MOON_SPIN = 0.0005, EARTH_SPIN = 0.0016, CLOUD_SPIN = 0.0022;
    let lastFrame = 0, rafId = null;

    function tick(now){
      rafId = requestAnimationFrame(tick);
      if (now - lastFrame < FRAME_MS) return;
      lastFrame = now;
      moon.rotation.y += MOON_SPIN;
      earth.rotation.y += EARTH_SPIN;
      clouds.rotation.y += CLOUD_SPIN;
      renderer.render(scene, cam);
    }
    rafId = requestAnimationFrame(tick);

    // Keep canvas crisp on resize
    window.addEventListener('resize', () => {
      const newSZ = getSize();
      if (newSZ === SZ || newSZ <= 0) return;
      SZ = newSZ;
      cvs.width = SZ * DPR;
      cvs.height = SZ * DPR;
      renderer.setSize(SZ * DPR, SZ * DPR, false);
    });

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) { if (rafId) cancelAnimationFrame(rafId); rafId = null; }
      else if (!rafId) { lastFrame = 0; rafId = requestAnimationFrame(tick); }
    });
  })();
  </script>

  <script>
  // ── Day title wordmark ────────────────────────────────────────────────────────
  (function(){
    const DAYS=[
      ['S','UNDAY'],['M','ONDAY'],['T','UESDAY'],
      ['W','EDNESDAY'],['T','HURSDAY'],['F','RIDAY'],['S','ATURDAY']
    ];
    function setDayTitle(){
      const el=document.getElementById('subluna-secret-btn');
      if(!el)return;
      const[hi,rest]=DAYS[new Date().getDay()];
      el.innerHTML=`<span>${hi}</span>${rest}`;
    }
    setDayTitle();
    const now=new Date();
    const msUntilMidnight=new Date(now.getFullYear(),now.getMonth(),now.getDate()+1)-now;
    setTimeout(function tick(){setDayTitle();setTimeout(tick,864e5);},msUntilMidnight);
  })();

  // ── Theme + midnight reload ───────────────────────────────────────────────────
  (function(){
    document.documentElement.setAttribute('data-theme', localStorage.getItem('signal-theme') || 'dark');
  })();

  const _appDay = new Date().toDateString();
  (function scheduleMidnightReload(){
    const now = new Date();
    const msUntilMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1) - now;
    setTimeout(() => window.location.reload(), msUntilMidnight);
  })();

  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && new Date().toDateString() !== _appDay) {
      window.location.reload();
    }
  });

  // ── Moon refresh (sublunar point tracking) ────────────────────────────────────
  function moonRefresh(){
    rGetMoon().then(async coords => {
      rMoonCoords = coords;
      window.rMoonCoords = coords;
      const coordEl = document.getElementById('rmoon-coords');
      if (coordEl) coordEl.innerHTML = rFmtCoords(coords.lat, coords.lon);
      const footer = document.getElementById('footer-coords');
      if (footer) footer.innerHTML = `moon: ${rFmtCoords(coords.lat, coords.lon)} (${coords.source})`;
      try {
        const geo = await rReverseGeocode(coords.lat, coords.lon);
        const newZone = geo.isOcean ? rNameOcean(coords.lat, coords.lon) : (geo.countryCode || null);
        if (newZone !== rLastZone) {
          rLockScan();
        }
      } catch (e) {}
    }).catch(() => {});
  }
  </script>

  <script src="radio.js"></script>
  <script src="star-chart.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('subluna-topbar')?.classList.add('active');
    document.getElementById('subluna-bottombar')?.classList.add('active');
    rEnsureRadioInit();
    setInterval(moonRefresh, 12 * 60 * 1000);
    setInterval(() => { if (!rPlaying) rInit(); }, 30 * 60 * 1000);
  });
  </script>
</body>
