<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SUBLUNA RADIO — Cockpit POC</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a0806;
  font-family: 'IBM Plex Mono', monospace;
}

#subluna-bottombar {
  position: relative;
  width: 100%;
}

#bb-cockpit-frame {
  display: block;
  width: 100%;
  pointer-events: none;
  user-select: none;
}

/* shared absolute anchor util */
/* all elements use top/left as CENTER point via transform: translate(-50%,-50%) */
.bb-el {
  position: absolute;
  transform: translate(-50%, -50%);
}

/* ── S LOGO — left bay ── */
/* top:83.9% left:15.3% */
#bb-left-bay {
  top: 82.3%; left: 15.3%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  pointer-events: none;
}
.bb-ring {
  width: 48px; height: 48px;
  border-radius: 50%;
  border: 1.5px solid rgba(224,85,64,0.5);
  background: rgba(224,85,64,0.07);
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.bb-ring::after {
  content: '';
  position: absolute; inset: 4px;
  border-radius: 50%;
  border: 0.5px solid rgba(224,85,64,0.18);
}
.bb-s {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px; color: #e05540;
  line-height: 1; position: relative; z-index: 1;
}
.bb-wordmark {
  font-size: 6px; letter-spacing: 0.2em;
  color: rgba(193,184,173,0.4); text-align: center;
}

/* ── NOW PLAYING — center bay ── */
/* top:81.3% left:49.9% */
#bb-center-bay {
  top: 78.8%; left: 49.9%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  text-align: center;
  width: 160px;
}
.bb-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 15px; letter-spacing: 0.13em;
  color: #e05540; line-height: 1; white-space: nowrap;
}
.bb-station {
  display: flex; align-items: center; gap: 4px;
  font-size: 8px; color: #d6b56d; letter-spacing: 0.03em;
  max-width: 100%; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap;
}
.bb-live-dot {
  width: 4px; height: 4px; border-radius: 50%;
  background: #e05540; flex-shrink: 0;
  animation: pulse 2.2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.15} }
.bb-coords {
  display: flex; align-items: center; gap: 4px;
  font-size: 7.5px; color: rgba(214,181,109,0.5);
}

/* ── PLAY BUTTON ── */
/* top:89.9% left:49.6% */
#rplaybtn {
  top: 87.2%; left: 49.6%;
  width: 42px; height: 42px;
  border-radius: 50%;
  border: 1.5px solid rgba(224,85,64,0.55);
  background: rgba(224,85,64,0.1);
  color: #e05540; font-size: 14px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  padding-left: 2px;
  transition: background .15s, filter .15s;
  -webkit-tap-highlight-color: transparent;
}
#rplaybtn:active, #rplaybtn.playing {
  background: rgba(224,85,64,0.25);
  filter: drop-shadow(0 0 10px rgba(224,85,64,0.8));
}

/* ── BACK BUTTON ── */
/* top:89.9% left:39.5% */
#rbackbtn {
  top: 87.2%; left: 39.2%;
  width: 40px; height: 40px;
  background: none; border: none; cursor: pointer;
  color: rgba(193,184,173,0.55);
  font-size: 11px; letter-spacing: -2px;
  -webkit-tap-highlight-color: transparent;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  transition: color .1s, filter .1s;
}
#rbackbtn:active {
  color: #e05540;
  filter: drop-shadow(0 0 8px rgba(224,85,64,0.9));
}

/* ── SKIP BUTTON ── */
/* top:89.9% left:60.3% */
#rskipbtn {
  top: 87.2%; left: 60.3%;
  width: 40px; height: 40px;
  background: none; border: none; cursor: pointer;
  color: rgba(193,184,173,0.55);
  font-size: 11px; letter-spacing: -2px;
  -webkit-tap-highlight-color: transparent;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  transition: color .1s, filter .1s;
}
#rskipbtn:active {
  color: #e05540;
  filter: drop-shadow(0 0 8px rgba(224,85,64,0.9));
}

/* ── FOLLOW MOON — right circle bay ── */
/* top:82.4% left:84.0% */
#rlocation-refresh {
  top: 80.4%; left: 84.0%;
  width: 58px; height: 58px;
  border-radius: 50%;
  background: none; border: none;
  cursor: default;
  display: flex; align-items: center; justify-content: center;
  opacity: 0.0; /* fully invisible until active — sits over baked circle */
  pointer-events: none;
  transition: opacity .4s, filter .4s;
  -webkit-tap-highlight-color: transparent;
}
#rlocation-refresh.active {
  opacity: 1;
  cursor: pointer;
  pointer-events: auto;
  animation: moonGlow 2.5s ease-in-out infinite;
}
@keyframes moonGlow {
  0%,100% { filter: drop-shadow(0 0 4px rgba(224,85,64,0.4)); }
  50%      { filter: drop-shadow(0 0 14px rgba(224,85,64,1)); }
}
.bb-follow-icon {
  font-size: 20px; color: #e05540;
}

/* ── SIGNAL BARS — animated strength readout under the moon ── */
#bb-signal-overlay {
  top: 90.0%; left: 84.0%;
  display: flex; align-items: flex-end; gap: 2px;
  mix-blend-mode: screen;
  pointer-events: none;
}
.bb-bar {
  width: 4px; border-radius: 1px 1px 0 0;
  background: transparent;
  transition: background .3s, box-shadow .3s;
}
.bb-bar.on {
  background: #e05540;
  box-shadow: 0 0 5px rgba(224,85,64,0.9);
}
.bb-bar:nth-child(1){ height: 4px; }
.bb-bar:nth-child(2){ height: 6px; }
.bb-bar:nth-child(3){ height: 9px; }
.bb-bar:nth-child(4){ height: 12px; }
.bb-bar:nth-child(5){ height: 15px; }
.bb-bar:nth-child(6){ height: 18px; }

/* ── MESSAGES — status / lost signal / follow prompt ── */
#bb-messages {
  top: 94.0%; left: 49.9%;
  width: 220px;
  text-align: center;
  pointer-events: none;
}
#rstatus {
  font-size: 7.5px; letter-spacing: 0.07em;
  color: rgba(193,184,173,0.45);
  display: block;
}
#rscan-locked-msg {
  font-size: 7.5px; letter-spacing: 0.06em;
  color: rgba(224,85,64,0.7);
  display: none;
  margin-top: 2px;
}

/* ── NOW PLAYING ANNOUNCEMENT — scrolling ticker under transport buttons ── */
#bb-announcement {
  top: 91.5%; left: 49.9%;
  width: 190px;
  height: 11px;
  overflow: hidden;
  position: relative;
  pointer-events: none;
}
#bb-announcement::before,
#bb-announcement::after {
  content: '';
  position: absolute;
  top: 0; bottom: 0;
  width: 16px;
  z-index: 2;
  pointer-events: none;
}
#bb-announcement::before {
  left: 0;
  background: linear-gradient(to right, #0a0806, transparent);
}
#bb-announcement::after {
  right: 0;
  background: linear-gradient(to left, #0a0806, transparent);
}
#bb-announcement-text {
  display: inline-block;
  white-space: nowrap;
  font-size: 8px;
  letter-spacing: 0.05em;
  color: #d6b56d;
  animation: announceScroll 12s linear infinite;
  padding-left: 100%;
}
@keyframes announceScroll {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}

/* hidden radio.js hooks */
#rnowplaying, #rmoon-loc, #rnowcount, #rnow-stamp,
#rmoon-text, #rmoon-coords, #rradio-refresh,
#bb-header-coord-sep, #bb-header-coords { display: none !important; }
</style>
</head>
<body>
<div id="subluna-bottombar">

  <img id="bb-cockpit-frame"
       src="/Users/daisyjames/Desktop/SUBLUNA RADIO/IMAGES/cockpit.PNG"
       alt="">

  <!-- S LOGO -->
  <div class="bb-el" id="bb-left-bay">
    <div class="bb-ring"><span class="bb-s">S</span></div>
    
  </div>

  <!-- NOW PLAYING -->
  <div class="bb-el" id="bb-center-bay">
    <div class="bb-title">SUBLUNA RADIO</div>
    <div class="bb-station">
      <span class="bb-live-dot"></span>
      <span id="bb-station-name">Radio Mix FM · Brazil</span>
    </div>
    <div class="bb-coords">
      <span>◐</span>
      <span id="bb-coords-text">8.20°S, 41.45°W</span>
    </div>
  </div>

  <!-- PLAY -->
  <button class="bb-el" id="rplaybtn" onclick="togglePlay()" aria-label="Play/Pause">▶</button>

  <!-- BACK — invisible tap target over baked arrow -->
  <button class="bb-el" id="rbackbtn" onclick="rBack&&rBack()" aria-label="Previous">◀◀</button>

  <!-- SKIP — invisible tap target over baked arrow -->
  <button class="bb-el" id="rskipbtn" onclick="rSkip&&rSkip()" aria-label="Next">▶▶</button>

  <!-- FOLLOW MOON — right circle -->
  <button class="bb-el" id="rlocation-refresh" onclick="rRadioRefresh&&rRadioRefresh()">
    <img class="bb-follow-icon" src="/Users/daisyjames/Desktop/SUBLUNA RADIO/IMAGES/moon.png" width="32" height="32" alt="follow moon">
  </button>

  <!-- SIGNAL BARS -->
  <div class="bb-el" id="bb-signal-overlay">
    <div class="bb-bar on"></div>
    <div class="bb-bar on"></div>
    <div class="bb-bar on"></div>
    <div class="bb-bar on"></div>
    <div class="bb-bar"></div>
    <div class="bb-bar"></div>
  </div>

  <!-- NOW PLAYING ANNOUNCEMENT TICKER -->
  <div class="bb-el" id="bb-announcement">
    <span id="bb-announcement-text">now playing — Radio Mix FM</span>
  </div>

  <!-- MESSAGES -->
  <div class="bb-el" id="bb-messages">
    <span id="rstatus">scanning sublunar frequency…</span>
    <span id="rscan-locked-msg">update location to scan</span>
  </div>

  <!-- radio.js state hooks -->
  <div id="rnowplaying"></div><div id="rmoon-loc"></div>
  <span id="rnowcount"></span>
  <div id="rnow-stamp"><span id="rstamp-name"></span><span id="rstamp-country"></span></div>
  <span id="rmoon-text"></span><span id="rmoon-coords"></span>
  <button id="rradio-refresh"></button>
  <span id="bb-header-coord-sep"></span><span id="bb-header-coords"></span>
</div>

<script>
  let playing = false;
  function togglePlay() {
    playing = !playing;
    const btn = document.getElementById('rplaybtn');
    btn.innerHTML = playing ? '⏸' : '▶';
    btn.style.paddingLeft = playing ? '0' : '2px';
    btn.classList.toggle('playing', playing);
    document.getElementById('rstatus').textContent =
      playing ? 'live · Radio Mix FM' : 'paused';
    setAnnouncement(playing ? 'now playing — Radio Mix FM' : 'paused — tap play to resume');
  }

  // Now-playing announcement ticker
  const announcements = [
    'now playing — Radio Mix FM',
    'next up in 03:12 — unknown track',
    '⟡ broadcasting from 8.20°S, 41.45°W'
  ];
  let annIndex = 0;
  const annText = document.getElementById('bb-announcement-text');
  function rotateAnnouncement() {
    annIndex = (annIndex + 1) % announcements.length;
    // restart animation cleanly
    annText.style.animation = 'none';
    annText.textContent = announcements[annIndex];
    requestAnimationFrame(() => {
      annText.style.animation = '';
    });
  }
  // rotate once the current scroll cycle finishes
  annText.addEventListener('animationiteration', rotateAnnouncement);

  function setAnnouncement(text) {
    annText.textContent = text;
  }

  // Signal animation
  let sig = 4;
  setInterval(() => {
    sig = Math.max(1, Math.min(6, sig + (Math.random() > .5 ? 1 : -1)));
    document.querySelectorAll('.bb-bar').forEach((b, i) => b.classList.toggle('on', i < sig));
  }, 1400);

  // Simulate follow-moon trigger after 4s
  setTimeout(() => {
    document.getElementById('rlocation-refresh').classList.add('active');
    document.getElementById('rstatus').textContent = '⟡ moon has moved — follow?';
  }, 4000);
</script>
</body>
</html>
