    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root, [data-theme="light"] {
      --ink: #0a0908;
      --paper: #faf6ee;
      --dust: #6b5c48;
      --faint: #ddd5c6;
      --signal: #9a2015;
      --gold: #5a4318;
      --dim: #3d3530;
      --radio-scrim-strong: rgba(250, 246, 238, .92);
      --radio-scrim-weak: rgba(250, 246, 238, .62);
    }
    [data-theme="dark"] {
      --ink: #f7f2ea;
      --paper: #050404;
      --dust: #c1b8ad;
      --faint: #24211f;
      --signal: #e05540;
      --gold: #d6b56d;
      --dim: #d5cdc1;
      --radio-scrim-strong: rgba(5, 4, 4, .76);
      --radio-scrim-weak: rgba(5, 4, 4, .36);
    }

    :root {
      --topbar-h: 47px;
      --bottombar-h: 142px;
      --col-w: 400px;
      --star-chart-opacity: 1;
      --sidebar-w: 280px;
    }

    html {
      scroll-behavior: smooth;
      background: #050404;
    }

    body {
      background: transparent;
      color: var(--ink);
      opacity: 0.98;
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 300;
      font-size: 13px;
      line-height: 1.7;
      min-height: 100vh;
      transition: color .3s;
      overflow-x: hidden;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(to bottom, #050404 0%, transparent 50%, transparent 82%, #050404 100%);
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      opacity: .16;
    }

    #starChart-bg {
      display: none !important;
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1.2s ease;
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      mix-blend-mode: screen;
    }

    #bg-moon-wrap {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(70vw, 70vh, 420px);
      height: min(70vw, 70vh, 420px);
      z-index: 2;
      pointer-events: none;
      opacity: 0.9;
    }
    #bg-moon-wrap canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    #bg-stars-canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
      pointer-events: auto;
      cursor: default;
    }

    #starChart-opacity-ctrl {
      display: none !important;
      position: fixed;
      bottom: calc(var(--bottombar-h, 142px) + 12px);
      right: 10px;
      z-index: 10010;
      align-items: center;
      gap: .4rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 8px;
      letter-spacing: .12em;
      color: var(--dust);
      opacity: 0;
      transition: opacity .3s;
      pointer-events: none;
    }
    #starChart-opacity-ctrl.visible {
      opacity: 1;
      pointer-events: auto;
    }
    #starChart-opacity-ctrl input[type=range] {
      width: 56px;
      accent-color: var(--signal);
      cursor: pointer;
    }

    #subluna-topbar {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: var(--topbar-h);
      z-index: 10020;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 calc(50% - var(--col-w) / 2 + .75rem);
      background: rgba(5,4,4,0.97);
      border-bottom: transparent;
      visibility: hidden;
    }
    #subluna-topbar.active { visibility: visible; }
    .topbar-wordmark {
      font-family: 'X-Scale', sans-serif;
      font-size: 1.75rem;
      letter-spacing: 0.13em;
      color: var(--dim);
      line-height: 1;
      font-weight: normal;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: auto;
      white-space: nowrap;
      opacity: .85;
    }
    .topbar-wordmark span { color: var(--signal); }
    .topbar-left { display: flex; align-items: center; gap: .75rem; position: relative; z-index: 1; margin-right: auto; }
    .topbar-right { display: flex; align-items: center; gap: .75rem; }
    #asteroid-hit-counter {
      display: flex;
      align-items: center;
      gap: .32rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 8px;
      letter-spacing: .16em;
      color: var(--dust);
      text-transform: uppercase;
      opacity: 1;
      white-space: nowrap;
      user-select: none;
    }
    #asteroid-hit-counter .ahc-icon { width: 11px; height: 11px; object-fit: contain; opacity: 1; flex-shrink: 0; }
    #asteroid-hit-counter .ahc-count {
      color: var(--dust);
      font-variant-numeric: tabular-nums;
      transition: color .15s, transform .15s;
    }
    #asteroid-hit-counter.ahc-pulse .ahc-count {
      color: var(--signal);
      transform: scale(1.18);
    }
    #subluna-logout-btn {
      background: transparent;
      border: .5px solid rgba(193,184,173,0.2);
      color: var(--dust);
      cursor: pointer;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 8px;
      letter-spacing: .16em;
      padding: .22rem .42rem;
      text-transform: uppercase;
      transition: border-color .15s, color .15s, opacity .15s;
      opacity: .58;
    }
    #subluna-logout-btn:hover {
      border-color: rgba(224,85,64,.55);
      color: var(--signal);
      opacity: 1;
    }

    #subluna-bottombar {
      position: fixed;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%; max-width: 413px;
      height: auto;
      z-index: 10020;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      /* 9-slice cockpit frame: border-image-slice values are pixel offsets
         into cockpit-border.png (1177x607 source) marking where its window
         cutout starts/ends (top 114, right 57, bottom 113, left 87). Using
         border-image (not a stretched background-image) means the bezel
         keeps a FIXED thickness and its corners stay unwarped no matter how
         tall the inner screen needs to grow — only the straight mid-edges
         stretch, never the corner bevels. */
      border-style: solid;
      border-width: 40px 20px 40px 31px;
      border-image-source: url('IMAGES/cockpit-border.png');
      border-image-slice: 114 57 113 87;
      border-image-width: 40px 20px 40px 31px;
      border-image-repeat: stretch;
      background: rgba(8,6,5,0.94);
      background-clip: padding-box;
      /* Inner screen padding, on top of the border, so text doesn't touch
         the bezel's inner lip. */
      padding: .35rem .6rem .55rem;
      gap: .3rem;
      visibility: hidden;
      overflow: hidden;
    }
    #subluna-bottombar.active { visibility: visible; }
    /* Opaque backing behind the frame + screen, bled 5px past the border's
       own edges. cockpit-border.png has soft/antialiased pixels along the
       brushed-metal texture (not fully opaque everywhere); without a solid
       layer directly behind it, the page's starfield/chart background
       (both position:fixed, full-viewport, z-index 0-1) shows through both
       the bezel's soft edges and the screen. This sits in this element's
       own stacking context (z-index:10020 already isolates it) so it only
       ever shows page background through genuinely transparent PNG pixels,
       never anything brighter. */
    #subluna-bottombar::before {
      content: '';
      position: absolute;
      inset: -5px;
      background: #040404;
      z-index: -3;
      border-radius: 2px;
    }
    /* Player is now a fixed cockpit screen — collapse/expand is disabled.
       radio.js may still toggle the .collapsed class; these overrides make
       sure it has no visual effect so the screen stays static. */
    #subluna-bottombar.collapsed { height: auto; padding: .35rem .6rem .55rem; }
    #subluna-bottombar.collapsed .bb-body { max-height: none; opacity: 1; pointer-events: auto; }

    /* ── Subscreen toggle arrow ───────────────────────────────────────── */
    /* Small centered tab sitting right at the seam where the subscreen's
       bottom edge meets the bottombar. Always visible (whether the
       subscreen is open or closed) as a prompt to click; the arrow flips
       to point the opposite direction once the subscreen is expanded. */
    #subscreen-toggle {
      position: fixed;
      top: var(--topbar-h);
      left: 50%;
      transform: translateX(-50%);
      z-index: 10021; /* above topbar/bottombar (10020) and sidebar (10015) */
      width: 34px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(152, 149, 149, 0.95);
      border: .5px solid var(--faint);
      border-top: none;
      border-radius: 0 0 6px 6px;
      color: rgba(43, 5, 2, 0.75);
      font-size: 11px;
      line-height: 1;
      cursor: pointer;
      user-select: none;
      visibility: hidden;
      transition: color .15s, border-color .15s;
    }
    #subscreen-toggle.active { visibility: visible; }
    #subscreen-toggle:hover {
      color: var(--signal);
      border-color: rgba(224,85,64,.4);
    }
    #subscreen-toggle .subscreen-toggle-arrow {
      display: inline-block;
      transition: transform .3s cubic-bezier(.4,0,.2,1);
    }
    /* Closed: prompt points down (pull the subscreen down).
       Open: arrow inverts to point up (collapse it back). */
    #subscreen-toggle.subscreen-open .subscreen-toggle-arrow {
      transform: rotate(180deg);
    }

      cursor: pointer;

    /* ── Cockpit surround background ─────────────────────────────────────
       Separate fixed element (not ::after) so it isn't clipped by the
       bottombar's overflow:hidden. Sits at z-index 10019, one below the
       bottombar (10020), above everything else.

       Five dials — change only these to reposition/resize:
         --cockpit-bg-scale   : width (100vw = full viewport width)
         --cockpit-bg-x       : horizontal nudge in px (0 = centred)
         --cockpit-bg-y       : vertical nudge in px (negative = shift up)
         --cockpit-bg-opacity : 0–1 fade
         --cockpit-bg-bleed   : how many px the image overflows past each
                                edge of the viewport — hides any transparent
                                pixels at the PNG corners so they're never
                                visible. Increase if corners still show.
    */
    :root {
      --cockpit-bg-scale:   100vw;
      --cockpit-bg-x:       0px;
      --cockpit-bg-y:       -26px;
      --cockpit-bg-opacity: 1;
      --cockpit-bg-bleed:   40px;
    }
    #cockpit-surround {
      position: fixed;
      /* Bleed below and to the sides so transparent PNG edges go offscreen */
      bottom: calc(-1 * var(--cockpit-bg-bleed));
      left: 50%;
      width: calc(var(--cockpit-bg-scale) + 2 * var(--cockpit-bg-bleed));
      /* aspect ratio of cockpit-border-2.PNG: 2048 × 594 */
      aspect-ratio: 2048 / 594;
      transform: translateX(calc(-50% + var(--cockpit-bg-x))) translateY(var(--cockpit-bg-y));
      background-image: url('IMAGES/cockpit-border-2.png');
      background-size: 100% 100%;
      background-repeat: no-repeat;
      opacity: var(--cockpit-bg-opacity);
      pointer-events: none;
      z-index: 10019;
    }

    /* ── Left sidebar ─────────────────────────────────────────────────── */
    #subluna-sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: calc(100vh - var(--bottombar-h));
      z-index: 10015; /* above bg, below topbar (10020) */
      display: flex;
      flex-direction: column;
      background: transparent;
      transform: translateY(-100%);
      transition: transform .3s cubic-bezier(.4, 0, .2, 1);
      pointer-events: none;
    }
    #subluna-sidebar.open {
      transform: translateY(0);
      pointer-events: auto;
    }

    /* The actual panel content area */
    .sidebar-panel {
      flex: 1;
      height: 100%;
      position: relative;
      background: rgba(5, 4, 4, 0.495);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* sidebar-tab removed — sidebar opens/closes via topbar click */

    /* Star chart bg inside sidebar */
    .sidebar-bg-chart {
      position: absolute;
      inset: 0;
      z-index: 0;
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      pointer-events: none;
      mix-blend-mode: screen;
      opacity: 0;
      transition: opacity .8s ease;
    }
    .sidebar-bg-chart.visible {
      opacity: 0.5;
    }

    /* Sidebar interior */
    .sidebar-inner {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      /* Topbar stays fixed at the top (it's just the click target that
         toggles the subscreen open/closed), so reserve its height here
         to keep content clear of it. */
      padding: calc(var(--topbar-h) + 1.25rem) 1rem 1.25rem;
      scrollbar-width: thin;
      scrollbar-color: var(--faint) transparent;
      position: relative;
      z-index: 1;
    }
    .sidebar-inner::-webkit-scrollbar { width: 4px; }
    .sidebar-inner::-webkit-scrollbar-track { background: transparent; }
    .sidebar-inner::-webkit-scrollbar-thumb { background: var(--faint); border-radius: 2px; }


    /* Day title inside sidebar */
    .sidebar-day-title {
      font-family: 'Futura FW', sans-serif;
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: 0.13em;
      color: var(--dim);
      line-height: 0;
      margin-bottom: 0rem;
      padding-bottom: 1rem;
      border-bottom: 0px solid var(--faint);

    /* ── 5-day forecast widget ───────────────────────────────────────── */

    /* ── Moon widget ─────────────────────────────────────────────────── */

    /* ── Weather widget ───────────────────────────────────────────────── */

    #wx-city-input {

    #wx-geolocate-btn {

      color: var(--dust);

      border: none;

    /* Hourly strip */
    #wx-hourly {
      display: flex;

      padding-bottom: .3rem;

    }

    /* ── Horoscope shell (hidden — data feeds scope panel) ────────── */
    #horo-section {
      display: none;
    }
    .horo-section-label {
      font-size: 8px;
      letter-spacing: .22em;
      color: var(--dust);
      text-transform: uppercase;
      margin-bottom: .6rem;
      opacity: .7;
    }
    #horo-sign-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: .85rem;
      letter-spacing: .18em;
      color: var(--gold);
      margin-bottom: .5rem;
    }
    #horo-text {
      font-size: 11px;
      line-height: 1.85;
      color: var(--dust);
    }

    .wx-hr {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .15rem;
      min-width: 38px;
      flex-shrink: 0;
    }
    .wx-hr-time { font-size: 8px; color: var(--dust); opacity: .7; letter-spacing: .03em; }
    .wx-hr-icon { font-size: 1rem; font-family: 'WeatherSymbols', sans-serif; }
    .wx-hr-temp { font-size: 9px; color: var(--ink); letter-spacing: .03em; }

    /* ── Intro login gate ───────────────────────────────────────────────── */
    #intro-overlay {
      position: fixed;
      inset: 0;
      z-index: 10050;
      pointer-events: auto; /* block all clicks from reaching sidebar underneath */
    }
    #intro-overlay[hidden] { display: none; }
    #login-gate {
      position: fixed;
      inset: 0;
      background: rgba(5,4,4,0.72);
      z-index: 1;
      pointer-events: auto; /* explicitly capture backdrop clicks */
    }
    #login-card {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: calc(100% - 3rem);
      max-width: 370px;
      z-index: 2;
      text-align: center;
      font-family: 'IBM Plex Mono', monospace;
    }
    #login-wordmark {
      font-family: 'Futura FW', sans-serif;
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: .25em;
      color: #c1b8ad;
      margin-bottom: 1.35rem;
    }
    #login-wordmark span { color: #e05540; }
    #intro-login-eyebrow {
      color: #e05540;
      font-size: 10px;
      letter-spacing: .18em;
      margin-bottom: 1.1rem;
      text-transform: uppercase;
    }
    .intro-form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .6rem .85rem;
      margin-bottom: .9rem;
      text-align: left;
    }
    .intro-form-grid .full { grid-column: 1 / -1; }
    .intro-form-grid label {
      display: block;
      margin-bottom: .2rem;
      color: rgba(193,184,173,0.75);
      font-size: 7.5px;
      letter-spacing: .2em;
      text-transform: uppercase;
    }
    .intro-form-grid input {
      width: 100%;
      padding: .25rem 0;
      border: none;
      border-bottom: .5px solid rgba(193,184,173,0.22);
      background: transparent;
      color: rgba(247,242,234,0.95);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11.5px;
      font-weight: 300;
      outline: none;
      -webkit-appearance: none;
      transition: border-bottom-color .2s;
    }
    /* iOS Safari auto-zooms the page when a focused input's font-size is
       under 16px. Bump it up just on small/mobile screens so typing in
       the login form doesn't trigger that zoom — desktop keeps the
       smaller, more intentional 11.5px size. */
    @media (max-width: 600px) {
      .intro-form-grid input { font-size: 16px; }
    }
    .intro-form-grid input::placeholder {
      color: rgba(193,184,173,0.35);
      font-style: italic;
    }
    .intro-form-grid input:focus { border-bottom-color: rgba(224,85,64,0.5); }
    .intro-time-row {
      display: flex;
      align-items: center;
      gap: .25rem;
      border-bottom: .5px solid rgba(193,184,173,0.22);
    }
    .intro-time-row input { border-bottom: none; flex: 1; }
    #intro-ampm-toggle,
    #intro-wx-geolocate-btn {
      background: transparent;
      border: none;
      color: rgba(193,184,173,0.75);
      cursor: pointer;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: .12em;
      padding: .25rem .1rem;
      transition: color .15s;
    }
    #intro-wx-geolocate-btn {
      font-size: 14px;
      line-height: 1;
      padding: .2rem .05rem;
    }
    #intro-ampm-toggle:hover,
    #intro-wx-geolocate-btn:hover { color: #e05540; }
    .intro-city-wrap,
    .intro-location-wrap { position: relative; }
    .intro-location-row {
      display: flex;
      align-items: center;
      gap: .35rem;
    }
    .intro-location-row input { flex: 1; }
    #intro-city-suggestions,
    #intro-wx-suggestions {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      z-index: 10052;
      display: none;
      max-height: 142px;
      overflow-y: auto;
      border: 1px solid rgba(193,184,173,0.2);
      background: #0e0b0a;
      font-size: 10px;
    }
    .intro-suggestion {
      padding: .45rem .55rem;
      color: rgba(193,184,173,0.78);
      cursor: pointer;
      border-bottom: .5px solid rgba(193,184,173,0.12);
      letter-spacing: .03em;
    }
    .intro-suggestion:last-child { border-bottom: none; }
    .intro-suggestion:hover {
      background: rgba(224,85,64,.12);
      color: rgba(247,242,234,0.96);
    }
    .intro-actions {
      display: flex;
      align-items: stretch;
      gap: .55rem;
    }
    #intro-load-recent-btn,
    #tune-in-btn {
      cursor: pointer;
      font-family: 'Futura FW', sans-serif;
      transition: background .15s, border-color .15s, color .15s, opacity .15s;
    }
    #intro-load-recent-btn {
      flex-shrink: 0;
      padding: .7rem 1.05rem;
      border: .5px solid rgba(193,184,173,0.2);
      background: transparent;
      color: rgba(193,184,173,0.7);
      font-size: .65rem;
      letter-spacing: .2em;
    }
    #intro-load-recent-btn:hover {
      border-color: rgba(193,184,173,0.5);
      color: rgba(247,242,234,0.9);
    }
    #tune-in-btn {
      flex: 1;
      padding: .7rem 0;
      border: none;

      color: #fff;

    }

    #intro-chart-status {
      min-height: 1.2em;

      0% { opacity: 1; }

    /* ── Navigation widget ───────────────────────────────────────────── */

    .nav-readout {

    .nav-row {

    .nav-subluna-text {

  <div id="intro-overlay" hidden>
    <div id="login-gate"></div>
    <div id="login-card">
      <div id="login-wordmark">SUB<span>L</span>UNA</div>
      <div id="intro-login-eyebrow">— login —</div>
      <div class="intro-form-grid">
        <div class="full">
          <label>NAME <span style="font-size:6.5px;letter-spacing:.04em;opacity:.6;text-transform:none">(optional)</span></label>

          <input type="hidden" id="intro-birth-lon">

              <input type="text" id="intro-wx-location" placeholder="city or place for weather" autocomplete="off">
              <button type="button" id="intro-wx-geolocate-btn" title="use my location">◎</button>
            </div>
            <div id="intro-wx-suggestions"></div>

  <audio id="raud"></audio>
  <script>
  // Force full volume on the radio audio element. The on-screen volume
  // slider is hidden (see #rvol above) — users control volume via their
  // device's hardware controls instead. This runs after radio.js loads,
  // and also reapplies on every 'play' event in case radio.js or a saved
  // setting tries to reset it.
  (function () {
    const raud = document.getElementById('raud');
    if (!raud) return;
    raud.volume = 1;
    raud.addEventListener('play', () => { raud.volume = 1; });
  })();
  </script>

  <script>
  const SUBLUNA_USER_KEY = 'subluna_user';
  const WX_STORAGE_KEY = 'signal_wx_location_v2';
  let _sublunaBooted = false;
  let _moonInterval = null;
  let _radioInterval = null;
  let _introCityTimer = null;
  let _introWxTimer = null;

  function readSublunaUser() {
    try { return JSON.parse(localStorage.getItem(SUBLUNA_USER_KEY) || 'null'); }
    catch(_) { return null; }
  }

  function hasValidSublunaUser(data) {
    return !!(data && data.birth && data.birth.date && data.birth.time && data.birth.city && data.weather && data.weather.name);
  }

  // ── Asteroid hit counter ───────────────────────────────────────────────────
  // Stored as a field on the subluna_user object itself, so it lives alongside
  // the account's login data: it travels with logout/backup/restore and reloads
  // automatically whenever the same account data is loaded.
  function renderAsteroidHits(n) {
    const el = document.getElementById('asteroid-hit-count');
    if (el) el.textContent = String(n);
  }

  function getAsteroidHits() {
    const user = readSublunaUser();
    return (user && Number.isFinite(user.hits)) ? user.hits : 0;
  }

  function bumpAsteroidHits() {
    const user = readSublunaUser();
    if (!user) return; // no account loaded yet — nothing to attach the count to
    user.hits = (Number.isFinite(user.hits) ? user.hits : 0) + 1;
    localStorage.setItem(SUBLUNA_USER_KEY, JSON.stringify(user));
    renderAsteroidHits(user.hits);
    const badge = document.getElementById('asteroid-hit-counter');
    if (badge) {
      badge.classList.remove('ahc-pulse');
      void badge.offsetWidth; // restart animation
      badge.classList.add('ahc-pulse');
      clearTimeout(badge._ahcTimer);
      badge._ahcTimer = setTimeout(() => badge.classList.remove('ahc-pulse'), 220);
    }
  }

  function introSetStatus(msg) {
    const el = document.getElementById('intro-chart-status');
    if (el) el.textContent = msg || '';
  }

  function introFormatPlace(p) {
    const a = p.address || {};
    const city = a.city || a.town || a.village || a.hamlet || a.county || p.display_name || '';
    const region = a.state || a.region || '';
    const country = a.country || '';
    return [city, region, country].filter(Boolean).filter((v, i, arr) => arr.indexOf(v) === i).join(', ');
  }

  function introSetAmpm(value) {
    const btn = document.getElementById('intro-ampm-toggle');
    if (!btn) return;
    btn.textContent = value === 'PM' ? 'PM' : 'AM';
    btn.style.color = btn.textContent === 'PM' ? 'rgba(224,85,64,0.85)' : 'rgba(193,184,173,0.6)';
  }

  function toggleAmPm() {
    const btn = document.getElementById('intro-ampm-toggle');
    introSetAmpm(btn && btn.textContent.trim() === 'AM' ? 'PM' : 'AM');
  }

  function maskBirthDate(inp) {
    let v = inp.value.replace(/\D/g, '').slice(0, 8);
    inp.value = v.length <= 2 ? v : v.length <= 4 ? v.slice(0,2) + '/' + v.slice(2) : v.slice(0,2) + '/' + v.slice(2,4) + '/' + v.slice(4);
  }

  function maskBirthTime(inp) {
    let v = inp.value.replace(/\D/g, '').slice(0, 4);
    inp.value = v.length <= 2 ? v : v.slice(0,2) + ':' + v.slice(2);
  }

  function fillIntroUser(data) {
    if (!data) return;
    const set = (id, value) => { const el = document.getElementById(id); if (el) el.value = value || ''; };
    set('intro-birth-name', data.name);
    set('intro-birth-date', data.birth?.date);
    set('intro-birth-time', data.birth?.time);
    set('intro-birth-city', data.birth?.city);
    set('intro-birth-lat', data.birth?.lat);
    set('intro-birth-lon', data.birth?.lon);
    set('intro-wx-location', data.weather?.name);
    set('intro-wx-lat', data.weather?.lat);
    set('intro-wx-lon', data.weather?.lon);
    introSetAmpm(data.birth?.ampm || 'AM');
  }

  function loadRecentUser() {
    const data = readSublunaUser() || (() => {
      try { return JSON.parse(localStorage.getItem(SUBLUNA_USER_KEY + '_backup') || 'null'); } catch(_) { return null; }
    })();
    fillIntroUser(data);
    introSetStatus('');
    const btn = document.getElementById('intro-load-recent-btn');
    if (btn) btn.style.display = 'none';
  }

  function introRenderSuggestions(box, data, onPick) {
    if (!box) return;
    box.innerHTML = '';
    data.forEach(p => {
      const div = document.createElement('div');
      div.className = 'intro-suggestion';
      div.textContent = introFormatPlace(p);
      div.addEventListener('click', () => onPick(p));
      box.appendChild(div);
    });
    box.style.display = data.length ? 'block' : 'none';
  }

  async function introSearchPlace(query, limit) {
    const r = await fetch('https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=' + limit + '&q=' + encodeURIComponent(query), { headers: { 'Accept-Language': 'en' } });
    return r.ok ? r.json() : [];
  }

  async function introCityInput(val) {
    clearTimeout(_introCityTimer);
    const box = document.getElementById('intro-city-suggestions');
    if (!box) return;
    if (val.trim().length < 3) { box.style.display = 'none'; return; }
    _introCityTimer = setTimeout(async () => {
      try {
        const data = await introSearchPlace(val.trim(), 5);
        introRenderSuggestions(box, data, p => {
          document.getElementById('intro-birth-city').value = introFormatPlace(p);
          document.getElementById('intro-birth-lat').value = parseFloat(p.lat).toFixed(4);
          document.getElementById('intro-birth-lon').value = parseFloat(p.lon).toFixed(4);
          box.style.display = 'none';
        });
      } catch(_) { box.style.display = 'none'; }
    }, 400);
  }

  async function introWxInput(val) {
    clearTimeout(_introWxTimer);
    const box = document.getElementById('intro-wx-suggestions');
    if (!box) return;
    if (val.trim().length < 2) { box.style.display = 'none'; return; }
    _introWxTimer = setTimeout(async () => {
      try {
        const data = await introSearchPlace(val.trim(), 5);
        introRenderSuggestions(box, data, p => {
          document.getElementById('intro-wx-location').value = introFormatPlace(p);
          document.getElementById('intro-wx-lat').value = parseFloat(p.lat);
          document.getElementById('intro-wx-lon').value = parseFloat(p.lon);
          box.style.display = 'none';
        });
      } catch(_) { box.style.display = 'none'; }
    }, 320);
  }

  async function introResolveTypedPlace(inputId, latId, lonId) {
    const input = document.getElementById(inputId);
    const lat = document.getElementById(latId);
    const lon = document.getElementById(lonId);
    if (!input || !lat || !lon || !input.value.trim() || (lat.value && lon.value)) return;
    try {
      const data = await introSearchPlace(input.value.trim(), 1);
      if (!data.length) return;
      input.value = introFormatPlace(data[0]);
      lat.value = parseFloat(data[0].lat);
      lon.value = parseFloat(data[0].lon);
    } catch(_) {}
  }

  function introWxGeolocate() {
    if (!navigator.geolocation) { introSetStatus('geolocation unavailable'); return; }
    introSetStatus('locating...');
    navigator.geolocation.getCurrentPosition(async pos => {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;
      try {
        const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`, { headers: { 'Accept-Language': 'en' } });
        const d = await r.json();
        const name = introFormatPlace(d) || 'your location';
        document.getElementById('intro-wx-location').value = name;
        document.getElementById('intro-wx-lat').value = lat;
        document.getElementById('intro-wx-lon').value = lon;
        introSetStatus('');
      } catch(_) { introSetStatus('location lookup failed'); }
    }, () => introSetStatus('location permission denied'));
  }

  async function introStart() {
    const startBtn = document.getElementById('tune-in-btn');
    if (startBtn) startBtn.disabled = true;
    introSetStatus('saving signal...');

    await introResolveTypedPlace('intro-birth-city', 'intro-birth-lat', 'intro-birth-lon');
    await introResolveTypedPlace('intro-wx-location', 'intro-wx-lat', 'intro-wx-lon');

    const user = {
      name: document.getElementById('intro-birth-name')?.value.trim() || '',
      birth: {
        date: document.getElementById('intro-birth-date')?.value.trim() || '',
        time: document.getElementById('intro-birth-time')?.value.trim() || '',
        ampm: document.getElementById('intro-ampm-toggle')?.textContent.trim() || 'AM',
        city: document.getElementById('intro-birth-city')?.value.trim() || '',
        lat: parseFloat(document.getElementById('intro-birth-lat')?.value || ''),
        lon: parseFloat(document.getElementById('intro-birth-lon')?.value || '')
      },
      weather: {
        name: document.getElementById('intro-wx-location')?.value.trim() || '',
        lat: parseFloat(document.getElementById('intro-wx-lat')?.value || ''),
        lon: parseFloat(document.getElementById('intro-wx-lon')?.value || '')
      },
      savedAt: new Date().toISOString()
    };

    // Same account (matched on birth date/time/city) logging back in keeps its
    // existing asteroid hit count instead of resetting to 0.
    const isSameAccount = (prev) => !!prev && prev.birth &&
      prev.birth.date === user.birth.date &&
      prev.birth.time === user.birth.time &&
      prev.birth.city === user.birth.city;
    const priorActive = readSublunaUser();
    const priorBackup = (() => {
      try { return JSON.parse(localStorage.getItem(SUBLUNA_USER_KEY + '_backup') || 'null'); } catch(_) { return null; }
    })();
    const matchedPrior = isSameAccount(priorActive) ? priorActive : (isSameAccount(priorBackup) ? priorBackup : null);
    user.hits = (matchedPrior && Number.isFinite(matchedPrior.hits)) ? matchedPrior.hits : 0;

    if (!user.birth.date || !user.birth.time || !user.birth.city || !user.weather.name) {
      introSetStatus('date, time, birth city, and current location are required');
      if (startBtn) startBtn.disabled = false;
      return;
    }

    localStorage.setItem(SUBLUNA_USER_KEY, JSON.stringify(user));
    if (Number.isFinite(user.weather.lat) && Number.isFinite(user.weather.lon)) {
      localStorage.setItem(WX_STORAGE_KEY, JSON.stringify(user.weather));
    }
    tuneIn();
  }

  function logoutSubluna() {
    const current = localStorage.getItem(SUBLUNA_USER_KEY);
    if (current) localStorage.setItem(SUBLUNA_USER_KEY + '_backup', current);
    localStorage.removeItem(SUBLUNA_USER_KEY);
    window.location.reload();
  }

  function tuneIn(options) {
    const instant = !!(options && options.instant);
    const overlay = document.getElementById('intro-overlay');
    if (_sublunaBooted) {
      if (overlay) overlay.remove();
      return;
    }
    _sublunaBooted = true;

    document.getElementById('subluna-topbar')?.classList.add('active');
    document.getElementById('subluna-bottombar')?.classList.add('active');
    document.getElementById('subscreen-toggle')?.classList.add('active');

    // Dynamically sync --bottombar-h to the cockpit player's actual rendered
    // height so the subscreen sidebar always stops exactly at its top edge.
    // rAF ensures we measure after the browser has finished layout.
    (function initBottombarSync() {
      const bar = document.getElementById('subluna-bottombar');
      if (!bar) return;
      const update = () => requestAnimationFrame(() => {
        const h = bar.getBoundingClientRect().height;
        if (h > 0) document.documentElement.style.setProperty('--bottombar-h', h + 'px');
      });
      new ResizeObserver(update).observe(bar);
      update(); // run immediately after boot
    })();
    renderAsteroidHits(getAsteroidHits());
    rEnsureRadioInit();
    moonRefresh();
    if (!_moonInterval) _moonInterval = setInterval(moonRefresh, 12 * 60 * 1000);
    if (!_radioInterval) _radioInterval = setInterval(() => { if (!rPlaying) rInit(); }, 30 * 60 * 1000);

    if (!overlay) return;
    if (instant) {
      overlay.remove();
      return;
    }

    const loginSfx = new Audio('AUDIO/subluna_login_sfx.mp3');
    loginSfx.preload = 'auto';
    loginSfx.play().catch(() => {});
    overlay.classList.add('intro-glitching');
    const dismiss = () => {
      loginSfx.pause();
      overlay.style.transition = 'opacity 1.2s ease';
      overlay.style.opacity = '0';
      setTimeout(() => overlay.remove(), 1200);
    };
    loginSfx.addEventListener('ended', dismiss, { once: true });
    setTimeout(dismiss, 2000);
  }

  document.addEventListener('click', e => {
    if (!e.target.closest('.intro-city-wrap')) {
      const box = document.getElementById('intro-city-suggestions');
      if (box) box.style.display = 'none';
    }
    if (!e.target.closest('.intro-location-wrap')) {
      const box = document.getElementById('intro-wx-suggestions');
      if (box) box.style.display = 'none';
    }
  });

  document.addEventListener('DOMContentLoaded', () => {
    const dateEl = document.getElementById('intro-birth-date');
    const timeEl = document.getElementById('intro-birth-time');
    if (dateEl) dateEl.addEventListener('input', () => maskBirthDate(dateEl));
    if (timeEl) timeEl.addEventListener('input', () => maskBirthTime(timeEl));
    document.getElementById('intro-birth-city')?.addEventListener('input', e => introCityInput(e.target.value));
    document.getElementById('intro-wx-location')?.addEventListener('input', e => introWxInput(e.target.value));
    document.getElementById('intro-birth-city')?.addEventListener('keydown', e => { if (e.key === 'Enter') introStart(); });
    document.getElementById('intro-wx-location')?.addEventListener('keydown', e => { if (e.key === 'Enter') introStart(); });
    document.getElementById('intro-ampm-toggle')?.addEventListener('click', toggleAmPm);
    document.getElementById('intro-wx-geolocate-btn')?.addEventListener('click', introWxGeolocate);
    document.getElementById('intro-load-recent-btn')?.addEventListener('click', loadRecentUser);
    document.getElementById('tune-in-btn')?.addEventListener('click', introStart);
    document.getElementById('subluna-logout-btn')?.addEventListener('click', logoutSubluna);

    const saved = readSublunaUser();
    if (hasValidSublunaUser(saved)) {
      if (saved.weather && Number.isFinite(Number(saved.weather.lat)) && Number.isFinite(Number(saved.weather.lon))) {
        localStorage.setItem(WX_STORAGE_KEY, JSON.stringify(saved.weather));
      }
      tuneIn({ instant: true });
      return;
    }

    const overlay = document.getElementById('intro-overlay');
    if (overlay) overlay.hidden = false;
    // Show LOAD RECENT if there's any saved data (active session or post-logout backup)
    const backup = (() => {
      try { return JSON.parse(localStorage.getItem(SUBLUNA_USER_KEY + '_backup') || 'null'); } catch(_) { return null; }
    })();
    if (saved || backup) {
      const btn = document.getElementById('intro-load-recent-btn');
      if (btn) btn.style.display = 'inline-block';
    }
  });
  </script>

  <script>
  // ── Decorative background: full-page twinkling starfield + approaching asteroids ──
  (function(){
    const cvs = document.getElementById('bg-stars-canvas');
    if (!cvs) return;
    const ctx = cvs.getContext('2d');
    const DPR = Math.min(window.devicePixelRatio || 1, 2);

    let W = 0, H = 0;
    function resize(){
      W = window.innerWidth; H = window.innerHeight;
      cvs.width = W * DPR; cvs.height = H * DPR;
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }
    resize();
    window.addEventListener('resize', resize);

    // ── Stars ────────────────────────────────────────────────────────────────────
    const STAR_COUNT = 70;
    const stars = Array.from({ length: STAR_COUNT }, () => ({
      x: Math.random() * W,
      y: Math.random() * H,
      r: 0.6 + Math.random() * 1.3,
      phase: Math.random() * Math.PI * 2,
      speed: 0.4 + Math.random() * 0.8
    }));

    // ── Asteroid system ──────────────────────────────────────────────────────────
    const MAX_ASTEROIDS = 3;
    const APPROACH_DUR = 7000;
    const MAX_R = 34;
    const SPAWN_INTERVAL = 3200;

    const asteroidImgs = [new Image(), new Image()];
    asteroidImgs[0].src = 'IMAGES/asteroid-1.png';
    asteroidImgs[1].src = 'IMAGES/asteroid-2.png';

    const asteroids = [];
    let lastSpawn = 0;

    function makeAsteroid(now) {
      return {
        x: 0.08 * W + Math.random() * 0.84 * W,
        y: 0.08 * H + Math.random() * 0.84 * H,
        born: now,
        rotation: Math.random() * Math.PI * 2,
        spinSpeed: (0.004 + Math.random() * 0.008) * (Math.random() < 0.5 ? 1 : -1),
        img: asteroidImgs[Math.random() < 0.5 ? 0 : 1],
        glowPhase: Math.random() * Math.PI * 2,
        state: 'alive',
        particles: [],
      };
    }

    function spawnAsteroid(now) {
      if (asteroids.filter(a => a.state === 'alive').length < MAX_ASTEROIDS) {
        asteroids.push(makeAsteroid(now));
      }
    }

    function asteroidRadius(a, now) {
      const age = now - a.born;
      const t = Math.min(age / APPROACH_DUR, 1);
      const eased = t * t;
      return 1 + eased * (MAX_R - 1);
    }

    function drawAsteroid(a, now, t, alphaMult = 1) {
      const r = asteroidRadius(a, now);
      const alpha = Math.min(r / 6, 1) * alphaMult;
      const glowBreathe = 0.5 + 0.5 * Math.sin(t * 1.1 + a.glowPhase);
      const glowR = r * (2.4 + glowBreathe * 0.7);

      ctx.save();
      ctx.translate(a.x, a.y);

      const grd = ctx.createRadialGradient(0, 0, r * 0.3, 0, 0, glowR);
      grd.addColorStop(0, `rgba(180, 160, 120, ${(0.18 + glowBreathe * 0.1) * alpha})`);
      grd.addColorStop(0.5, `rgba(100, 85, 60, ${0.06 * alpha})`);
      grd.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.beginPath();
      ctx.arc(0, 0, glowR, 0, Math.PI * 2);
      ctx.fillStyle = grd;
      ctx.fill();

      ctx.rotate(a.rotation);
      ctx.globalAlpha = alpha;
      if (a.img.complete && a.img.naturalWidth > 0) {
        const d = r * 2.1;
        ctx.drawImage(a.img, -d / 2, -d / 2, d, d);
      } else {
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(160, 140, 110, ${alpha})`;
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      ctx.restore();
    }

    function explodeAsteroid(a, now) {
      if (a.state !== 'alive') return;
      a.state = 'exploding';
      bumpAsteroidHits();
      new Audio('AUDIO/laser-gun.mp3').play().catch(() => {});
      const r = asteroidRadius(a, now);
      const count = 18 + Math.floor(Math.random() * 8);
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 0.3 + Math.random() * 2.8;
        a.particles.push({
          x: a.x + (Math.random() - 0.5) * r,
          y: a.y + (Math.random() - 0.5) * r,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          r: 0.8 + Math.random() * 2.2,
        });
      }
      a.explodeStart = now;
    }

    function fadeAsteroid(a, now) {
      if (a.state !== 'alive') return;
      a.state = 'fading';
      a.fadeStart = now;
    }

    function drawFade(a, now, t) {
      const FADE_DUR = 700;
      const age = now - a.fadeStart;
      if (age > FADE_DUR) { a.state = 'dead'; return; }
      const alphaMult = 1 - (age / FADE_DUR);
      drawAsteroid(a, now, t, alphaMult);
    }

    function drawExplosion(a, now) {
      const age = now - a.explodeStart;
      const dur = 800;
      if (age > dur) { a.state = 'dead'; return; }
      const progress = age / dur;
      const fade = (1 - progress) * (1 - progress);
      for (const p of a.particles) {
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.97;
        p.vy *= 0.97;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * (1 + progress * 0.5), 0, Math.PI * 2);
        ctx.fillStyle = `rgba(210, 175, 110, ${fade})`;
        ctx.fill();
      }
    }

    function handleTap(e) {
      const rect = cvs.getBoundingClientRect();
      const scaleX = W / rect.width;
      const scaleY = H / rect.height;
      const cx = (e.clientX - rect.left) * scaleX;
      const cy = (e.clientY - rect.top) * scaleY;
      const now = performance.now();
      for (const a of asteroids) {
        if (a.state !== 'alive') continue;
        const r = asteroidRadius(a, now);
        if (Math.hypot(cx - a.x, cy - a.y) < r * 1.4) {
          explodeAsteroid(a, now);
          return;
        }
      }
    }
    cvs.addEventListener('click', handleTap);
    cvs.addEventListener('touchstart', (e) => {
      if (e.touches.length > 0) handleTap(e.touches[0]);
    }, { passive: true });

    // ── Render loop ──────────────────────────────────────────────────────────────
    const FPS = 20, FRAME_MS = 1000 / FPS;
    let lastFrame = 0, rafId = null;

    function tick(now){
      rafId = requestAnimationFrame(tick);
      if (now - lastFrame < FRAME_MS) return;
      lastFrame = now;
      ctx.clearRect(0, 0, W, H);
      const t = now * 0.001;

      for (const s of stars) {
        const tw = 0.35 + 0.65 * (0.5 + 0.5 * Math.sin(t * s.speed + s.phase));
        ctx.beginPath();
        ctx.fillStyle = `rgba(255, 250, 240, ${tw.toFixed(3)})`;
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      }

      if (now - lastSpawn > SPAWN_INTERVAL) {
        spawnAsteroid(now);
        lastSpawn = now;
      }

      for (const a of asteroids) {
        if (a.state === 'dead') continue;
        if (a.state === 'alive') {
          a.rotation += a.spinSpeed;
          if (now - a.born >= APPROACH_DUR) {
            fadeAsteroid(a, now);
          } else {
            drawAsteroid(a, now, t);
          }
        }
        if (a.state === 'fading') {
          drawFade(a, now, t);
        }
        if (a.state === 'exploding') {
          drawExplosion(a, now);
        }
      }

      for (let i = asteroids.length - 1; i >= 0; i--) {
        if (asteroids[i].state === 'dead') asteroids.splice(i, 1);
      }
    }
    rafId = requestAnimationFrame(tick);

    spawnAsteroid(performance.now() - 2000);
    spawnAsteroid(performance.now() - 500);

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) { if (rafId) cancelAnimationFrame(rafId); rafId = null; }
      else if (!rafId) { lastFrame = 0; rafId = requestAnimationFrame(tick); }
    });
  })();
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
  // ── Decorative background: photorealistic moon + distant Earth ───────────────
  (function(){
    const wrap = document.getElementById('bg-moon-wrap');
    const cvs = document.getElementById('bg-moon-canvas');
    if (!wrap || !cvs || !window.THREE) return;

    const TEX_BASE = 'https://raw.githubusercontent.com/mrdoob/three.js/r128/examples/textures/planets/';

    const DPR = Math.min(window.devicePixelRatio || 1, 2);

    function getSize(){
      const r = wrap.getBoundingClientRect();
      return r.width > 0 ? Math.round(r.width) : (wrap.offsetWidth || 300);
    }
    let SZ = getSize();
    cvs.width = SZ * DPR;
    cvs.height = SZ * DPR;

    const renderer = new THREE.WebGLRenderer({ canvas: cvs, antialias: true, alpha: true });
    renderer.setSize(SZ * DPR, SZ * DPR, false);
    renderer.setClearColor(0x000000, 0);

    const scene = new THREE.Scene();
    const cam = new THREE.PerspectiveCamera(42, 1, 0.1, 100);
    cam.position.z = 3.0;

    const loader = new THREE.TextureLoader();
    loader.crossOrigin = 'anonymous';

    // ── Moon ───────────────────────────────────────────────────────
    const MOON_R = 1;
    const moon = new THREE.Mesh(
      new THREE.SphereGeometry(MOON_R, 64, 64),
      new THREE.MeshPhongMaterial({ color: 0xffffff, shininess: 2, specular: 0x111111 })
    );
    scene.add(moon);
    moon.rotation.y = Math.PI * 0.5;

    loader.load(TEX_BASE + 'moon_1024.jpg', (tex) => {
      moon.material.map = tex;
      moon.material.bumpMap = tex;     // reuse diffuse as a cheap bump pass for crater depth
      moon.material.bumpScale = 0.012;
      moon.material.needsUpdate = true;
    }, undefined, (err) => console.warn('[bg-moon] failed to load moon texture', err));

    // ── Earth Position (distant, behind/beside the moon) ─────────────────────
    const EARTH_R = 0.46;
    const earthGroup = new THREE.Group();
    earthGroup.position.set(1.05, 1.05, -1.7);
    scene.add(earthGroup);

    const earth = new THREE.Mesh(
      new THREE.SphereGeometry(EARTH_R, 48, 48),
      new THREE.MeshPhongMaterial({ color: 0xffffff, shininess: 12 })
    );
    earthGroup.add(earth);

    loader.load(TEX_BASE + 'earth_atmos_2048.jpg', (tex) => {
      earth.material.map = tex; earth.material.needsUpdate = true;
    }, undefined, (err) => console.warn('[bg-moon] failed to load earth diffuse', err));
    loader.load(TEX_BASE + 'earth_normal_2048.jpg', (tex) => {
      earth.material.normalMap = tex; earth.material.needsUpdate = true;
    }, undefined, (err) => console.warn('[bg-moon] failed to load earth normal map', err));
    loader.load(TEX_BASE + 'earth_specular_2048.jpg', (tex) => {
      earth.material.specularMap = tex; earth.material.needsUpdate = true;
    }, undefined, (err) => console.warn('[bg-moon] failed to load earth specular map', err));
    loader.load(TEX_BASE + 'earth_lights_2048.png', (tex) => {
      earth.material.emissiveMap = tex;
      earth.material.emissive = new THREE.Color(0xffdd99);
      earth.material.emissiveIntensity = 1.1;
      earth.material.needsUpdate = true;
    }, undefined, (err) => console.warn('[bg-moon] failed to load earth night lights', err));

    // Clouds — separate slightly-larger sphere, independent slow rotation
    const clouds = new THREE.Mesh(
      new THREE.SphereGeometry(EARTH_R * 1.015, 48, 48),
      new THREE.MeshPhongMaterial({ color: 0xffffff, transparent: true, opacity: 0.55, depthWrite: false })
    );
    earthGroup.add(clouds);
    loader.load(TEX_BASE + 'earth_clouds_1024.png', (tex) => {
      clouds.material.map = tex;
      clouds.material.alphaMap = tex;
      clouds.material.needsUpdate = true;
    }, undefined, (err) => console.warn('[bg-moon] failed to load earth clouds', err));

    // Thin atmosphere glow — fresnel rim, additive, back-side only
    const atmosphere = new THREE.Mesh(
      new THREE.SphereGeometry(EARTH_R * 1.09, 48, 48),
      new THREE.ShaderMaterial({
        uniforms: {},
        vertexShader: `
          varying vec3 vNormal;
          void main(){
            vNormal = normalize(normalMatrix * normal);
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          varying vec3 vNormal;
          void main(){
            float intensity = pow(0.65 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 3.0);
            gl_FragColor = vec4(0.45, 0.65, 1.0, 1.0) * intensity;
          }
        `,
        blending: THREE.AdditiveBlending,
        side: THREE.BackSide,
        transparent: true
      })
    );
    earthGroup.add(atmosphere);

    // ── Lighting (shared by moon + Earth, same sun direction) ───────
    scene.add(new THREE.AmbientLight(0x888880, 0.35));
    const sun = new THREE.DirectionalLight(0xfff8f0, 1.1);
    sun.position.set(4, 1.5, 3);
    scene.add(sun);

    // ── Continuous slow auto-rotation ───────────────────────────
    const FPS = 23, FRAME_MS = 1000 / FPS;
    const MOON_SPIN = 0.0015, EARTH_SPIN = 0.00016, CLOUD_SPIN = 0.0022;
    let lastFrame = 0, rafId = null;

    function tick(now){
      rafId = requestAnimationFrame(tick);
      if (now - lastFrame < FRAME_MS) return;
      lastFrame = now;
      moon.rotation.y += MOON_SPIN;
      earth.rotation.y += EARTH_SPIN;
      clouds.rotation.y += CLOUD_SPIN;
      renderer.render(scene, cam);
    }
    rafId = requestAnimationFrame(tick);

    // Keep canvas crisp on resize
    window.addEventListener('resize', () => {
      const newSZ = getSize();
      if (newSZ === SZ || newSZ <= 0) return;
      SZ = newSZ;
      cvs.width = SZ * DPR;
      cvs.height = SZ * DPR;
      renderer.setSize(SZ * DPR, SZ * DPR, false);
    });

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) { if (rafId) cancelAnimationFrame(rafId); rafId = null; }
      else if (!rafId) { lastFrame = 0; rafId = requestAnimationFrame(tick); }
    });
  })();
  </script>

  <script>

  (function(){

  })();

  const _appDay = new Date().toDateString();
  (function scheduleMidnightReload(){
    const now = new Date();
    const msUntilMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1) - now;
    setTimeout(() => window.location.reload(), msUntilMidnight);
  })();

  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && new Date().toDateString() !== _appDay) {
      window.location.reload();

  // ── Moon refresh (sublunar point tracking) ────────────────────────────────────

      if (coordEl) coordEl.innerHTML = rFmtCoords(coords.lat, coords.lon);
      const headerCoordEl = document.getElementById('bb-header-coords');
      if (headerCoordEl) headerCoordEl.innerHTML = rFmtCoords(coords.lat, coords.lon);
      const footer = document.getElementById('footer-coords');
      if (footer) footer.innerHTML = `moon: ${rFmtCoords(coords.lat, coords.lon)} (${coords.source})`;

  <script>
  // ── Weather ───────────────────────────────────────────────────────────────
  const WX_ICONS = {
    0:'N',  // sun
    1:'C',  // sun + cloud
    2:'C',  // sun + cloud
    3:'P',  // cloud (overcast)
    45:'F', // wind cloud (fog)
    48:'F', // wind cloud (fog)
    51:'M', // light rain
    53:'M', // rain
    55:'M', // heavy rain
    61:'M', // light rain
    63:'M', // rain
    65:'B', // heavy rain drops
    71:'D', // snow
    73:'D', // snow
    75:'D', // heavy snow
    80:'M', // showers
    81:'B', // heavy showers
    82:'A', // violent showers + thunder
    95:'A', // thunderstorm
    96:'A', // thunderstorm
    99:'A', // severe thunderstorm
  };
  const WX_DESC = {
    0:'clear sky',1:'mainly clear',2:'partly cloudy',3:'overcast',
    45:'fog',48:'icy fog',
    51:'light drizzle',53:'drizzle',55:'heavy drizzle',
    61:'light rain',63:'rain',65:'heavy rain',
    71:'light snow',73:'snow',75:'heavy snow',
    80:'light showers',81:'showers',82:'violent showers',
    95:'thunderstorm',96:'thunderstorm w/ hail',99:'severe thunderstorm',
  };
  const WTTR_TO_WMO = {
    113:0,116:2,119:3,122:3,143:45,176:61,179:71,182:61,185:51,200:95,
    227:73,230:75,248:45,260:48,263:51,266:51,281:51,284:55,293:61,296:61,
    299:63,302:63,305:65,308:65,311:61,314:63,317:80,320:81,323:71,326:71,
    329:73,332:73,335:75,338:75,350:61,353:80,356:81,359:82,362:80,365:81,
    368:71,371:73,374:61,377:63,386:95,389:95,392:95,395:99
  };

  function wxSaveLocation(d){ localStorage.setItem(WX_STORAGE_KEY, JSON.stringify(d)); }
  function wxLoadLocation(){ try{ return JSON.parse(localStorage.getItem(WX_STORAGE_KEY)); }catch(e){ return null; } }

  function wxSetStatus(msg){ const el=document.getElementById('wx-loc-status'); if(el) el.textContent=msg; }

  function wxRender({ icon, temp, hilo, locName, desc, hourly }) {
    const main = document.getElementById('wx-main');
    document.getElementById('wx-icon').innerHTML = icon;
    document.getElementById('wx-temp').textContent = temp;
    const hiloEl = document.getElementById('wx-hilo'); if(hiloEl) hiloEl.innerHTML = hilo||'';
    const locEl = document.getElementById('wx-loc-name'); if(locEl) locEl.textContent = locName||'';
    document.getElementById('wx-desc').textContent = desc;
    // Hourly strip
    const hrEl = document.getElementById('wx-hourly');
    if(hrEl && hourly && hourly.length) {
      hrEl.innerHTML = hourly.map(h =>
        `<div class="wx-hr">
          <div class="wx-hr-time">${h.label}</div>
          <span class="wx-hr-icon" style="font-family:'WeatherSymbols',sans-serif;">${WX_ICONS[h.code]||'—'}</span>
          <div class="wx-hr-temp">${h.temp}</div>
        </div>`
      ).join('');
    }
    if(main) main.style.display = 'none';
    wxSetStatus('');
  }

  // ── Primary: wttr.in ──────────────────────────────────────────────────────
  async function loadWeatherWttr(lat, lon) {
    const r = await fetch(`https://wttr.in/${lat},${lon}?format=j1`);
    if(!r.ok) throw new Error('wttr.in ' + r.status);
    const d = await r.json();
    const cur = d.current_condition?.[0] || {};
    const today = d.weather?.[0] || {};

    const code = WTTR_TO_WMO[parseInt(cur.weatherCode)] ?? 0;
    const icon = `<span style="font-family:'WeatherSymbols',sans-serif;font-size:2rem;">${WX_ICONS[code]||'—'}</span>`;
    const desc = WX_DESC[code] || cur.weatherDesc?.[0]?.value || '';
    const temp = cur.temp_F ? Math.round(cur.temp_F) + '°F' : '—';
    const feels = cur.FeelsLikeF ? Math.round(cur.FeelsLikeF) + '°F' : '—';
    const wind = parseInt(cur.windspeedMiles) || 0;
    const hi = today.maxtempF ? Math.round(today.maxtempF) + '°F' : null;
    const lo = today.mintempF ? Math.round(today.mintempF) + '°F' : null;
    const hilo = (hi && lo) ? `${hi} ↑  ${lo} ↓` : '';

    // Hourly — wttr gives 3-hour slots; pull 8 slots (24h) across midnight
    const todaySlots    = (today.hourly || []);
    const tomorrowSlots = (d.weather?.[1]?.hourly || []).map(h => ({ ...h, _nextDay: true }));
    const allSlots      = [...todaySlots, ...tomorrowSlots];
    const now = new Date();
    const curH = now.getHours();
    const hourly = allSlots
      .filter(h => {
        const hh = parseInt(h.time) / 100;
        // today: only slots from current hour onward; tomorrow: all slots
        return h._nextDay || hh >= curH;
      })
      .slice(0, 8)
      .map(h => {
        const hCode = WTTR_TO_WMO[parseInt(h.weatherCode)] ?? 0;
        const hh = parseInt(h.time) / 100;
        const label = hh === 0 ? '12am' : hh < 12 ? hh + 'am' : hh === 12 ? '12pm' : (hh-12) + 'pm';
        return { label, code: hCode, temp: Math.round(h.tempF) + '°' };
      });

    // Reverse geocode for name
    let locName = '';
    try {
      const gr = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`, { headers: { 'Accept-Language': 'en' } });
      const gd = await gr.json();
      locName = gd.address?.city || gd.address?.town || gd.address?.county || '';
    } catch(_) {}

    wxRender({ icon, temp, hilo, locName, desc: `${desc} · feels ${feels} · wind ${wind} mph`, hourly });
  }

  // ── Fallback: open-meteo ──────────────────────────────────────────────────
  async function loadWeatherMeteo(lat, lon) {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
      `&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m` +
      `&hourly=temperature_2m,weather_code` +
      `&daily=weather_code,temperature_2m_max,temperature_2m_min` +
      `&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=auto&forecast_days=6`;
    const r = await fetch(url);
    if(!r.ok) throw new Error('open-meteo ' + r.status);
    const d = await r.json();
    const cur = d.current || {};
    const daily = d.daily || {};
    const code = cur.weather_code ?? 0;
    const icon = `<span style="font-family:'WeatherSymbols',sans-serif;font-size:2rem;">${WX_ICONS[code]||'—'}</span>`;
    const desc = WX_DESC[code] || '';
    const temp = cur.temperature_2m != null ? Math.round(cur.temperature_2m) + '°F' : '—';
    const feels = cur.apparent_temperature != null ? Math.round(cur.apparent_temperature) + '°F' : '—';
    const wind = cur.wind_speed_10m != null ? Math.round(cur.wind_speed_10m) : 0;
    const hi = daily.temperature_2m_max?.[0] != null ? Math.round(daily.temperature_2m_max[0]) + '°F' : null;
    const lo = daily.temperature_2m_min?.[0] != null ? Math.round(daily.temperature_2m_min[0]) + '°F' : null;
    const hilo = (hi && lo) ? `${hi} ↑  ${lo} ↓` : '';

    // Hourly — next 6 slots from current hour
    const hourly_d = d.hourly || {};
    const nowDate = new Date();
    let startIdx = 0;
    if(hourly_d.time) {
      for(let i = 0; i < hourly_d.time.length; i++) {
        if(new Date(hourly_d.time[i]) >= nowDate) { startIdx = i; break; }
      }
    }
    const hourly = (hourly_d.time || []).slice(startIdx, startIdx + 8).map((t, i) => {
      const idx = startIdx + i;
      const hCode = hourly_d.weather_code[idx] ?? 0;
      const hDate = new Date(t);
      const hh = hDate.getHours();
      const label = hh === 0 ? '12am' : hh < 12 ? hh + 'am' : hh === 12 ? '12pm' : (hh-12) + 'pm';
      return { label, code: hCode, temp: Math.round(hourly_d.temperature_2m[idx]) + '°' };
    });

    let locName = '';
    try {
      const gr = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`, { headers: { 'Accept-Language': 'en' } });
      const gd = await gr.json();
      locName = gd.address?.city || gd.address?.town || gd.address?.county || '';
    } catch(_) {}

    wxRender({ icon, temp, hilo, locName, desc: `${desc} · feels ${feels} · wind ${wind} mph`, hourly });
  }

  // ── Main load with fallback chain ─────────────────────────────────────────
  async function wxLoadWeather(lat, lon) {
    wxSetStatus('loading…');
    try {
      await loadWeatherWttr(lat, lon);
    } catch(e) {
      console.warn('wttr.in failed, trying open-meteo:', e);
      try {
        await loadWeatherMeteo(lat, lon);
      } catch(e2) {
        wxSetStatus('weather unavailable');
        console.warn('open-meteo also failed:', e2);
      }
    }
  }

  function wxApplyLocation(loc) {
    const inp = document.getElementById('wx-city-input');
    if(inp) inp.value = loc.name || '';
    wxLoadWeather(loc.lat, loc.lon);

  // ── City autocomplete ─────────────────────────────────────────────────────
  let _wxCityTimer = null;
  async function wxCityInput(val) {
    clearTimeout(_wxCityTimer);
    const box = document.getElementById('wx-suggestions');
    if(val.length < 2) { box.style.display = 'none'; return; }
    _wxCityTimer = setTimeout(async () => {
      try {
        const r = await fetch('https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=5&q=' + encodeURIComponent(val), { headers: { 'Accept-Language': 'en' } });
        const data = await r.json();
        box.innerHTML = data.map(p => {
          const name = p.address?.city || p.address?.town || p.address?.county || p.display_name;
          const country = p.address?.country_code?.toUpperCase() || '';
          return `<div class="wx-suggestion" onclick="wxPickSuggestion('${name.replace(/'/,"\\'")}',${p.lat},${p.lon})">${name}${country ? ' <span style="opacity:.5;font-size:9px">'+country+'</span>' : ''}</div>`;
        }).join('');
        box.style.display = data.length ? 'block' : 'none';
      } catch(_) {}
    }, 320);
  }

  function wxPickSuggestion(name, lat, lon) {
    const loc = { name, lat: parseFloat(lat), lon: parseFloat(lon) };
    wxSaveLocation(loc);
    wxApplyLocation(loc);
    const box = document.getElementById('wx-suggestions');
    if(box) box.style.display = 'none';
    const inp = document.getElementById('wx-city-input');
    if(inp) inp.value = name;
  }

  async function wxCitySubmit() {
    const val = document.getElementById('wx-city-input')?.value.trim();
    if(!val) return;
    wxSetStatus('searching…');
    try {
      const r = await fetch('https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=1&q=' + encodeURIComponent(val), { headers: { 'Accept-Language': 'en' } });
      const data = await r.json();
      if(!data.length) { wxSetStatus('not found'); return; }
      const p = data[0];
      const name = p.address?.city || p.address?.town || p.address?.county || p.display_name;
      wxPickSuggestion(name, p.lat, p.lon);
    } catch(_) { wxSetStatus('error'); }
  }

  // ── Geolocation ───────────────────────────────────────────────────────────
  function wxGeolocate() {
    const typed = document.getElementById('wx-city-input')?.value.trim();
    if(typed) { wxCitySubmit(); return; }
    if(!navigator.geolocation) { wxSetStatus('geolocation unavailable'); return; }
    wxSetStatus('locating…');
    navigator.geolocation.getCurrentPosition(async pos => {
      const lat = pos.coords.latitude, lon = pos.coords.longitude;
      try {
        const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`, { headers: { 'Accept-Language': 'en' } });
        const d = await r.json();
        const name = d.address?.city || d.address?.town || d.address?.county || d.display_name || 'your location';
        const loc = { name, lat, lon };
        wxSaveLocation(loc);
        wxApplyLocation(loc);
      } catch(_) { wxSetStatus('error'); }
    }, () => { wxSetStatus('permission denied'); });
  }

  // ── Init ────────────────────────────────────────────────────────────────
  // Previously this only ran when the sidebar was first opened, which meant
  // the user would visibly watch the weather populate (—  → "loading…" →
  // real data) right in front of them. Now it prefetches quietly in the
  // background shortly after page load, so by the time the sidebar opens
  // the data is already sitting there ready — no visible pop-in.
  let _wxInited = false;
  function wxEnsureInit() {
    if(_wxInited) return;
    _wxInited = true;
    const saved = wxLoadLocation();
    if(saved) {
      wxApplyLocation(saved);
    } else {
      wxSetStatus('enter a city or tap ◎');
    }
  }

  // Kick off the background prefetch once the page has settled, rather
  // than blocking initial render. requestIdleCallback runs it when the
  // browser is free; falls back to a short timeout where unsupported.
  if ('requestIdleCallback' in window) {
    requestIdleCallback(() => wxEnsureInit());
  } else {
    setTimeout(() => wxEnsureInit(), 800);
  }

  // ── DAILY HOROSCOPE ───────────────────────────────────────────────────────
  // Pulled from a real API (freehoroscopeapi.com via the /api/horoscope
  // Vercel proxy in this project — see api/horoscope.js). No locally
  // generated/templated text. getSunSignFromDate() below is just date math
  // to pick *which* sign to query; it does not author any horoscope content.
  let _horoCache = {};

  function getSunSignFromDate(dateStr) {
    // dateStr format: MM/DD/YYYY
    const parts = dateStr.split('/');
    if (parts.length < 2) return null;
    const m = parseInt(parts[0], 10);
    const d = parseInt(parts[1], 10);
    if (!m || !d) return null;
    if ((m === 3 && d >= 21) || (m === 4 && d <= 19)) return 'aries';
    if ((m === 4 && d >= 20) || (m === 5 && d <= 20)) return 'taurus';
    if ((m === 5 && d >= 21) || (m === 6 && d <= 20)) return 'gemini';
    if ((m === 6 && d >= 21) || (m === 7 && d <= 22)) return 'cancer';
    if ((m === 7 && d >= 23) || (m === 8 && d <= 22)) return 'leo';
    if ((m === 8 && d >= 23) || (m === 9 && d <= 22)) return 'virgo';
    if ((m === 9 && d >= 23) || (m === 10 && d <= 22)) return 'libra';
    if ((m === 10 && d >= 23) || (m === 11 && d <= 21)) return 'scorpio';
    if ((m === 11 && d >= 22) || (m === 12 && d <= 21)) return 'sagittarius';
    if ((m === 12 && d >= 22) || (m === 1 && d <= 19)) return 'capricorn';
    if ((m === 1 && d >= 20) || (m === 2 && d <= 18)) return 'aquarius';
    return 'pisces';
  }

  async function loadHoroscope() {
    const user = readSublunaUser();
    if (!user || !user.birth || !user.birth.date) return;
    const sign = getSunSignFromDate(user.birth.date);
    if (!sign) return;

    const signEl = document.getElementById('horo-sign-name');
    const textEl = document.getElementById('horo-text');
    if (!textEl) return;
    if (signEl) signEl.textContent = sign.toUpperCase();

    const today = new Date().toISOString().slice(0, 10); // e.g. "2026-06-22"
    const cacheKey = `${sign}:${today}`;
    if (_horoCache[cacheKey]) { textEl.textContent = _horoCache[cacheKey]; return; }

    textEl.textContent = 'loading…';
    try {
      const r = await fetch(`/api/horoscope?sign=${encodeURIComponent(sign)}&period=daily`);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const json = await r.json();
      const reading = json && json.data && json.data.horoscope;
      if (!reading) throw new Error('no horoscope in response');

      // The upstream API has occasionally echoed back a different sign than
      // requested. Trust the sign label *we* asked for (computed from the
      // user's real birthdate) over whatever the response claims, since
      // that's what's actually being displayed as the section header.
      _horoCache[cacheKey] = reading;
      textEl.textContent = reading;
    } catch (e) {
      textEl.textContent = `Couldn't load today's horoscope — ${e.message}`;
    }
  }

  // Horoscope lazy-load now happens inside sidebarSetOpen() above.

  function moonPhaseName(phase) {
    return (MOON_PHASE_NAMES.find(p => phase <= p.max) || { name: 'Waning Crescent' }).name;
  }

  function moonSign(date) {
    // Moon moves ~13.2°/day. Use a known New Moon in Aries as epoch.
    // Jan 29 2025 12:36 UTC = New Moon ~0° Aries
    const EPOCH = Date.UTC(2025, 0, 29, 12, 36);
    const CYCLE_MS = 29.53058867 * 24 * 60 * 60 * 1000;
    const SIGN_DEG = 30;
    const elapsed = date.getTime() - EPOCH;
    const cyclePos = ((elapsed % CYCLE_MS) + CYCLE_MS) % CYCLE_MS;
    const moonLon = (cyclePos / CYCLE_MS) * 360;
    const signIndex = Math.floor(moonLon / SIGN_DEG) % 12;
    return MOON_SIGNS[signIndex];
  }

  function fmtTime(date) {
    if (!date || isNaN(date)) return '—';
    let h = date.getHours(), m = date.getMinutes();
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    return `${h}:${String(m).padStart(2,'0')} ${ampm}`;
  }
