  function _twBestAspect(planetName) {
    if (!_twNatal || !_twNatal.length) return null;
    const tp = _twTodayPlanets().find(p => p.name === planetName);
    if (!tp) return null;
    const tPos = _twAbsPos(tp.sign, tp.deg);
    const TW_TARGETS = new Set(['Sun', 'Moon', 'Rising', 'Saturn']);
    let best = null;
    for (const np of _twNatal) {
      if (!TW_TARGETS.has(np.name)) continue;
      const nPos = _twAbsPos(np.sign, np.deg);
      let diff = Math.abs(tPos - nPos);
      if (diff > 180) diff = 360 - diff;
      for (const [type, angle] of Object.entries(_TW_ANGLES)) {
        const orb = Math.abs(diff - angle);
        if (orb <= 12 && (!best || orb < best.orb)) {
          best = { natalPlanet: np.name, aspect: type, orb, key: planetName + '_' + type + '_' + np.name };
        }
      }
    }
    return best;
  }

  function _twSelectPlanet(planetName){
    if(!_twContainer) return;
    const header=_twContainer.querySelector('.tw-reader-header');
    const text=_twContainer.querySelector('.tw-reader-text');
    _twContainer.querySelectorAll('.tw-planet').forEach(el=>el.classList.remove('tw-active'));
    if(_twActive===planetName){
      _twActive=null;
      header.innerHTML='';
      text.innerHTML='<span class="tw-prompt">select a planet to learn more</span>';
      return;
    }
    _twActive=planetName;
    _twContainer.querySelectorAll('.tw-planet[data-planet="'+planetName+'"]').forEach(el=>el.classList.add('tw-active'));
    const asp=_twBestAspect(planetName);
    const tGlyph=_TW_GLYPHS[planetName]||'';
    if(!asp){
      header.innerHTML=tGlyph+' '+planetName;
      text.innerHTML='<span class="tw-prompt">no close aspect to a natal planet right now</span>';
      return;
    }
    const nGlyph=_TW_GLYPHS[asp.natalPlanet]||'';
    const short=_TW_SHORT[asp.aspect]||asp.aspect;
    header.innerHTML=tGlyph+' '+planetName+' <span class="tw-badge">'+short+'</span> '+nGlyph+' natal '+asp.natalPlanet;
    const entry=_twLexicon?_twLexicon[asp.key]:null;
    if(entry){
      text.innerHTML=entry.split(/\n+/).filter(p=>p.trim()).map(p=>'<span style="display:block;margin-bottom:.55rem">'+p.trim()+'</span>').join('');
    } else {
      text.innerHTML='<span class="tw-prompt">no reading available for this transit</span>';
    }
  }

  function _twSignColor(sign){
    const fire  = ['Aries','Leo','Sagittarius'];
    const earth = ['Taurus','Virgo','Capricorn'];
    const air   = ['Gemini','Libra','Aquarius'];
    if (fire.includes(sign))  return 'var(--signal)';
    if (earth.includes(sign)) return 'var(--gold)';
    if (air.includes(sign))   return 'var(--dim)';
    return '#7ab4c8'; // water signs
  }

  async function renderTransitsWidget(container){
    _twContainer=container;
    _twActive=null;

    container.innerHTML=`
      <style>
        .tw-planets{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.8rem;}
        .tw-planet{font-family:'IBM Plex Mono',monospace;font-size:.68rem;letter-spacing:.04em;
          color:var(--dust);border:0px solid var(--faint);padding:.25rem .5rem;
          cursor:pointer;transition:color .15s,border-color .15s;}
        .tw-planet.tw-active{color:var(--signal);border-color:var(--signal);}
        .tw-reader-header{font-family:'IBM Plex Mono',monospace;font-size:.72rem;
          color:var(--ink);margin-bottom:.5rem;min-height:1.2rem;}
        .tw-badge{font-size:.6rem;letter-spacing:.1em;color:var(--signal);
          border:.5px solid var(--signal);padding:.1rem .3rem;margin:0 .2rem;}
        .tw-reader-text{font-family:'IBM Plex Mono',monospace;font-size:.72rem;
          color:var(--dust);line-height:1.6;}
        .tw-prompt{font-style:italic;opacity:.6;}
      </style>
      <div class="tw-planets" id="tw-planet-list">loading…</div>
      <div class="tw-reader-header"></div>
      <div class="tw-reader-text"><span class="tw-prompt">select a planet to learn more</span></div>
    `;

    const planetList=container.querySelector('#tw-planet-list');
    const text=container.querySelector('.tw-reader-text');

    // Render planet pills immediately from local math
    const planets=_twTodayPlanets();
    planetList.innerHTML=planets.map(p=>
      '<span class="tw-planet" data-planet="'+p.name+'" onclick="_twSelectPlanet(\''+p.name+'\')">'+
      '<span style="margin-right:.2rem">'+((_TW_GLYPHS[p.name])||'')+'</span>'+p.name+
      ' in <span style="color:'+_twSignColor(p.sign)+'">'+p.sign+'</span></span>'
    ).join('');

    // Load transit lexicon from Signal
    if(!_twLexicon){
      try{
        const r=await fetch('https://signal-hazel-mu.vercel.app/JSON/transit-lexicon.json');
        if(r.ok) _twLexicon=await r.json();
      }catch(e){/* lexicon unavailable */}
    }

    // Load natal chart using birth data
    const user=readSublunaUser();
    if(!user||!user.birth||!user.birth.date||!user.birth.lat){
      text.innerHTML='<span class="tw-prompt">add birth info in settings for personalized readings</span>';
      return;
    }

    try{
      // Get UTC offset from open-meteo using birth location
      const tzRes=await fetch('https://api.open-meteo.com/v1/forecast?latitude='+user.birth.lat+
        '&longitude='+user.birth.lon+'&timezone=auto&forecast_days=1&hourly=temperature_2m');
      const tzData=await tzRes.json();
      const offsetH=(tzData.utc_offset_seconds||0)/3600;
      const offsetStr=(offsetH>=0?'+':'')+offsetH;

      // Build time string Signal expects: "HH:MM MM/DD/YYYY +/-offset"
      let [h,min]=user.birth.time.split(':').map(Number);
      if(user.birth.ampm==='PM'&&h<12) h+=12;
      if(user.birth.ampm==='AM'&&h===12) h=0;
      const timeStr=String(h).padStart(2,'0')+':'+String(min).padStart(2,'0')+
        ' '+user.birth.date+' '+offsetStr;

      const chartRes=await fetch('https://signal-hazel-mu.vercel.app/api/chat?target=chart'+
        '&time='+encodeURIComponent(timeStr)+
        '&lat='+user.birth.lat+'&lng='+user.birth.lon);
      if(!chartRes.ok) throw new Error('chart HTTP '+chartRes.status);
      const chartData=await chartRes.json();

      _twNatal=chartData.planets||[];
      text.innerHTML='<span class="tw-prompt">select a planet to learn more</span>';

    }catch(e){
      text.innerHTML='<span class="tw-prompt">could not load chart — '+e.message+'</span>';
    }
  }

  // ═══════════════════════════════════════════════════════════════════════
  // NAV COMPUTER + SCOPE ENGINE
  // ═══════════════════════════════════════════════════════════════════════

  const SIGNAL_ORACLE = 'https://signal-hazel-mu.vercel.app/api/oracle';
  let _lastNavVocab = []; // expandedVocab from last navRun — used by scope scoring

  async function navRun() {
    const input   = document.getElementById('nav-question');
    const btn     = document.getElementById('nav-submit-btn');
    const status  = document.getElementById('nav-status');
    const readout = document.getElementById('nav-readout');
    if (!input || !btn || !status || !readout) return;

    const question = (input.value || '').trim();
    if (!question) {
      status.textContent = 'no destination entered';
      return;
    }

    btn.disabled = true;
    status.className = 'nav-status loading';
    status.textContent = 'plotting course…';
    readout.innerHTML = '';
    
    // Play navigation sound
    try {
      const audio = new Audio('./AUDIO/navigation.mp3');
      audio.play().catch(e => console.log('audio error:', e));
    } catch(e) {
      console.log('audio not available');
    }

    // Pass natal data if loaded by the transits widget
    const natal = (_twNatal && _twNatal.length) ? _twNatal : [];

    try {
      const res = await fetch(SIGNAL_ORACLE, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, natal }),
      });

      if (res.status === 429) {
        status.className = 'nav-status';
        status.textContent = 'oracle at capacity — retry in 1h';
        btn.disabled = false;
        return;
      }
      if (!res.ok) throw new Error('signal HTTP ' + res.status);

      const data = await res.json();
      if (data.error) throw new Error(data.error);

      const { origin, sector, destination } = data.nav || {};
      if (!origin) throw new Error('no nav data returned');

      // Store vocab for scope scoring
      _lastNavVocab = data.meta?.expandedVocab || [];

      status.className = 'nav-status';
      status.textContent = '';

      const sublunaText = data.subluna?.navigation;

      if (sublunaText) {
        const oracleLines = data.cards || [];
        const oracleHtml = oracleLines.map((l, i) =>
          `<div class="nav-oracle-line"><span class="nav-oracle-num">[${i+1}]</span> ${l}</div>`
        ).join('');
        const destSplit = sublunaText.replace(/(destination:)/i, '|||$1');
        const parts = destSplit.split('|||');
        const mainText = parts[0];
        const destText = parts[1] ? `<span class="nav-destination">${parts[1]}</span>` : '';
        readout.innerHTML = `
          <div class="nav-subluna-text" id="nav-subluna-out">${mainText}${destText}</div>
          <div class="nav-oracle-lines" id="nav-oracle-reveal" style="display:none">${oracleHtml}</div>
        `;
        // Triple-click on the text reveals oracle lines (debug mode)
        let _clickTimer = null, _clickCount = 0;
        document.getElementById('nav-subluna-out').addEventListener('click', function() {
          _clickCount++;
          clearTimeout(_clickTimer);
          _clickTimer = setTimeout(() => {
            if (_clickCount >= 3) {
              const el = document.getElementById('nav-oracle-reveal');
              if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
            }
            _clickCount = 0;
          }, 400);
        });
      } else {
        readout.innerHTML = `
          <div class="nav-row">
            <span class="nav-row-label nav-origin">origin</span>
            <span class="nav-row-text">${origin}</span>
          </div>
          <div class="nav-row">
            <span class="nav-row-label nav-sector">sector</span>
            <div class="nav-sector-list">
              ${(sector || []).map(s => `<div class="nav-sector-item">${s}</div>`).join('')}
            </div>
          </div>
          <div class="nav-row">
            <span class="nav-row-label nav-dest">destination</span>
            <span class="nav-row-text">${destination}</span>
          </div>
          
        `;
      }

      // Load star chart on first successful nav plot
      if (typeof starChartReveal === 'function') starChartReveal();

      // Trigger scope panel
      scopeRun(_lastNavVocab);

    } catch(e) {
      status.className = 'nav-status';
      status.textContent = 'signal lost — ' + (e.message || 'unknown').slice(0, 80);
      readout.innerHTML = '';
    }

    btn.disabled = false;
  }

  // ── Scope engine ─────────────────────────────────────────────────────────
  // Loads horoscope, scores its sentences against nav vocab, surfaces the
  // top-resonance lines as "frequencies" and shows the full reading below.

  let _scopeHoroCache = {};

  async function scopeRun(navVocab) {
    const panel    = document.getElementById('scope-panel');
    const signEl   = document.getElementById('scope-sign');
    const freqEl   = document.getElementById('scope-freq');
    const textEl   = document.getElementById('scope-text');
    if (!panel || !textEl) return;

    panel.style.display = 'block';
    if (textEl) textEl.innerHTML = '<span class="scope-loading">receiving frequencies…</span>';
    if (freqEl) freqEl.innerHTML = '';

    const user = readSublunaUser();
    if (!user || !user.birth || !user.birth.date) {
      textEl.textContent = 'add birth date in settings for scope';
      return;
    }

    const sign = getSunSignFromDate(user.birth.date);
    if (!sign) { textEl.textContent = 'could not determine sign'; return; }

    if (signEl) signEl.textContent = 'SOLAR SCOPE';

    const today = new Date().toISOString().slice(0, 10);
    const cacheKey = `${sign}:${today}`;

    let reading = _scopeHoroCache[cacheKey] || null;
    if (!reading) {
      try {
        const r = await fetch(`/api/horoscope?sign=${encodeURIComponent(sign)}&period=daily`);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const json = await r.json();
        reading = json?.data?.horoscope || null;
        if (!reading) throw new Error('no reading in response');
        
        // Strip "Today, [sign]," from the beginning if present and replace with personalized version
        reading = reading.replace(/^Today,\s+\w+,\s+/, `Today, ${user.name || 'friend'}, `);
        
        _scopeHoroCache[cacheKey] = reading;
      } catch(e) {
        textEl.textContent = 'scope unavailable — ' + e.message;
        return;
      }
    }

    // Simply display the full horoscope reading without scoring
    if (freqEl) freqEl.innerHTML = '';
    textEl.innerHTML = reading;
  }

  </script>
