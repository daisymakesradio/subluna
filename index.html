  <script>
  // ── Weather ───────────────────────────────────────────────────────────────
  const WX_ICONS = {
    0:'N',  // sun
    1:'C',  // sun + cloud
    2:'C',  // sun + cloud
    3:'P',  // cloud (overcast)
    45:'F', // wind cloud (fog)
    48:'F', // wind cloud (fog)
    51:'M', // light rain
    53:'M', // rain
    55:'M', // heavy rain
    61:'M', // light rain
    63:'M', // rain
    65:'B', // heavy rain drops
    71:'D', // snow
    73:'D', // snow
    75:'D', // heavy snow
    80:'M', // showers
    81:'B', // heavy showers
    82:'A', // violent showers + thunder
    95:'A', // thunderstorm
    96:'A', // thunderstorm
    99:'A', // severe thunderstorm
  };
  const WX_DESC = {
    0:'clear sky',1:'mainly clear',2:'partly cloudy',3:'overcast',
    45:'fog',48:'icy fog',
    51:'light drizzle',53:'drizzle',55:'heavy drizzle',
    61:'light rain',63:'rain',65:'heavy rain',
    71:'light snow',73:'snow',75:'heavy snow',
    80:'light showers',81:'showers',82:'violent showers',
    95:'thunderstorm',96:'thunderstorm w/ hail',99:'severe thunderstorm',
  };
  const WTTR_TO_WMO = {
    113:0,116:2,119:3,122:3,143:45,176:61,179:71,182:61,185:51,200:95,
    227:73,230:75,248:45,260:48,263:51,266:51,281:51,284:55,293:61,296:61,
    299:63,302:63,305:65,308:65,311:61,314:63,317:80,320:81,323:71,326:71,
    329:73,332:73,335:75,338:75,350:61,353:80,356:81,359:82,362:80,365:81,
    368:71,371:73,374:61,377:63,386:95,389:95,392:95,395:99
  };

  function wxSaveLocation(d){ localStorage.setItem(WX_STORAGE_KEY, JSON.stringify(d)); }
  function wxLoadLocation(){ try{ return JSON.parse(localStorage.getItem(WX_STORAGE_KEY)); }catch(e){ return null; } }

  function wxSetStatus(msg){ const el=document.getElementById('wx-loc-status'); if(el) el.textContent=msg; }

  function wxRender({ icon, temp, hilo, locName, desc, hourly }) {
    const main = document.getElementById('wx-main');
    document.getElementById('wx-icon').innerHTML = icon;
    document.getElementById('wx-temp').textContent = temp;
    const hiloEl = document.getElementById('wx-hilo'); if(hiloEl) hiloEl.innerHTML = hilo||'';
    const locEl = document.getElementById('wx-loc-name'); if(locEl) locEl.textContent = locName||'';
    document.getElementById('wx-desc').textContent = desc;
    // Hourly strip
    const hrEl = document.getElementById('wx-hourly');
    if(hrEl && hourly && hourly.length) {
      hrEl.innerHTML = hourly.map(h =>
        `<div class="wx-hr">
          <div class="wx-hr-time">${h.label}</div>
          <span class="wx-hr-icon" style="font-family:'WeatherSymbols',sans-serif;">${WX_ICONS[h.code]||'—'}</span>
          <div class="wx-hr-temp">${h.temp}</div>
        </div>`
      ).join('');
    }
    if(main) main.style.display = 'block';
    wxSetStatus('');
  }

  // ── Primary: wttr.in ──────────────────────────────────────────────────────
  async function loadWeatherWttr(lat, lon) {
    const r = await fetch(`https://wttr.in/${lat},${lon}?format=j1`);
    if(!r.ok) throw new Error('wttr.in ' + r.status);
    const d = await r.json();
    const cur = d.current_condition?.[0] || {};
    const today = d.weather?.[0] || {};

    const code = WTTR_TO_WMO[parseInt(cur.weatherCode)] ?? 0;
    const icon = `<span style="font-family:'WeatherSymbols',sans-serif;font-size:2rem;">${WX_ICONS[code]||'—'}</span>`;
    const desc = WX_DESC[code] || cur.weatherDesc?.[0]?.value || '';
    const temp = cur.temp_F ? Math.round(cur.temp_F) + '°F' : '—';
    const feels = cur.FeelsLikeF ? Math.round(cur.FeelsLikeF) + '°F' : '—';
    const wind = parseInt(cur.windspeedMiles) || 0;
    const hi = today.maxtempF ? Math.round(today.maxtempF) + '°F' : null;
    const lo = today.mintempF ? Math.round(today.mintempF) + '°F' : null;
    const hilo = (hi && lo) ? `${hi} ↑  ${lo} ↓` : '';

    // Hourly — wttr gives 3-hour slots; pull 8 slots (24h) across midnight
    const todaySlots    = (today.hourly || []);
    const tomorrowSlots = (d.weather?.[1]?.hourly || []).map(h => ({ ...h, _nextDay: true }));
    const allSlots      = [...todaySlots, ...tomorrowSlots];
    const now = new Date();
    const curH = now.getHours();
    const hourly = allSlots
      .filter(h => {
        const hh = parseInt(h.time) / 100;
        // today: only slots from current hour onward; tomorrow: all slots
        return h._nextDay || hh >= curH;
      })
      .slice(0, 8)
      .map(h => {
        const hCode = WTTR_TO_WMO[parseInt(h.weatherCode)] ?? 0;
        const hh = parseInt(h.time) / 100;
        const label = hh === 0 ? '12am' : hh < 12 ? hh + 'am' : hh === 12 ? '12pm' : (hh-12) + 'pm';
        return { label, code: hCode, temp: Math.round(h.tempF) + '°' };
      });

    // Reverse geocode for name
    let locName = '';
    try {
      const gr = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`, { headers: { 'Accept-Language': 'en' } });
      const gd = await gr.json();
      locName = gd.address?.city || gd.address?.town || gd.address?.county || '';
    } catch(_) {}

    wxRender({ icon, temp, hilo, locName, desc: `${desc} · feels ${feels} · wind ${wind} mph`, hourly });
  }

  // ── Fallback: open-meteo ──────────────────────────────────────────────────
  async function loadWeatherMeteo(lat, lon) {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
      `&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m` +
      `&hourly=temperature_2m,weather_code` +
      `&daily=weather_code,temperature_2m_max,temperature_2m_min` +
      `&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=auto&forecast_days=6`;
    const r = await fetch(url);
    if(!r.ok) throw new Error('open-meteo ' + r.status);
    const d = await r.json();
    const cur = d.current || {};
    const daily = d.daily || {};
    const code = cur.weather_code ?? 0;
    const icon = `<span style="font-family:'WeatherSymbols',sans-serif;font-size:2rem;">${WX_ICONS[code]||'—'}</span>`;
    const desc = WX_DESC[code] || '';
    const temp = cur.temperature_2m != null ? Math.round(cur.temperature_2m) + '°F' : '—';
    const feels = cur.apparent_temperature != null ? Math.round(cur.apparent_temperature) + '°F' : '—';
    const wind = cur.wind_speed_10m != null ? Math.round(cur.wind_speed_10m) : 0;
    const hi = daily.temperature_2m_max?.[0] != null ? Math.round(daily.temperature_2m_max[0]) + '°F' : null;
    const lo = daily.temperature_2m_min?.[0] != null ? Math.round(daily.temperature_2m_min[0]) + '°F' : null;
    const hilo = (hi && lo) ? `${hi} ↑  ${lo} ↓` : '';

    // Hourly — next 6 slots from current hour
    const hourly_d = d.hourly || {};
    const nowDate = new Date();
    let startIdx = 0;
    if(hourly_d.time) {
      for(let i = 0; i < hourly_d.time.length; i++) {
        if(new Date(hourly_d.time[i]) >= nowDate) { startIdx = i; break; }
      }
    }
    const hourly = (hourly_d.time || []).slice(startIdx, startIdx + 8).map((t, i) => {
      const idx = startIdx + i;
      const hCode = hourly_d.weather_code[idx] ?? 0;
      const hDate = new Date(t);
      const hh = hDate.getHours();
      const label = hh === 0 ? '12am' : hh < 12 ? hh + 'am' : hh === 12 ? '12pm' : (hh-12) + 'pm';
      return { label, code: hCode, temp: Math.round(hourly_d.temperature_2m[idx]) + '°' };
    });

    let locName = '';
    try {
      const gr = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`, { headers: { 'Accept-Language': 'en' } });
      const gd = await gr.json();
      locName = gd.address?.city || gd.address?.town || gd.address?.county || '';
    } catch(_) {}

    wxRender({ icon, temp, hilo, locName, desc: `${desc} · feels ${feels} · wind ${wind} mph`, hourly });
  }

  // ── Main load with fallback chain ─────────────────────────────────────────
  async function wxLoadWeather(lat, lon) {
    wxSetStatus('loading…');
    try {
      await loadWeatherWttr(lat, lon);
    } catch(e) {
      console.warn('wttr.in failed, trying open-meteo:', e);
      try {
        await loadWeatherMeteo(lat, lon);
      } catch(e2) {
        wxSetStatus('weather unavailable');
        console.warn('open-meteo also failed:', e2);
      }
    }
  }

  function wxApplyLocation(loc) {
    const inp = document.getElementById('wx-city-input');
    if(inp) inp.value = loc.name || '';
    wxLoadWeather(loc.lat, loc.lon);
  }

  // ── City autocomplete ─────────────────────────────────────────────────────
  let _wxCityTimer = null;
  async function wxCityInput(val) {
    clearTimeout(_wxCityTimer);
    const box = document.getElementById('wx-suggestions');
    if(val.length < 2) { box.style.display = 'none'; return; }
    _wxCityTimer = setTimeout(async () => {
      try {
        const r = await fetch('https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=5&q=' + encodeURIComponent(val), { headers: { 'Accept-Language': 'en' } });
        const data = await r.json();
        box.innerHTML = data.map(p => {
          const name = p.address?.city || p.address?.town || p.address?.county || p.display_name;
          const country = p.address?.country_code?.toUpperCase() || '';
          return `<div class="wx-suggestion" onclick="wxPickSuggestion('${name.replace(/'/,"\\'")}',${p.lat},${p.lon})">${name}${country ? ' <span style="opacity:.5;font-size:9px">'+country+'</span>' : ''}</div>`;
        }).join('');
        box.style.display = data.length ? 'block' : 'none';
      } catch(_) {}
    }, 320);
  }

  function wxPickSuggestion(name, lat, lon) {
    const loc = { name, lat: parseFloat(lat), lon: parseFloat(lon) };
    wxSaveLocation(loc);
    wxApplyLocation(loc);
    const box = document.getElementById('wx-suggestions');
    if(box) box.style.display = 'none';
    const inp = document.getElementById('wx-city-input');
    if(inp) inp.value = name;
  }

  async function wxCitySubmit() {
    const val = document.getElementById('wx-city-input')?.value.trim();
    if(!val) return;
    wxSetStatus('searching…');
    try {
      const r = await fetch('https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=1&q=' + encodeURIComponent(val), { headers: { 'Accept-Language': 'en' } });
      const data = await r.json();
      if(!data.length) { wxSetStatus('not found'); return; }
      const p = data[0];
      const name = p.address?.city || p.address?.town || p.address?.county || p.display_name;
      wxPickSuggestion(name, p.lat, p.lon);
    } catch(_) { wxSetStatus('error'); }
  }

  // ── Geolocation ───────────────────────────────────────────────────────────
  function wxGeolocate() {
    const typed = document.getElementById('wx-city-input')?.value.trim();
    if(typed) { wxCitySubmit(); return; }
    if(!navigator.geolocation) { wxSetStatus('geolocation unavailable'); return; }
    wxSetStatus('locating…');
    navigator.geolocation.getCurrentPosition(async pos => {
      const lat = pos.coords.latitude, lon = pos.coords.longitude;
      try {
        const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`, { headers: { 'Accept-Language': 'en' } });
        const d = await r.json();
        const name = d.address?.city || d.address?.town || d.address?.county || d.display_name || 'your location';
        const loc = { name, lat, lon };
        wxSaveLocation(loc);
        wxApplyLocation(loc);
      } catch(_) { wxSetStatus('error'); }
    }, () => { wxSetStatus('permission denied'); });
  }

  // ── Init ────────────────────────────────────────────────────────────────
  // Previously this only ran when the sidebar was first opened, which meant
  // the user would visibly watch the weather populate (—  → "loading…" →
  // real data) right in front of them. Now it prefetches quietly in the
  // background shortly after page load, so by the time the sidebar opens
  // the data is already sitting there ready — no visible pop-in.
  let _wxInited = false;
  function wxEnsureInit() {
    if(_wxInited) return;
    _wxInited = true;
    const saved = wxLoadLocation();
    if(saved) {
      wxApplyLocation(saved);
    } else {
      wxSetStatus('enter a city or tap ◎');
    }
  }

  // Kick off the background prefetch once the page has settled, rather
  // than blocking initial render. requestIdleCallback runs it when the
  // browser is free; falls back to a short timeout where unsupported.
  if ('requestIdleCallback' in window) {
    requestIdleCallback(() => wxEnsureInit());
  } else {
    setTimeout(() => wxEnsureInit(), 800);
  }

  // Close suggestions when clicking outside
  document.addEventListener('click', e => {
    if(!e.target.closest('#wx-loc-row')) {
      const box = document.getElementById('wx-suggestions');
      if(box) box.style.display = 'none';
    }
  });

  // ── Mirror star-chart background into sidebar ─────────────────────────────
  (function() {
    function syncSidebarChart() {
      const src = document.getElementById('bb-bg-chart');
      const dst = document.getElementById('sidebar-bg-chart');
      if (!src || !dst) return;
      const img = src.style.backgroundImage;
      if (img) dst.style.backgroundImage = img;
    }
    // Sync on DOM ready and whenever bb-bg-chart's style changes
    document.addEventListener('DOMContentLoaded', () => {
      syncSidebarChart();
      const src = document.getElementById('bb-bg-chart');
      if (src) {
        new MutationObserver(syncSidebarChart).observe(src, {
          attributes: true, attributeFilter: ['style']
        });
      }
    });
  })();

  // ── DAILY HOROSCOPE ───────────────────────────────────────────────────────
  // Pulled from a real API (freehoroscopeapi.com via the /api/horoscope
  // Vercel proxy in this project — see api/horoscope.js). No locally
  // generated/templated text. getSunSignFromDate() below is just date math
  // to pick *which* sign to query; it does not author any horoscope content.
  let _horoCache = {};

  function getSunSignFromDate(dateStr) {
    // dateStr format: MM/DD/YYYY
    const parts = dateStr.split('/');
    if (parts.length < 2) return null;
    const m = parseInt(parts[0], 10);
    const d = parseInt(parts[1], 10);
    if (!m || !d) return null;
    if ((m === 3 && d >= 21) || (m === 4 && d <= 19)) return 'aries';
    if ((m === 4 && d >= 20) || (m === 5 && d <= 20)) return 'taurus';
    if ((m === 5 && d >= 21) || (m === 6 && d <= 20)) return 'gemini';
    if ((m === 6 && d >= 21) || (m === 7 && d <= 22)) return 'cancer';
    if ((m === 7 && d >= 23) || (m === 8 && d <= 22)) return 'leo';
    if ((m === 8 && d >= 23) || (m === 9 && d <= 22)) return 'virgo';
    if ((m === 9 && d >= 23) || (m === 10 && d <= 22)) return 'libra';
    if ((m === 10 && d >= 23) || (m === 11 && d <= 21)) return 'scorpio';
    if ((m === 11 && d >= 22) || (m === 12 && d <= 21)) return 'sagittarius';
    if ((m === 12 && d >= 22) || (m === 1 && d <= 19)) return 'capricorn';
    if ((m === 1 && d >= 20) || (m === 2 && d <= 18)) return 'aquarius';
    return 'pisces';
  }

  async function loadHoroscope() {
    const user = readSublunaUser();
    if (!user || !user.birth || !user.birth.date) return;
    const sign = getSunSignFromDate(user.birth.date);
    if (!sign) return;

    const signEl = document.getElementById('horo-sign-name');
    const textEl = document.getElementById('horo-text');
    if (!textEl) return;
    if (signEl) signEl.textContent = sign.toUpperCase();

    const today = new Date().toISOString().slice(0, 10); // e.g. "2026-06-22"
    const cacheKey = `${sign}:${today}`;
    if (_horoCache[cacheKey]) { textEl.textContent = _horoCache[cacheKey]; return; }

    textEl.textContent = 'loading…';
    try {
      const r = await fetch(`/api/horoscope?sign=${encodeURIComponent(sign)}&period=daily`);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const json = await r.json();
      const reading = json && json.data && json.data.horoscope;
      if (!reading) throw new Error('no horoscope in response');

      // The upstream API has occasionally echoed back a different sign than
      // requested. Trust the sign label *we* asked for (computed from the
      // user's real birthdate) over whatever the response claims, since
      // that's what's actually being displayed as the section header.
      _horoCache[cacheKey] = reading;
      textEl.textContent = reading;
    } catch (e) {
      textEl.textContent = `Couldn't load today's horoscope — ${e.message}`;
    }
  }

  // Horoscope lazy-load now happens inside sidebarSetOpen() above.

</script>

  <script>
  // ═══════════════════════════════════════════════════════════════════════
  // SUBLUNA WIDGET ENGINE
  // ═══════════════════════════════════════════════════════════════════════
  const WIDGET_STORAGE_KEY = 'subluna_widgets_v2'; // bumped — new unified system

  // ── Registry: built-ins first, then optional add-ons ───────────────────
  // builtin:true  → seeded in default order; can still be removed/reordered
  // render        → fn(container). For weather/horoscope we move existing DOM
  //                 nodes into the widget body rather than re-rendering from scratch.
  const WIDGET_REGISTRY = [
    {
      id: 'weather',
      name: 'Weather',
      description: 'Current conditions + hourly forecast for your location',
      builtin: true,
      render(body) {
        // Adopt the wx-main shell into this widget body

          shell.style.display = 'block';
          body.appendChild(shell);
        }
        wxEnsureInit();
      },
    },
    {
      id: 'horoscope',
      name: 'Horoscope',
      description: 'Daily reading for your sun sign',
      builtin: true,
      render(body) {
        const shell = document.getElementById('horo-section');
        if (shell) {
          shell.style.display = 'block';
          body.appendChild(shell);
        }
        if (!_horoLoaded) { _horoLoaded = true; loadHoroscope(); }
      },
    },
    {
      id: 'moon-phase',
      name: 'Moon Phase',
      description: 'Phase, illumination, rise/set, sign + meaning',
      render: renderMoonWidget,
    },
    {
      id: '5day-forecast',
      name: 'Five-Day Forecast',
      description: 'Daily high/low and conditions for the next 5 days',
      render: renderFiveDayWidget,
    },
    // future widgets go here
    {
      id: 'spells',
      name: 'Spells',
      description: 'Moon-phase spells from the grimoire',
      render: renderSpellsWidget,
    },
    {
      id: 'transits',
      name: 'Transits',
      description: 'Current planetary transits + personalized readings',
      render: renderTransitsWidget,
    },
  ];

  // ── Persistence ────────────────────────────────────────────────────────
  function widgetLoadOrder() {
    try {
      const saved = JSON.parse(localStorage.getItem(WIDGET_STORAGE_KEY) || 'null');
      if (Array.isArray(saved)) return saved;
    } catch(_) {}
    // First run — seed with built-in defaults
    const defaults = WIDGET_REGISTRY.filter(w => w.builtin).map(w => w.id);
    widgetSaveOrder(defaults);
    return defaults;
  }
  function widgetSaveOrder(ids) {
    localStorage.setItem(WIDGET_STORAGE_KEY, JSON.stringify(ids));
  }

  // ── Picker (unified manage panel with drag-to-reorder) ─────────────────
  function widgetPickerOpen() {
    const picker = document.getElementById('widget-picker');
    const list   = document.getElementById('widget-picker-list');
    if (!picker || !list) return;

    const active = widgetLoadOrder();
    list.innerHTML = '';

    // Section 1: active widgets in current order (drag to reorder)
    const activeDefs = active.map(id => WIDGET_REGISTRY.find(w => w.id === id)).filter(Boolean);
    if (activeDefs.length) {
      const sectionLabel = document.createElement('div');
      sectionLabel.style.cssText = 'font-size:7px;letter-spacing:.22em;color:var(--dust);opacity:.5;text-transform:uppercase;padding:.5rem 0 .35rem;';
      sectionLabel.textContent = 'active — drag to reorder';
      list.appendChild(sectionLabel);

      activeDefs.forEach(w => {
        const item = document.createElement('div');
        item.className = 'widget-picker-item';
        item.dataset.wid = w.id;
        item.innerHTML = `
          <span class="picker-drag-handle" title="drag to reorder">⠿</span>
          <div style="flex:1;min-width:0">
            <div class="widget-picker-item-name">${w.name}</div>
            <div class="widget-picker-item-desc">${w.description}</div>
          </div>
          <button class="widget-picker-item-action" style="color:rgba(224,85,64,.7);border-color:rgba(224,85,64,.25);"
            data-action="remove" data-wid="${w.id}">REMOVE</button>`;
        list.appendChild(item);
      });
    }

    // Section 2: inactive widgets available to add
    const inactiveDefs = WIDGET_REGISTRY.filter(w => !active.includes(w.id));
    if (inactiveDefs.length) {
      const sectionLabel = document.createElement('div');
      sectionLabel.style.cssText = 'font-size:7px;letter-spacing:.22em;color:var(--dust);opacity:.5;text-transform:uppercase;padding:.85rem 0 .35rem;border-top:.5px solid var(--faint);margin-top:.5rem;';
      sectionLabel.textContent = 'available';
      list.appendChild(sectionLabel);

      inactiveDefs.forEach(w => {
        const item = document.createElement('div');
        item.className = 'widget-picker-item';
        item.dataset.wid = w.id;
        item.innerHTML = `
          <div style="flex:1;min-width:0;padding-left:.1rem">
            <div class="widget-picker-item-name">${w.name}</div>
            <div class="widget-picker-item-desc">${w.description}</div>
          </div>
          <button class="widget-picker-item-action"
            data-action="add" data-wid="${w.id}">ADD</button>`;
        list.appendChild(item);
      });
    }

    // Delegate add/remove clicks
    list.onclick = e => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      if (btn.dataset.action === 'add') widgetAdd(btn.dataset.wid);
      else if (btn.dataset.action === 'remove') widgetRemove(btn.dataset.wid);
      widgetPickerOpen(); // refresh panel
    };

    // Drag-to-reorder inside picker
    pickerInitDrag(list);
    picker.classList.add('open');
  }

  function widgetPickerClose() {
    const picker = document.getElementById('widget-picker');
    if (picker) picker.classList.remove('open');
  }

  // ── Drag-to-reorder inside the picker list ─────────────────────────────
  // Uses a floating clone as the drag ghost so the user can see what they're
  // dragging. A solid insertion-line bar shows exactly where it will land.
  function pickerInitDrag(list) {
    // widgetPickerOpen() re-uses the same #widget-picker-list node on every
    // open (only its children are wiped), but it calls pickerInitDrag()
    // every time too. Without this guard, every reopen/refresh stacked a
    // fresh set of pointer listeners on the same node — so after a few
    // drags you'd have N duplicate handlers all firing per event, which is
    // what was causing widgets to appear to "duplicate".
    if (list.dataset.dragInit === '1') return;
    list.dataset.dragInit = '1';

    let dragged = null;
    let ghost   = null;
    let bar     = null; // insertion indicator
    let insertBefore = null; // target node to insert before (null = append)
    let activePointerId = null;

    // Reuse a single bar across calls instead of appending a new one
    // every time the picker re-renders (was leaking <div>s into <body>).
    bar = document.getElementById('picker-drag-bar');
    if (!bar) {
      bar = document.createElement('div');
      bar.id = 'picker-drag-bar';
      bar.style.cssText = `
        position:fixed; left:0; right:0; height:2px;
        background:var(--signal); pointer-events:none;
        z-index:99999; display:none; border-radius:1px;
        box-shadow:0 0 6px var(--signal);
      `;
      document.body.appendChild(bar);
    }

    function activeRows() {
      return [...list.querySelectorAll('.widget-picker-item[data-wid]')]
        .filter(r => r.querySelector('.picker-drag-handle'));
    }

    function commit() {
      if (!dragged) return false;
      // Apply DOM move
      if (insertBefore) {
        list.insertBefore(dragged, insertBefore);
      } else {
        // append after last active row
        const rows = activeRows();
        const last = rows[rows.length - 1];
        if (last && last !== dragged) last.after(dragged);
      }
      // Persist
      const newOrder = activeRows().map(r => r.dataset.wid);
      widgetSaveOrder(newOrder);
      return true;
    }

    function cleanup() {
      if (ghost) { ghost.remove(); ghost = null; }
      bar.style.display = 'none';
      if (dragged) dragged.style.opacity = '';
      dragged = null;
      insertBefore = null;
      activePointerId = null;
    }

    function finishDrag(shouldCommit) {
      // Release capture BEFORE any re-render, so a detached/replaced
      // handle never keeps the pointer captured.
      if (activePointerId !== null) {
        try { list.releasePointerCapture(activePointerId); } catch (_) {}
      }
      const changed = shouldCommit ? commit() : false;
      cleanup();
      if (changed) {
        widgetRenderAll();
        widgetPickerOpen();
      }
    }

    // Capture on the LIST, not the handle — handles get destroyed/recreated
    // on re-render, which silently breaks capture and leaves the drag stuck.
    list.addEventListener('pointerdown', e => {
      const handle = e.target.closest('.picker-drag-handle');
      if (!handle) return;
      // If a previous drag never cleaned up (stuck pointer), clear it first
      // instead of stacking a second drag on top (this was the duplication bug).
      if (dragged) { finishDrag(false); }

      e.preventDefault();
      e.stopPropagation();
      const row = handle.closest('.widget-picker-item');
      dragged = row;
      dragged.style.opacity = '0.35';
      activePointerId = e.pointerId;

      // Create ghost
      const rect = row.getBoundingClientRect();
      ghost = row.cloneNode(true);
      ghost.style.cssText = `
        position:fixed; left:${rect.left}px; top:${rect.top}px;
        width:${rect.width}px; pointer-events:none; z-index:99998;
        background:#1a1410; border:.5px solid var(--signal);
        padding:.65rem 0; opacity:.92;
        box-shadow: 0 4px 18px rgba(0,0,0,.6);
      `;
      document.body.appendChild(ghost);
      list.setPointerCapture(e.pointerId);
    });

    list.addEventListener('pointermove', e => {
      if (!dragged || !ghost || e.pointerId !== activePointerId) return;
      e.preventDefault();

      // Move ghost
      const rect = dragged.getBoundingClientRect();
      ghost.style.top = (e.clientY - rect.height / 2) + 'px';

      // Find insertion point among active rows (excluding dragged)
      const rows = activeRows().filter(r => r !== dragged);
      insertBefore = null;
      bar.style.display = 'none';

      for (const r of rows) {
        const rr = r.getBoundingClientRect();
        const mid = rr.top + rr.height / 2;
        if (e.clientY < mid) {
          insertBefore = r;
          bar.style.display = 'block';
          bar.style.top = rr.top + 'px';
          break;
        }
      }
      // If past all rows, show bar after last row
      if (!insertBefore && rows.length) {
        const lastRect = rows[rows.length - 1].getBoundingClientRect();
        bar.style.display = 'block';
        bar.style.top = lastRect.bottom + 'px';
      }
    });

    list.addEventListener('pointerup', e => {
      if (!dragged || e.pointerId !== activePointerId) return;
      finishDrag(true);
    });

    list.addEventListener('pointercancel', e => {
      if (e.pointerId !== activePointerId) return;
      finishDrag(false);
    });

    // Safety net: if capture is lost for any reason (element removed from
    // DOM, browser revokes it, etc.) without a pointerup ever firing, this
    // fires and lets us clean up instead of leaving a stuck "ghost" drag.
    list.addEventListener('lostpointercapture', e => {
      if (e.pointerId !== activePointerId) return;
      finishDrag(true);
    });
  }

  // ── Add / remove ───────────────────────────────────────────────────────
  function widgetAdd(id) {
    const order = widgetLoadOrder();
    if (order.includes(id)) return;

    widgetSaveOrder(order);
    widgetRenderAll();
  }
  function widgetRemove(id) {
    const order = widgetLoadOrder().filter(x => x !== id);
    widgetSaveOrder(order);
    widgetRenderAll();
  }

  }

  // ── Init on sidebar open ───────────────────────────────────────────────
  let _widgetsInited = false;

  // ═══════════════════════════════════════════════════════════════════════
  // MOON PHASE WIDGET

  const MOON_SIGNS = [
    { name: 'Aries',       sym: '♈', energy: 'bold, impulsive',      spell: 'new beginnings and courage',       garden: 'plant above-ground crops' },
    { name: 'Taurus',      sym: '♉', energy: 'steady, sensual',      spell: 'abundance and earth magic',        garden: 'plant root vegetables' },

  ];

  const MOON_PHASE_NAMES = [
    { max: 0.033, name: 'New Moon' },
    { max: 0.25,  name: 'Waxing Crescent' },
    { max: 0.283, name: 'First Quarter' },
    { max: 0.5,   name: 'Waxing Gibbous' },
    { max: 0.533, name: 'Full Moon' },
    { max: 0.75,  name: 'Waning Gibbous' },
    { max: 0.783, name: 'Last Quarter' },
    { max: 1.0,   name: 'Waning Crescent' },
  ];

  function moonPhaseName(phase) {
    return (MOON_PHASE_NAMES.find(p => phase <= p.max) || { name: 'Waning Crescent' }).name;
  }

  function moonSign(date) {
    // Moon moves ~13.2°/day. Use a known New Moon in Aries as epoch.
    // Jan 29 2025 12:36 UTC = New Moon ~0° Aries
    const EPOCH = Date.UTC(2025, 0, 29, 12, 36);
    const CYCLE_MS = 29.53058867 * 24 * 60 * 60 * 1000;
    const SIGN_DEG = 30;
    const elapsed = date.getTime() - EPOCH;
    const cyclePos = ((elapsed % CYCLE_MS) + CYCLE_MS) % CYCLE_MS;
    const moonLon = (cyclePos / CYCLE_MS) * 360;
    const signIndex = Math.floor(moonLon / SIGN_DEG) % 12;
    return MOON_SIGNS[signIndex];
  }

  function fmtTime(date) {
    if (!date || isNaN(date)) return '—';
    let h = date.getHours(), m = date.getMinutes();
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    return `${h}:${String(m).padStart(2,'0')} ${ampm}`;
  }

  function renderMoonWidget(container) {
    if (!window.SunCalc) { container.innerHTML = '<div class="moon-meta">suncalc not loaded</div>'; return; }
    const user = readSublunaUser();
    const now  = new Date();

    // Use user's weather location for rise/set, fall back to 0,0
    const lat = user?.weather?.lat || 0;
    const lon = user?.weather?.lon || 0;

    const moonIllum  = SunCalc.getMoonIllumination(now);
    const moonPos    = SunCalc.getMoonPosition(now, lat, lon);
    const moonTimes  = SunCalc.getMoonTimes(now, lat, lon);

    const phase      = moonIllum.phase;          // 0–1
    const illumPct   = Math.round(moonIllum.fraction * 100);
    const phaseName  = moonPhaseName(phase);
    const rise       = moonTimes.rise ? fmtTime(moonTimes.rise) : '—';
    const set        = moonTimes.set  ? fmtTime(moonTimes.set)  : '—';
    const sign       = moonSign(now);

    container.innerHTML = `
      <div class="moon-phase-name">${phaseName}</div>
      <div class="moon-meta">
        <span>${illumPct}% illuminated</span> · rise <span>${rise}</span> · set <span>${set}</span> · moon in <span class="moon-sign-name">${sign.name} ${sign.sym}</span>
      </div>`;
  }

  // ── 5-DAY FORECAST WIDGET ──────────────────────────────────────────────
  async function renderFiveDayWidget(container) {
    const user = readSublunaUser();
    const lat  = user?.weather?.lat;
    const lon  = user?.weather?.lon;
    if (!lat || !lon) { container.innerHTML = '<div class="moon-meta">no location set</div>'; return; }

    container.innerHTML = '<div class="moon-meta">loading…</div>';
    try {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
        `&daily=weather_code,temperature_2m_max,temperature_2m_min` +
        `&temperature_unit=fahrenheit&timezone=auto&forecast_days=6`;
      const r = await fetch(url);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const d = await r.json();
      const daily = d.daily || {};
      const DAY_LABELS = ['SUN','MON','TUE','WED','THU','FRI','SAT'];

      // skip index 0 (today — already shown in current conditions), show next 5
      const rows = (daily.time || []).slice(1, 6).map((dateStr, i) => {
        const idx  = i + 1;
        const code = daily.weather_code[idx] ?? 0;
        const hi   = daily.temperature_2m_max[idx] != null ? Math.round(daily.temperature_2m_max[idx]) + '°' : '—';
        const lo   = daily.temperature_2m_min[idx] != null ? Math.round(daily.temperature_2m_min[idx]) + '°' : '—';
        const icon = `<span style="font-family:'WeatherSymbols',sans-serif;font-size:1.2rem;">${WX_ICONS[code]||'—'}</span>`;
        const desc = WX_DESC[code] || '';
        const dayLabel = DAY_LABELS[new Date(dateStr + 'T12:00:00').getDay()];
        return `<div class="fiveday-row">
          <span class="fiveday-day">${dayLabel}</span>
          <span class="fiveday-icon">${icon}</span>
          <span class="fiveday-desc">${desc}</span>
          <span class="fiveday-temps"><span>${hi}</span><span class="fiveday-lo">${lo}</span></span>
        </div>`;
      });
      container.innerHTML = `<div class="fiveday-list">${rows.join('')}</div>`;
    } catch(e) {
      container.innerHTML = `<div class="moon-meta">could not load — ${e.message}</div>`;
    }
  }

  // ═══════════════════════════════════════════════════════════════════════
  // SPELLS WIDGET
  // ═══════════════════════════════════════════════════════════════════════
  async function renderSpellsWidget(container) {
    container.innerHTML = '<div class="moon-meta">loading spells…</div>';
    try {
      const res = await fetch('https://signal-hazel-mu.vercel.app/JSON/spells.json');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();

      // Get current moon phase
      const moonIllum = window.SunCalc ? SunCalc.getMoonIllumination(new Date()) : null;
      const phase = moonIllum ? moonPhaseName(moonIllum.phase) : null;
      if (!phase) {
        container.innerHTML = '<div class="moon-meta">could not determine moon phase</div>';
        return;
      }

      // Pick one spell using lunar cycle index — same method as Signal
      // Counts lunar cycles since Jan 6 2000, steps through pool one per cycle
      const knownNew = new Date('2000-01-06T18:14:00Z').getTime();
      const lunarIndex = Math.floor((Date.now() - knownNew) / (29.530588853 * 24 * 60 * 60 * 1000));

      const cats = (data.phaseMap && data.phaseMap[phase]) || ['moon'];
      let spell = null;
      let category = null;
      for (const cat of cats) {
        const pool = (data.spells && data.spells[cat]) || [];
        if (pool.length) {
          spell = pool[lunarIndex % pool.length];
          category = cat;
          break;
        }
      }

      // Fallback to moon category
      if (!spell && data.spells && data.spells.moon && data.spells.moon.length) {
        spell = data.spells.moon[lunarIndex % data.spells.moon.length];
        category = 'moon';
      }

      if (!spell) {
        container.innerHTML = `<div class="moon-meta">no spell found for ${phase}</div>`;
        return;
      }

      container.innerHTML = `
        <div style="margin-top:0.8rem; font-size:7px;letter-spacing:.22em;color:var(--signal);text-transform:uppercase;margin-bottom:.4rem;opacity:.8;">${phase}</div>
        <div style="font-size:7px;letter-spacing:.22em;color:var(--dust);text-transform:uppercase;margin-bottom:0.0rem;">${category}</div>
        <div style="font-family:'Heading Now Book Italic',serif;font-size:1.05rem;color:var(--ink);margin-bottom:0.0rem;">${spell.title || ''}</div>
        <div style="font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:var(--dust);line-height:1.6;white-space:pre-line;">${spell.interpreted || spell.body || ''}</div>
      `;

    } catch(e) {
      container.innerHTML = `<div class="moon-meta">could not load spells — ${e.message}</div>`;
    }
  }


  // ═══════════════════════════════════════════════════════════════════════
  // TRANSITS WIDGET
  // ═══════════════════════════════════════════════════════════════════════

  const _TW_GLYPHS  = { Sun:'☉', Moon:'☽', Mercury:'☿', Venus:'♀', Mars:'♂', Jupiter:'♃', Saturn:'♄' };
  const _TW_SHORT   = { conjunction:'conj', sextile:'sext', square:'sq', trine:'trine', opposition:'opp' };
  const _TW_ANGLES  = { conjunction:0, sextile:60, square:90, trine:120, opposition:180 };
  const _TW_SIGNS   = ['Aries','Taurus','Gemini','Cancer','Leo','Virgo','Libra','Scorpio','Sagittarius','Capricorn','Aquarius','Pisces'];

  let _twLexicon    = null;
  let _twNatal      = null;
  let _twActive     = null;
  let _twContainer  = null;

  function _twTodayPlanets() {
    const now = new Date();
    const jd  = now.getTime() / 86400000 + 2440587.5;
    const m   = now.getMonth() + 1, day = now.getDate(), y = now.getFullYear();
    const doy = Math.floor((now - new Date(y,0,0)) / 86400000);
    function sunSign() {
      const r = [[3,21,'Aries'],[4,20,'Taurus'],[5,21,'Gemini'],[6,21,'Cancer'],
                 [7,23,'Leo'],[8,23,'Virgo'],[9,23,'Libra'],[10,23,'Scorpio'],
                 [11,22,'Sagittarius'],[12,22,'Capricorn'],[1,20,'Aquarius'],[2,19,'Pisces']];
      for (let i=0;i<r.length;i++){
        const [sm,sd,sn]=r[i],[nm,nd]=r[(i+1)%r.length];
        if((m===sm&&day>=sd)||(m===nm&&day<nd)) return sn;
      }
      return 'Capricorn';
    }
    function pSign(period,ref_jd,ref_idx){
      const deg=((jd-ref_jd)/period*360)%360;
      const abs=((ref_idx*30)+deg+3600)%360;
      return {sign:_TW_SIGNS[Math.floor(abs/30)%12],deg:Math.round(abs%30)};
    }
    return [
      {name:'Sun',    sign:sunSign(),             deg:Math.round(((doy-80+365)%365)%30)},
      {name:'Moon',   ...pSign(29.53,   2460676,2)},
      {name:'Mercury',...pSign(87.97,   2460650,10)},
      {name:'Venus',  ...pSign(224.7,   2460600,5)},
      {name:'Mars',   ...pSign(686.97,  2460400,2)},
      {name:'Jupiter',...pSign(4332.59, 2458600,1)},
      {name:'Saturn', ...pSign(10759.22,2458000,9)},
    ];
  }

  function _twAbsPos(sign,deg){
    return (_TW_SIGNS.indexOf(sign)<0?0:_TW_SIGNS.indexOf(sign)*30)+(deg||0);
  }

  function _twBestAspect(planetName) {
    if (!_twNatal || !_twNatal.length) return null;
    const tp = _twTodayPlanets().find(p => p.name === planetName);
    if (!tp) return null;
    const tPos = _twAbsPos(tp.sign, tp.deg);
    const TW_TARGETS = new Set(['Sun', 'Moon', 'Rising', 'Saturn']);
    let best = null;
    for (const np of _twNatal) {
      if (!TW_TARGETS.has(np.name)) continue;
      const nPos = _twAbsPos(np.sign, np.deg);
      let diff = Math.abs(tPos - nPos);
      if (diff > 180) diff = 360 - diff;
      for (const [type, angle] of Object.entries(_TW_ANGLES)) {
        const orb = Math.abs(diff - angle);
        if (orb <= 12 && (!best || orb < best.orb)) {
          best = { natalPlanet: np.name, aspect: type, orb, key: planetName + '_' + type + '_' + np.name };
        }
      }
    }
    return best;
  }

  function _twSelectPlanet(planetName){
    if(!_twContainer) return;
    const header=_twContainer.querySelector('.tw-reader-header');
    const text=_twContainer.querySelector('.tw-reader-text');
    _twContainer.querySelectorAll('.tw-planet').forEach(el=>el.classList.remove('tw-active'));
    if(_twActive===planetName){
      _twActive=null;
      header.innerHTML='';
      text.innerHTML='<span class="tw-prompt">select a planet to learn more</span>';
      return;
    }
    _twActive=planetName;
    _twContainer.querySelectorAll('.tw-planet[data-planet="'+planetName+'"]').forEach(el=>el.classList.add('tw-active'));
    const asp=_twBestAspect(planetName);
    const tGlyph=_TW_GLYPHS[planetName]||'';
    if(!asp){
      header.innerHTML=tGlyph+' '+planetName;
      text.innerHTML='<span class="tw-prompt">no close aspect to a natal planet right now</span>';
      return;
    }
    const nGlyph=_TW_GLYPHS[asp.natalPlanet]||'';
    const short=_TW_SHORT[asp.aspect]||asp.aspect;
    header.innerHTML=tGlyph+' '+planetName+' <span class="tw-badge">'+short+'</span> '+nGlyph+' natal '+asp.natalPlanet;
    const entry=_twLexicon?_twLexicon[asp.key]:null;
    if(entry){
      text.innerHTML=entry.split(/\n+/).filter(p=>p.trim()).map(p=>'<span style="display:block;margin-bottom:.55rem">'+p.trim()+'</span>').join('');
    } else {
      text.innerHTML='<span class="tw-prompt">no reading available for this transit</span>';
    }
  }

  function _twSignColor(sign){
    const fire  = ['Aries','Leo','Sagittarius'];
    const earth = ['Taurus','Virgo','Capricorn'];
    const air   = ['Gemini','Libra','Aquarius'];
    if (fire.includes(sign))  return 'var(--signal)';
    if (earth.includes(sign)) return 'var(--gold)';
    if (air.includes(sign))   return 'var(--dim)';
    return '#7ab4c8'; // water signs
  }

  async function renderTransitsWidget(container){
    _twContainer=container;
    _twActive=null;

    container.innerHTML=`
      <style>
        .tw-planets{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.8rem;}
        .tw-planet{font-family:'IBM Plex Mono',monospace;font-size:.68rem;letter-spacing:.04em;
          color:var(--dust);border:.5px solid var(--faint);padding:.25rem .5rem;
          cursor:pointer;transition:color .15s,border-color .15s;}
        .tw-planet.tw-active{color:var(--signal);border-color:var(--signal);}
        .tw-reader-header{font-family:'IBM Plex Mono',monospace;font-size:.72rem;
          color:var(--ink);margin-bottom:.5rem;min-height:1.2rem;}
        .tw-badge{font-size:.6rem;letter-spacing:.1em;color:var(--signal);
          border:.5px solid var(--signal);padding:.1rem .3rem;margin:0 .2rem;}
        .tw-reader-text{font-family:'IBM Plex Mono',monospace;font-size:.72rem;
          color:var(--dust);line-height:1.6;}
        .tw-prompt{font-style:italic;opacity:.6;}
      </style>
      <div class="tw-planets" id="tw-planet-list">loading…</div>
      <div class="tw-reader-header"></div>
      <div class="tw-reader-text"><span class="tw-prompt">select a planet to learn more</span></div>
    `;

    const planetList=container.querySelector('#tw-planet-list');
    const text=container.querySelector('.tw-reader-text');

    // Render planet pills immediately from local math
    const planets=_twTodayPlanets();
    planetList.innerHTML=planets.map(p=>
      '<span class="tw-planet" data-planet="'+p.name+'" onclick="_twSelectPlanet(\''+p.name+'\')">'+
      '<span style="margin-right:.2rem">'+((_TW_GLYPHS[p.name])||'')+'</span>'+p.name+
      ' in <span style="color:'+_twSignColor(p.sign)+'">'+p.sign+'</span></span>'
    ).join('');

    // Load transit lexicon from Signal
    if(!_twLexicon){
      try{
        const r=await fetch('https://signal-hazel-mu.vercel.app/JSON/transit-lexicon.json');
        if(r.ok) _twLexicon=await r.json();
      }catch(e){/* lexicon unavailable */}
    }

    // Load natal chart using birth data
    const user=readSublunaUser();
    if(!user||!user.birth||!user.birth.date||!user.birth.lat){
      text.innerHTML='<span class="tw-prompt">add birth info in settings for personalized readings</span>';
      return;
    }

    try{
      // Get UTC offset from open-meteo using birth location
      const tzRes=await fetch('https://api.open-meteo.com/v1/forecast?latitude='+user.birth.lat+
        '&longitude='+user.birth.lon+'&timezone=auto&forecast_days=1&hourly=temperature_2m');
      const tzData=await tzRes.json();
      const offsetH=(tzData.utc_offset_seconds||0)/3600;
      const offsetStr=(offsetH>=0?'+':'')+offsetH;

      // Build time string Signal expects: "HH:MM MM/DD/YYYY +/-offset"
      let [h,min]=user.birth.time.split(':').map(Number);
      if(user.birth.ampm==='PM'&&h<12) h+=12;
      if(user.birth.ampm==='AM'&&h===12) h=0;
      const timeStr=String(h).padStart(2,'0')+':'+String(min).padStart(2,'0')+
        ' '+user.birth.date+' '+offsetStr;

      const chartRes=await fetch('https://signal-hazel-mu.vercel.app/api/chat?target=chart'+
        '&time='+encodeURIComponent(timeStr)+
        '&lat='+user.birth.lat+'&lng='+user.birth.lon);
      if(!chartRes.ok) throw new Error('chart HTTP '+chartRes.status);
      const chartData=await chartRes.json();

      _twNatal=chartData.planets||[];
      text.innerHTML='<span class="tw-prompt">select a planet to learn more</span>';

    }catch(e){
      text.innerHTML='<span class="tw-prompt">could not load chart — '+e.message+'</span>';
    }
  }

  </script>
