@font-face {
      font-family: '52Sphere';
      src: url('FONTS/52SPHERE.TTF') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'FontAudio';
      src: url('FONTS/fontaudio.woff2') format('woff2'),
           url('FONTS/fontaudio.woff') format('woff'),
           url('FONTS/fontaudio.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Heading Now Book Italic';
      src: url('FONTS/HeadingNowTrial-53BookItalic.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Heading Now Medium';
      src: url('FONTS/HeadingNowTrial-55Medium.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root, [data-theme="light"] {
      --ink: #0a0908;
      --paper: #faf6ee;
      --dust: #6b5c48;
      --faint: #ddd5c6;
      --signal: #9a2015;
      --gold: #5a4318;
      --dim: #3d3530;
      --radio-scrim-strong: rgba(250, 246, 238, .92);
      --radio-scrim-weak: rgba(250, 246, 238, .62);
    }
    [data-theme="dark"] {
      --ink: #f7f2ea;
      --paper: #050404;
      --dust: #c1b8ad;
      --faint: #24211f;
      --signal: #e05540;
      --gold: #d6b56d;
      --dim: #d5cdc1;
      --radio-scrim-strong: rgba(5, 4, 4, .76);
      --radio-scrim-weak: rgba(5, 4, 4, .36);
    }

    :root {
      --topbar-h: 47px;
      --bottombar-h: 142px;
      --col-w: 400px;
      --star-chart-opacity: 1;
      --sidebar-w: 280px;
    }

    html {
      scroll-behavior: smooth;
      background: #050404;
    }

    body {
      background: transparent;
      color: var(--ink);
      opacity: 0.98;
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 300;
      font-size: 13px;
      line-height: 1.7;
      min-height: 100vh;
      transition: color .3s;
      overflow-x: hidden;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(to bottom, #050404 0%, transparent 50%, transparent 82%, #050404 100%);
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      opacity: .16;
    }

    #starChart-bg {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1.2s ease;
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      mix-blend-mode: screen;
    }

    #bg-moon-wrap {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(70vw, 70vh, 420px);
      height: min(70vw, 70vh, 420px);
      z-index: 2;
      pointer-events: none;
      opacity: 0.9;
    }
    #bg-moon-wrap canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    #bg-stars-canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
      pointer-events: auto;
      cursor: default;
    }

    #starChart-opacity-ctrl {
      position: fixed;
      bottom: calc(var(--bottombar-h, 142px) + 12px);
      right: 10px;
      z-index: 10010;
      display: flex;
      align-items: center;
      gap: .4rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 8px;
      letter-spacing: .12em;
      color: var(--dust);
      opacity: 0;
      transition: opacity .3s;
      pointer-events: none;
    }
    #starChart-opacity-ctrl.visible {
      opacity: 1;
      pointer-events: auto;
    }
    #starChart-opacity-ctrl input[type=range] {
      width: 56px;
      accent-color: var(--signal);
      cursor: pointer;
    }

    #subluna-topbar {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: var(--topbar-h);
      z-index: 10020;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 calc(50% - var(--col-w) / 2 + .75rem);
      background: rgba(5,4,4,0.97);
      border-bottom: transparent;
      visibility: hidden;
    }
    #subluna-topbar.active { visibility: visible; }
    .topbar-wordmark {
      font-family: 'X-Scale', sans-serif;
      font-size: 1.75rem;
      letter-spacing: 0.13em;
      color: var(--dim);
      line-height: 1;
      font-weight: normal;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: auto;
      white-space: nowrap;
      opacity: .85;
    }
    .topbar-wordmark span { color: var(--signal); }
    .topbar-right { display: flex; align-items: center; gap: .75rem; }
    #subluna-logout-btn {
      background: transparent;
      border: .5px solid rgba(193,184,173,0.2);
      color: var(--dust);
      cursor: pointer;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 8px;
      letter-spacing: .16em;
      padding: .22rem .42rem;
      text-transform: uppercase;
      transition: border-color .15s, color .15s, opacity .15s;
      opacity: .58;
    }
    #subluna-logout-btn:hover {
      border-color: rgba(224,85,64,.55);
      color: var(--signal);
      opacity: 1;
    }

    #subluna-bottombar {
      position: fixed;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%; max-width: 413px;
      z-index: 10020;
      display: flex;
      flex-direction: column;
      padding: .6rem .85rem 0.95rem;
      background: rgba(43, 5, 2, 0.92);
      border-top: var(--signal) 0.5px solid;
      border-left: var(--signal) 0.5px solid;
      border-right: var(--signal) 0.5px solid;
      gap: .45rem;
      visibility: hidden;
      overflow: hidden;
    }
    #subluna-bottombar.active { visibility: visible; }

    /* ── Subscreen toggle arrow ───────────────────────────────────────── */
    /* Small centered tab sitting right at the seam where the subscreen's
       bottom edge meets the bottombar. Always visible (whether the
       subscreen is open or closed) as a prompt to click; the arrow flips
       to point the opposite direction once the subscreen is expanded. */
    #subscreen-toggle {
      position: fixed;
      top: var(--topbar-h);
      left: 50%;
      transform: translateX(-50%);
      z-index: 10021; /* above topbar/bottombar (10020) and sidebar (10015) */
      width: 34px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(152, 149, 149, 0.95);
      border: .5px solid var(--faint);
      border-top: none;
      border-radius: 0 0 6px 6px;
      color: rgba(43, 5, 2, 0.75);
      font-size: 11px;
      line-height: 1;
      cursor: pointer;
      user-select: none;
      visibility: hidden;
      transition: color .15s, border-color .15s;
    }
    #subscreen-toggle.active { visibility: visible; }
    #subscreen-toggle:hover {
      color: var(--signal);
      border-color: rgba(224,85,64,.4);
    }
    #subscreen-toggle .subscreen-toggle-arrow {
      display: inline-block;
      transition: transform .3s cubic-bezier(.4,0,.2,1);
    }
    /* Closed: prompt points down (pull the subscreen down).
       Open: arrow inverts to point up (collapse it back). */
    #subscreen-toggle.subscreen-open .subscreen-toggle-arrow {
      transform: rotate(180deg);
    }

    .bb-bg-chart {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 600px;
      z-index: -2;
      background-size: cover;
      background-position: center bottom;
      background-repeat: no-repeat;
      pointer-events: none;
      mix-blend-mode: screen;
      opacity: 1;
    }
    .bb-bg-tint {
      position: absolute;
      inset: 0;
      z-index: -1;
      background: rgba(43, 5, 2, 0.45);
      pointer-events: none;
    }

    .bb-station {
      display: flex; align-items: center;
      gap: .35rem; font-size: 10px;
      color: var(--ink); letter-spacing: .04em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .bb-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--signal); flex-shrink: 0;
      animation: livePulse 2.2s ease-in-out infinite;
    }
    @keyframes livePulse { 0%,100%{opacity:1} 50%{opacity:.2} }

    .bb-meta {
      font-size: 9px;
      color: var(--dust); letter-spacing: .04em; opacity: .55;
      display: flex; align-items: center; gap: .3rem;
    }
    .bb-meta .bb-country { color: var(--dust); }
    .bb-meta-sep { opacity: .4; }
    .bb-status-row {
      display: flex;
      align-items: center;
      height: 1.4em;
      margin-top: .15rem;
    }
    .bb-status-inline {
      font-size: 9px;
      color: var(--dust); letter-spacing: .04em; opacity: .8;
    }
    .bb-stamp {
      font-size: 11px;
      color: var(--ink);
      letter-spacing: .04em;
      opacity: 1;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: .25rem;
      margin-bottom: .15rem;
    }
    .bb-stamp-label { color: var(--ink); font-size: 9px; opacity: 1; }
    .bb-stamp-name  { color: var(--ink); font-weight: 400; }
    .bb-stamp-country { color: var(--gold); opacity: 1; }
    .bb-stamp-coords  { color: var(--ink); font-size: 9px; }
    .bb-stamp-sep   { opacity: .75; }
    .bb-scan-locked-msg {
      font-size: 9px;
      color: var(--signal);
      letter-spacing: .04em;
      opacity: .85;
    }
    #rbackbtn.scan-locked,
    #rskipbtn.scan-locked {
      opacity: .25;
      cursor: not-allowed;
    }
    .bb-controls {
      display: flex; align-items: center; gap: .4rem;
    }
    .bb-controls .btn {
      font-size: .72rem; letter-spacing: .12em;
      padding: .5rem .75rem;
      min-height: 38px; min-width: 44px;
    }
    .bb-controls .btn-icon {
      font-family: 'FontAudio';
      font-size: 2.0rem;
      letter-spacing: 0;
      padding: .3rem .5rem;
      line-height: 1;
      border: none;
      background: transparent;
      cursor: pointer;
    }
/*     .bb-vol {
      display: flex; align-items: center; gap: .3rem;
      font-size: 9px; letter-spacing: .1em; color: var(--dust);
      margin-left: auto;
    } */
/*     .bb-vol input[type=range] { width: 64px; accent-color: var(--signal); height: 18px; cursor: pointer; } */
    .bb-controls .btn-icon:hover {
      opacity: 1;
      background: transparent;
      color: var(--signal);
    }
    .bb-header {
      display: flex; align-items: center; justify-content: flex-start;
      gap: .5rem; overflow: hidden;
      cursor: pointer;
      user-select: none;
    }
    .bb-collapse-btn {
      margin-left: auto;
      color: var(--dust); font-size: 13px; line-height: 1;
      padding: 0 .1rem;
      transition: transform .2s ease, color .2s;
      flex-shrink: 0;
      pointer-events: none;
    }
    .bb-header:hover .bb-collapse-btn { color: var(--signal); }
    #subluna-bottombar.collapsed .bb-collapse-btn { transform: rotate(-180deg); }
    .bb-body {
      overflow: hidden;
      transition: max-height .25s ease, opacity .2s ease;
      max-height: 200px;
      opacity: 1;
    }
    #subluna-bottombar.collapsed .bb-body {
      max-height: 0;
      opacity: 0;
      pointer-events: none;
    }
    .bb-header-title {
      font-family: 'Heading Now Book Italic', sans-serif;
      font-size: 18px; letter-spacing: .07em;
      color: var(--signal); white-space: nowrap;
    }

    .btn {
      display: inline-block;
      padding: .55rem .88rem;
      font-family: 'Heading Now Medium', sans-serif;
      font-size: .67rem;
      letter-spacing: .25em;
      cursor: pointer;
      border: .5px solid var(--signal);
      background: transparent;
      color: var(--dust);
      transition: background .15s, color .15s;
    }
    .btn:hover {
      background: var(--signal);
      border-color: var(--signal);
      color: black;
    }
    .btn:disabled {
      opacity: .4;
      cursor: not-allowed;
    }
    .btn-ghost {
      background: transparent;
      color: var(--ink);
      border-color: var(--dust);
    }
    .btn-ghost:hover {
      background: var(--ink);
      color: var(--paper);
      border-color: var(--ink);
    }
    .btn-sm {
      padding: .1rem .4rem;
      font-size: .5rem;
    }

    #rrefresh {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: .20em;
      padding: 0.1rem 0.1rem;
      border: 0px solid var(--dust);
      background: transparent;
      color: var(--dim);
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color .12s, color .12s;
    }
    #rrefresh:hover {
      border-color: var(--gold);
      color: var(--gold);
    }
    #rrefresh:disabled {
      opacity: .3;
      cursor: not-allowed;
    }
    .rspinicon { display: inline-block; }
    .rspinning .rspinicon { animation: rspin .7s linear infinite; }
    @keyframes rspin { to { transform: rotate(360deg); } }

    .rspinsm {
      display: inline-block;
      width: 9px;
      height: 9px;
      border: 1px solid var(--dust);
      border-top-color: var(--ink);
      border-radius: 50%;
      animation: rspin .7s linear infinite;
      vertical-align: middle;
      margin-right: 4px;
    }

    /* ── Left sidebar ─────────────────────────────────────────────────── */
    #subluna-sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: calc(100vh - var(--bottombar-h));
      z-index: 10015; /* above bg, below topbar (10020) */
      display: flex;
      flex-direction: column;
      background: transparent;
      transform: translateY(-100%);
      transition: transform .3s cubic-bezier(.4, 0, .2, 1);
      pointer-events: none;
    }
    #subluna-sidebar.open {
      transform: translateY(0);
      pointer-events: auto;
    }

    /* The actual panel content area */
    .sidebar-panel {
      flex: 1;
      height: 100%;
      position: relative;
      background: rgba(5, 4, 4, 0);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* sidebar-tab removed — sidebar opens/closes via topbar click */

    /* Star chart bg inside sidebar */
    .sidebar-bg-chart {
      position: absolute;
      inset: 0;
      z-index: 0;
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      pointer-events: none;
      mix-blend-mode: screen;
      opacity: 0.5;
      transition: opacity .4s;
    }

    /* Sidebar interior */
    .sidebar-inner {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      /* Topbar stays fixed at the top (it's just the click target that
         toggles the subscreen open/closed), so reserve its height here
         to keep content clear of it. */
      padding: calc(var(--topbar-h) + 1.25rem) 1rem 1.25rem;
      scrollbar-width: thin;
      scrollbar-color: var(--faint) transparent;
      position: relative;
      z-index: 1;
    }
    .sidebar-inner::-webkit-scrollbar { width: 4px; }
    .sidebar-inner::-webkit-scrollbar-track { background: transparent; }
    .sidebar-inner::-webkit-scrollbar-thumb { background: var(--faint); border-radius: 2px; }


    /* Day title inside sidebar */
    .sidebar-day-title {
      font-family: 'Futura FW', sans-serif;
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: 0.13em;
      color: var(--dim);
      line-height: 0;
      margin-bottom: 0rem;
      padding-bottom: 1rem;
      border-bottom: 0px solid var(--faint);
    }
    .sidebar-day-title span { color: var(--signal); }


    /* ── Widget system ───────────────────────────────────────────────── */
    #widget-add-bar {
      display: flex;
      align-items: center;
      gap: .5rem;
      margin-bottom: 1.1rem;
      padding-bottom: .9rem;
      border-bottom: 0px solid var(--faint);
    }
    #widget-add-btn {
      background: transparent;
      border: .5px solid rgba(193,184,173,0.2);
      color: var(--dust);
      font-family: 'Heading Now Medium', sans-serif;
      font-size: 9px;
      letter-spacing: .28em;
      text-transform: uppercase;
      padding: .32rem .7rem;
      cursor: pointer;
      transition: border-color .15s, color .15s;
      white-space: nowrap;
    }
    #widget-add-btn:hover { border-color: var(--signal); color: var(--signal); }

    #widget-picker {
      position: fixed;
      inset: 0;
      z-index: 10060;
      display: none;
    }
    #widget-picker.open { display: flex; align-items: flex-start; justify-content: center; padding-top: calc(var(--topbar-h) + 3rem); }
    #widget-picker-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(5,4,4,0.72);
    }
    #widget-picker-card {
      position: relative;
      z-index: 1;
      width: calc(100% - 3rem);
      max-width: 340px;
      background: #0e0c0b;
      border: .5px solid rgba(224,85,64,0.3);
      padding: 1.2rem 1rem;
    }
    .widget-picker-title {
      font-family: 'Heading Now Medium', sans-serif;
      font-size: 8px;
      letter-spacing: .28em;
      color: var(--dust);
      text-transform: uppercase;
      margin-bottom: 1rem;
      opacity: .7;
    }
    .widget-picker-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .65rem 0;
      border-bottom: .5px solid var(--faint);
      cursor: pointer;
    }
    .widget-picker-item:last-child { border-bottom: none; }
    .widget-picker-item-name {
      font-family: 'Heading Now Book Italic', sans-serif;
      font-size: 15px;
      letter-spacing: .05em;
      color: var(--ink);
    }
    .widget-picker-item-desc {
      font-size: 9px;
      color: var(--dust);
      letter-spacing: .03em;
      opacity: .7;
      margin-top: .15rem;
    }
    .widget-picker-item-action {
      font-family: 'Heading Now Medium', sans-serif;
      font-size: 7px;
      letter-spacing: .2em;
      padding: .28rem .55rem;
      border: .5px solid rgba(193,184,173,0.25);
      background: transparent;
      color: var(--dust);
      cursor: pointer;
      transition: border-color .15s, color .15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .widget-picker-item-action:hover { border-color: var(--signal); color: var(--signal); }
    .widget-picker-item-action.added {
      border-color: rgba(193,184,173,0.12);
      color: rgba(193,184,173,0.3);
      cursor: default;
    }
    #widget-picker-close {
      display: block;
      margin-top: 1rem;
      width: 100%;
      background: transparent;
      border: .5px solid rgba(193,184,173,0.15);
      color: var(--dust);
      font-family: 'Heading Now Medium', sans-serif;
      font-size: 7px;
      letter-spacing: .22em;
      padding: .5rem 0;
      cursor: pointer;
      text-transform: uppercase;
      transition: border-color .15s, color .15s;
    }
    #widget-picker-close:hover { border-color: var(--signal); color: var(--signal); }

    /* Widget container + individual widgets */
    #widget-zone {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .sidebar-widget {
      padding: 1.1rem 0 1rem;
      position: relative;
      touch-action: pan-y;
    }
    .sidebar-widget.dragging {
      opacity: .45;
      background: rgba(224,85,64,0.04);
    }
    .sidebar-widget.drag-over-top {
      border-top-color: var(--signal);
    }
    .widget-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: .6rem;
      gap: .5rem;
    }
    .widget-label {
      font-family: 'Heading Now Medium', sans-serif;
      font-size: 8px;
      letter-spacing: .28em;
      color: var(--dust);
      text-transform: uppercase;
      opacity: .6;
      flex: 1;
    }
    /* Picker drag rows */
    .widget-picker-item {
      cursor: default;
    }
    .widget-picker-item.picker-dragging {
      opacity: .4;
      background: rgba(224,85,64,0.05);
    }
    .widget-picker-item.picker-drag-over {
      border-top-color: var(--signal);
    }
    .picker-drag-handle {
      color: var(--dust);
      opacity: .35;
      font-size: 13px;
      cursor: grab;
      padding: 0 .4rem 0 0;
      user-select: none;
      flex-shrink: 0;
      touch-action: none;
    }
    .picker-drag-handle:active { cursor: grabbing; opacity: .75; }


    /* ── 5-day forecast widget ───────────────────────────────────────── */
    .fiveday-list {
      display: flex;
      justify-content: left;
      gap: .25rem;
    }
    .fiveday-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .35rem;
      padding: 0;
      font-size: 11px;
    }
    .fiveday-row:last-child { }
    .fiveday-day {
      width: auto;
      font-size: 9px;
      letter-spacing: .08em;
      color: var(--dust);
      opacity: .7;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .fiveday-icon { width: 22px; text-align: center; flex-shrink: 0; }
    .fiveday-desc { display: none; }
    .fiveday-temps {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .1rem;
      font-size: 10px;
      color: var(--ink);
      letter-spacing: .03em;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .fiveday-lo { opacity: .45; }

    /* ── Moon widget ─────────────────────────────────────────────────── */
    .moon-phase-name {
      font-family: 'Heading Now Book Italic', sans-serif;
      font-size: 18px;
      letter-spacing: .05em;
      color: var(--ink);
      margin-bottom: .3rem;
    }
    .moon-meta {
      font-size: 10px;
      color: var(--dust);
      letter-spacing: .03em;
      line-height: 1.8;
      opacity: .8;
      margin-bottom: .65rem;
    }
    .moon-meta span { color: var(--ink); opacity: 1; }
    .moon-sign-line {
      font-size: 11px;
      font-style: italic;
      color: var(--dust);
      line-height: 1.75;
      letter-spacing: .02em;
    }
    .moon-sign-line .moon-sign-name { color: var(--signal); font-style: normal; }

    /* ── Weather widget ───────────────────────────────────────────────── */
    .wx-section-label {
      font-family: 'Heading Now Medium', sans-serif;
      font-size: 8px;
      letter-spacing: .28em;
      color: var(--dust);
      opacity: .6;
      text-transform: uppercase;
      margin-bottom: .6rem;
    }
    #wx-loc-row {
      display: flex;
      align-items: center;
      gap: .4rem;
      margin-bottom: .75rem;
      position: relative;
    }
    #wx-city-input {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: .5px solid var(--faint);
      color: var(--ink);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: .04em;
      padding: .2rem 0;
      outline: none;
      transition: border-color .2s;
    }
    #wx-city-input:focus { border-bottom-color: var(--signal); }
    #wx-city-input::placeholder { color: var(--dust); opacity: .5; }
    #wx-geolocate-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--dust);
      font-size: 14px;
      padding: 0 .2rem;
      line-height: 1;
      opacity: .7;
      transition: color .15s, opacity .15s;
      flex-shrink: 0;
    }
    #wx-geolocate-btn:hover { color: var(--signal); opacity: 1; }
    #wx-loc-status {
      font-size: 9px;
      color: var(--dust);
      opacity: .6;
      letter-spacing: .04em;
      min-height: 1em;
    }
    #wx-suggestions {
      position: absolute;
      top: 100%;
      left: 0; right: 0;
      background: rgba(10, 8, 7, 0.97);
      border: .5px solid var(--faint);
      z-index: 100;
      display: none;
    }
    .wx-suggestion {
      padding: .4rem .6rem;
      font-size: 11px;
      color: var(--dust);
      cursor: pointer;
      letter-spacing: .03em;
      border-bottom: .5px solid var(--faint);
    }
    .wx-suggestion:last-child { border-bottom: none; }
    .wx-suggestion:hover { background: rgba(224,85,64,.12); color: var(--ink); }

    #wx-main {
      display: none;
    }
    .wx-current {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-bottom: .6rem;
    }
    #wx-icon {
      font-family: 'WeatherSymbols', sans-serif;
      font-size: 2.8rem;
      line-height: 1;
      flex-shrink: 0;
    }
    .wx-temp-block { display: flex; flex-direction: column; gap: .1rem; }
    #wx-temp {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.4rem;
      letter-spacing: .06em;
      color: var(--ink);
      line-height: 1;
    }
    #wx-hilo {
      font-size: 10px;
      color: var(--dust);
      letter-spacing: .04em;
    }
    #wx-loc-name {
      font-size: 10px;
      color: var(--gold);
      letter-spacing: .06em;
      margin-bottom: .15rem;
    }
    #wx-desc {
      font-size: 10px;
      color: var(--dust);
      letter-spacing: .04em;
      line-height: 1.5;
      margin-bottom: .5rem;
    }

    .wx-divider {
      border: none;
      margin: .65rem 0;
    }

    /* Hourly strip */
    #wx-hourly {
      display: flex;
      gap: .2rem;
      overflow-x: auto;
      padding-bottom: .3rem;
      scrollbar-width: none;
    }
    #wx-hourly::-webkit-scrollbar { display: none; }

    /* ── Horoscope ────────────────────────────────────────────────── */
    /* No top margin/padding/border here — this now renders inside the
       generic .sidebar-widget wrapper (see widgetRenderAll), which already
       supplies its own .widget-header ("HOROSCOPE" label) and top border.
       The old margin-top/padding-top/border-top here were stacking on top
       of that wrapper's spacing, pushing "LIBRA" down unnecessarily. */
    #horo-section {
      display: none;
    }
    .horo-section-label {
      font-size: 8px;
      letter-spacing: .22em;
      color: var(--dust);
      text-transform: uppercase;
      margin-bottom: .6rem;
      opacity: .7;
    }
    #horo-sign-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: .85rem;
      letter-spacing: .18em;
      color: var(--gold);
      margin-bottom: .5rem;
    }
    #horo-text {
      font-size: 11px;
      line-height: 1.85;
      color: var(--dust);
    }

    .wx-hr {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .15rem;
      min-width: 38px;
      flex-shrink: 0;
    }
    .wx-hr-time { font-size: 8px; color: var(--dust); opacity: .7; letter-spacing: .03em; }
    .wx-hr-icon { font-size: 1rem; font-family: 'WeatherSymbols', sans-serif; }
    .wx-hr-temp { font-size: 9px; color: var(--ink); letter-spacing: .03em; }

    /* ── Intro login gate ───────────────────────────────────────────────── */
    #intro-overlay {
      position: fixed;
      inset: 0;
      z-index: 10050;
      pointer-events: auto; /* block all clicks from reaching sidebar underneath */
    }
    #intro-overlay[hidden] { display: none; }
    #login-gate {
      position: fixed;
      inset: 0;
      background: rgba(5,4,4,0.72);
      z-index: 1;
      pointer-events: auto; /* explicitly capture backdrop clicks */
    }
    #login-card {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: calc(100% - 3rem);
      max-width: 370px;
      z-index: 2;
      text-align: center;
      font-family: 'IBM Plex Mono', monospace;
    }
    #login-wordmark {
      font-family: 'Futura FW', sans-serif;
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: .25em;
      color: #c1b8ad;
      margin-bottom: 1.35rem;
    }
    #login-wordmark span { color: #e05540; }
    #intro-login-eyebrow {
      color: #e05540;
      font-size: 10px;
      letter-spacing: .18em;
      margin-bottom: 1.1rem;
      text-transform: uppercase;
    }
    .intro-form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .6rem .85rem;
      margin-bottom: .9rem;
      text-align: left;
    }
    .intro-form-grid .full { grid-column: 1 / -1; }
    .intro-form-grid label {
      display: block;
      margin-bottom: .2rem;
      color: rgba(193,184,173,0.75);
      font-size: 7.5px;
      letter-spacing: .2em;
      text-transform: uppercase;
    }
    .intro-form-grid input {
      width: 100%;
      padding: .25rem 0;
      border: none;
      border-bottom: .5px solid rgba(193,184,173,0.22);
      background: transparent;
      color: rgba(247,242,234,0.95);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11.5px;
      font-weight: 300;
      outline: none;
      -webkit-appearance: none;
      transition: border-bottom-color .2s;
    }
    /* iOS Safari auto-zooms the page when a focused input's font-size is
       under 16px. Bump it up just on small/mobile screens so typing in
       the login form doesn't trigger that zoom — desktop keeps the
       smaller, more intentional 11.5px size. */
    @media (max-width: 600px) {
      .intro-form-grid input { font-size: 16px; }
    }
    .intro-form-grid input::placeholder {
      color: rgba(193,184,173,0.35);
      font-style: italic;
    }
    .intro-form-grid input:focus { border-bottom-color: rgba(224,85,64,0.5); }
    .intro-time-row {
      display: flex;
      align-items: center;
      gap: .25rem;
      border-bottom: .5px solid rgba(193,184,173,0.22);
    }
    .intro-time-row input { border-bottom: none; flex: 1; }
    #intro-ampm-toggle,
    #intro-wx-geolocate-btn {
      background: transparent;
      border: none;
      color: rgba(193,184,173,0.75);
      cursor: pointer;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: .12em;
      padding: .25rem .1rem;
      transition: color .15s;
    }
    #intro-wx-geolocate-btn {
      font-size: 14px;
      line-height: 1;
      padding: .2rem .05rem;
    }
    #intro-ampm-toggle:hover,
    #intro-wx-geolocate-btn:hover { color: #e05540; }
    .intro-city-wrap,
    .intro-location-wrap { position: relative; }
    .intro-location-row {
      display: flex;
      align-items: center;
      gap: .35rem;
    }
    .intro-location-row input { flex: 1; }
    #intro-city-suggestions,
    #intro-wx-suggestions {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      z-index: 10052;
      display: none;
      max-height: 142px;
      overflow-y: auto;
      border: 1px solid rgba(193,184,173,0.2);
      background: #0e0b0a;
      font-size: 10px;
    }
    .intro-suggestion {
      padding: .45rem .55rem;
      color: rgba(193,184,173,0.78);
      cursor: pointer;
      border-bottom: .5px solid rgba(193,184,173,0.12);
      letter-spacing: .03em;
    }
    .intro-suggestion:last-child { border-bottom: none; }
    .intro-suggestion:hover {
      background: rgba(224,85,64,.12);
      color: rgba(247,242,234,0.96);
    }
    .intro-actions {
      display: flex;
      align-items: stretch;
      gap: .55rem;
    }
    #intro-load-recent-btn,
    #tune-in-btn {
      cursor: pointer;
      font-family: 'Futura FW', sans-serif;
      transition: background .15s, border-color .15s, color .15s, opacity .15s;
    }
    #intro-load-recent-btn {
      flex-shrink: 0;
      padding: .7rem 1.05rem;
      border: .5px solid rgba(193,184,173,0.2);
      background: transparent;
      color: rgba(193,184,173,0.7);
      font-size: .65rem;
      letter-spacing: .2em;
    }
    #intro-load-recent-btn:hover {
      border-color: rgba(193,184,173,0.5);
      color: rgba(247,242,234,0.9);
    }
    #tune-in-btn {
      flex: 1;
      padding: .7rem 0;
      border: none;
      background: #e05540;
      color: #fff;
      font-size: .9rem;
      letter-spacing: .3em;
    }
    #tune-in-btn:hover { background: #c03a28; }
    #tune-in-btn:disabled { cursor: not-allowed; opacity: .5; }
    #intro-chart-status {
      min-height: 1.2em;
      margin-top: .55rem;
      color: var(--dust);
      font-size: 9px;
      letter-spacing: .04em;
      text-align: center;
    }
    #login-version {
      margin-top: 1rem;
      color: var(--dust);
      font-family: 'IBM Plex Mono', monospace;
      font-size: .65rem;
      letter-spacing: .08em;
      opacity: .5;
      text-align: center;
    }
    @keyframes powerFlicker {
      0% { opacity: 1; }
      18% { opacity: .05; }
      25%, 55% { opacity: 1; }
      60% { opacity: .05; }
      68% { opacity: .9; }
      72% { opacity: .05; }
      80%, 100% { opacity: 0; }
    }
    .intro-glitching { animation: powerFlicker 2s ease-out forwards; }
  </style>
</head>
<body>

  <div id="intro-overlay" hidden>
    <div id="login-gate"></div>
    <div id="login-card">
      <div id="login-wordmark">SUB<span>L</span>UNA</div>
      <div id="intro-login-eyebrow">— login —</div>
      <div class="intro-form-grid">
        <div class="full">
          <label>NAME <span style="font-size:6.5px;letter-spacing:.04em;opacity:.6;text-transform:none">(optional)</span></label>
          <input type="text" id="intro-birth-name" placeholder="birth or chosen name" autocomplete="off">
        </div>
        <div>
          <label>DATE OF BIRTH</label>
          <input type="text" id="intro-birth-date" placeholder="MM/DD/YYYY" autocomplete="off" inputmode="numeric">
        </div>
        <div>
          <label>TIME OF BIRTH</label>
          <div class="intro-time-row">
            <input type="text" id="intro-birth-time" placeholder="HH:MM" autocomplete="off" inputmode="numeric">
            <button type="button" id="intro-ampm-toggle">AM</button>
          </div>
        </div>
        <div class="full">
          <label>BIRTH CITY</label>
          <div class="intro-city-wrap">
            <input type="text" id="intro-birth-city" placeholder="e.g. New York City, New York, USA" autocomplete="off">
            <div id="intro-city-suggestions"></div>
          </div>
          <input type="hidden" id="intro-birth-lat">
          <input type="hidden" id="intro-birth-lon">
        </div>
        <div class="full">
          <label>CURRENT LOCATION</label>
          <div class="intro-location-wrap">
            <div class="intro-location-row">
              <input type="text" id="intro-wx-location" placeholder="city or place for weather" autocomplete="off">
              <button type="button" id="intro-wx-geolocate-btn" title="use my location">◎</button>
            </div>
            <div id="intro-wx-suggestions"></div>
          </div>
          <input type="hidden" id="intro-wx-lat">
          <input type="hidden" id="intro-wx-lon">
        </div>
      </div>
      <div class="intro-actions">
        <button type="button" id="intro-load-recent-btn" style="display:none">LOAD RECENT</button>
        <button type="button" id="tune-in-btn">START</button>
      </div>
      <div id="intro-chart-status"></div>
      <div id="login-version">v1.0</div>
    </div>
  </div>

  <div id="subluna-topbar">
    <div class="topbar-wordmark" id="subluna-topbar-wordmark" style="cursor:pointer;user-select:none;" onclick="sidebarSetOpen(!document.getElementById('subluna-sidebar').classList.contains('open'))"><span>S</span>UBSCREEN</div>
    <div class="topbar-right">
      <button id="rrefresh" onclick="rRefresh()" style="display:none"><span class="rspinicon">↺</span></button>
      <button id="subluna-logout-btn">LOGOUT</button>
    </div>
  </div>

  <!-- Top collapsible sidebar -->
  <div id="subluna-sidebar" role="complementary" aria-label="sidebar">
    <div class="sidebar-panel">
      <div class="sidebar-bg-chart" id="sidebar-bg-chart" aria-hidden="true"></div>
      <div class="sidebar-inner">

        <!-- ── Add widget bar ── -->
        <div id="widget-add-bar">
          <button id="widget-add-btn" onclick="widgetPickerOpen()">MANAGE WIDGETS</button>
        </div>

        <!-- ── Day title ── -->
        <div class="sidebar-day-title" id="sidebar-day-title"></div>

        <!-- ── All widgets (built-in + user-added) live here ── -->
        <div id="widget-zone">
          <!-- Weather DOM anchors (hidden shell — moved into widget-zone by widget engine) -->
          <div id="wx-main" style="display:none">
           <!--  <div id="wx-loc-name"></div> -->
            <div class="wx-current">
              <div id="wx-icon">—</div>
              <div class="wx-temp-block">
                <div id="wx-temp">—</div>
                <div id="wx-hilo"></div>
              </div>
            </div>
            <div id="wx-desc"></div>
            <hr class="wx-divider">
            <div id="wx-hourly"></div>
          </div>
          <!-- Horoscope DOM anchors -->
          <div id="horo-section" style="display:none">
         <!--    <div id="horo-sign-name"></div> -->
            <div id="horo-text">loading…</div>
          </div>
        </div>

        <div style="height:3rem"></div>
      </div>
    </div>
  </div>

  <!-- Centralized toggle arrow — click to expand/collapse the subscreen.
       Sits at the seam where the subscreen meets the bottombar; the arrow
       flips direction once the subscreen is open. -->
  <div id="subscreen-toggle" role="button" aria-label="toggle subscreen" onclick="sidebarSetOpen(!document.getElementById('subluna-sidebar').classList.contains('open'))">
    <span class="subscreen-toggle-arrow">▾</span>
  </div>
  
  <div id="subluna-bottombar" class="collapsed">
    <div class="bb-bg-chart" id="bb-bg-chart" aria-hidden="true"></div>
    <div class="bb-bg-tint" aria-hidden="true"></div>
    <div class="bb-header" onclick="bbToggleCollapse()" role="button" aria-label="collapse player">
      <span class="bb-dot"></span>
      <span class="bb-header-title">SUB<span style="color:var(--signal)">L</span>UNA RADIO</span>
      <span class="bb-stamp-sep" id="bb-header-coord-sep" style="font-size:10px;font-family:'52Sphere';color:rgba(219, 200, 73, 0.592);">L</span>
      <span class="bb-stamp-coords" id="bb-header-coords" style="font-size:9px;color:rgba(219, 200, 73, 0.489);letter-spacing:.025em;"></span>
      <span class="bb-collapse-btn" id="bb-collapse-btn">▾</span>
    </div>
    <div class="bb-controls" onclick="event.stopPropagation()">
      <button class="btn btn-ghost btn-sm btn-icon" id="rplaybtn" onclick="rTogglePlay()" disabled style="color:var(--signal)">&#xf169;</button>
      <button class="btn btn-ghost btn-sm btn-icon" id="rbackbtn" onclick="rBack()" disabled>&#xf170;</button>
      <button class="btn btn-ghost btn-sm btn-icon" id="rskipbtn" onclick="rSkip()" disabled>&#xf163;</button>
      <button class="btn btn-ghost btn-sm btn-icon" id="rlocation-refresh" onclick="rRadioRefresh()" title="Follow moon" disabled style="color:var(--dust);opacity:.3;min-width:unset;padding:0rem 0.8rem;cursor:default;transition:color .2s,opacity .2s;margin-bottom:0.5rem;"><img src="IMAGES/moon.png" alt="moon" style="width:36px;height:36px;object-fit:contain;display:block;filter:invert(1);opacity:inherit;transition:filter .2s;"></button>
      <div class="bb-vol" style="display:none;">VOL <input type="range" id="rvol" min="0" max="1" step="0.01" value="1"></div>
    </div>
    <div class="bb-body" id="bb-body" onmouseenter="bbClearAutoCollapse()" ontouchstart="bbClearAutoCollapse()">
      <div style="height: 0.25rem;"></div>
      <div class="bb-stamp" id="rnow-stamp" style="display:none">
        <span class="bb-stamp-name" id="rstamp-name"></span>
        <span class="bb-stamp-sep">·</span>
        <span class="bb-stamp-country" id="rstamp-country"></span>
      </div>
      <div class="bb-meta" style="display:none">
        <span class="bb-stamp-label">current ➣</span>
        <span class="bb-country" id="rmoon-text"> </span>
        <span class="bb-meta-sep">·</span>
        <span id="rmoon-coords">—</span>
      </div>
      <div class="bb-status-row" style="gap:.5rem">
        <span id="rstatus" class="bb-status-inline"><span class="rspinsm"></span>loading…</span>
        <span id="rscan-locked-msg" class="bb-scan-locked-msg" style="display:none">update location to scan stations</span>
        <button id="rradio-refresh" onclick="rRadioRefresh()" title="Refresh radio" style="
          margin-left:auto;
          background:none; border:none; cursor:pointer;
          font-family:'IBM Plex Mono',monospace;
          font-size:11px; letter-spacing:.08em;
          color:var(--dust); opacity:.55;
          padding:0 .1rem;
          transition:color .2s,opacity .2s;
          white-space:nowrap;
        "></button>
      </div>
    </div>
    <div id="rnowplaying" style="display:none"></div>
    <div id="rmoon-loc" style="display:none"></div>
    <span id="rnowcount" style="display:none"></span>
  </div>

  <div id="starChart-bg" aria-hidden="true"></div>
  <canvas id="bg-stars-canvas" aria-hidden="true"></canvas>
  <div id="bg-moon-wrap" aria-hidden="true"><canvas id="bg-moon-canvas"></canvas></div>
  <div id="starChart-opacity-ctrl" title="star chart opacity">
    <label for="starChart-opacity-slider">STAR CHART</label>
    <input type="range" id="starChart-opacity-slider" min="0" max="1" step="0.01" value="0.18"
      oninput="starChartSetOpacity(this.value)">
  </div>

    <div id="footer-coords"></div>

  <audio id="raud"></audio>
  <script>
  // Force full volume on the radio audio element. The on-screen volume
  // slider is hidden (see #rvol above) — users control volume via their
  // device's hardware controls instead. This runs after radio.js loads,
  // and also reapplies on every 'play' event in case radio.js or a saved
  // setting tries to reset it.
  (function () {
    const raud = document.getElementById('raud');
    if (!raud) return;
    raud.volume = 1;
    raud.addEventListener('play', () => { raud.volume = 1; });
  })();
  </script>

  <script>
  const SUBLUNA_USER_KEY = 'subluna_user';
  const WX_STORAGE_KEY = 'signal_wx_location_v2';
  let _sublunaBooted = false;
  let _moonInterval = null;
  let _radioInterval = null;
  let _introCityTimer = null;
  let _introWxTimer = null;

  function readSublunaUser() {
    try { return JSON.parse(localStorage.getItem(SUBLUNA_USER_KEY) || 'null'); }
    catch(_) { return null; }
  }

  function hasValidSublunaUser(data) {
    return !!(data && data.birth && data.birth.date && data.birth.time && data.birth.city && data.weather && data.weather.name);
  }

  function introSetStatus(msg) {
    const el = document.getElementById('intro-chart-status');
    if (el) el.textContent = msg || '';
  }

  function introFormatPlace(p) {
    const a = p.address || {};
    const city = a.city || a.town || a.village || a.hamlet || a.county || p.display_name || '';
    const region = a.state || a.region || '';
    const country = a.country || '';
    return [city, region, country].filter(Boolean).filter((v, i, arr) => arr.indexOf(v) === i).join(', ');
  }

  function introSetAmpm(value) {
    const btn = document.getElementById('intro-ampm-toggle');
    if (!btn) return;
    btn.textContent = value === 'PM' ? 'PM' : 'AM';
    btn.style.color = btn.textContent === 'PM' ? 'rgba(224,85,64,0.85)' : 'rgba(193,184,173,0.6)';
  }

  function toggleAmPm() {
    const btn = document.getElementById('intro-ampm-toggle');
    introSetAmpm(btn && btn.textContent.trim() === 'AM' ? 'PM' : 'AM');
  }

  function maskBirthDate(inp) {
    let v = inp.value.replace(/\D/g, '').slice(0, 8);
    inp.value = v.length <= 2 ? v : v.length <= 4 ? v.slice(0,2) + '/' + v.slice(2) : v.slice(0,2) + '/' + v.slice(2,4) + '/' + v.slice(4);
  }

  function maskBirthTime(inp) {
    let v = inp.value.replace(/\D/g, '').slice(0, 4);
    inp.value = v.length <= 2 ? v : v.slice(0,2) + ':' + v.slice(2);
  }

  function fillIntroUser(data) {
    if (!data) return;
    const set = (id, value) => { const el = document.getElementById(id); if (el) el.value = value || ''; };
    set('intro-birth-name', data.name);
    set('intro-birth-date', data.birth?.date);
    set('intro-birth-time', data.birth?.time);
    set('intro-birth-city', data.birth?.city);
    set('intro-birth-lat', data.birth?.lat);
    set('intro-birth-lon', data.birth?.lon);
    set('intro-wx-location', data.weather?.name);
    set('intro-wx-lat', data.weather?.lat);
    set('intro-wx-lon', data.weather?.lon);
    introSetAmpm(data.birth?.ampm || 'AM');
  }

  function loadRecentUser() {
    const data = readSublunaUser() || (() => {
      try { return JSON.parse(localStorage.getItem(SUBLUNA_USER_KEY + '_backup') || 'null'); } catch(_) { return null; }
    })();
    fillIntroUser(data);
    introSetStatus('');
    const btn = document.getElementById('intro-load-recent-btn');
    if (btn) btn.style.display = 'none';
  }

  function introRenderSuggestions(box, data, onPick) {
    if (!box) return;
    box.innerHTML = '';
    data.forEach(p => {
      const div = document.createElement('div');
      div.className = 'intro-suggestion';
      div.textContent = introFormatPlace(p);
      div.addEventListener('click', () => onPick(p));
      box.appendChild(div);
    });
    box.style.display = data.length ? 'block' : 'none';
  }

  async function introSearchPlace(query, limit) {
    const r = await fetch('https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=' + limit + '&q=' + encodeURIComponent(query), { headers: { 'Accept-Language': 'en' } });
    return r.ok ? r.json() : [];
  }

  async function introCityInput(val) {
    clearTimeout(_introCityTimer);
    const box = document.getElementById('intro-city-suggestions');
    if (!box) return;
    if (val.trim().length < 3) { box.style.display = 'none'; return; }
    _introCityTimer = setTimeout(async () => {
      try {
        const data = await introSearchPlace(val.trim(), 5);
        introRenderSuggestions(box, data, p => {
          document.getElementById('intro-birth-city').value = introFormatPlace(p);
          document.getElementById('intro-birth-lat').value = parseFloat(p.lat).toFixed(4);
          document.getElementById('intro-birth-lon').value = parseFloat(p.lon).toFixed(4);
          box.style.display = 'none';
        });
      } catch(_) { box.style.display = 'none'; }
    }, 400);
  }

  async function introWxInput(val) {
    clearTimeout(_introWxTimer);
    const box = document.getElementById('intro-wx-suggestions');
    if (!box) return;
    if (val.trim().length < 2) { box.style.display = 'none'; return; }
    _introWxTimer = setTimeout(async () => {
      try {
        const data = await introSearchPlace(val.trim(), 5);
        introRenderSuggestions(box, data, p => {
          document.getElementById('intro-wx-location').value = introFormatPlace(p);
          document.getElementById('intro-wx-lat').value = parseFloat(p.lat);
          document.getElementById('intro-wx-lon').value = parseFloat(p.lon);
          box.style.display = 'none';
        });
      } catch(_) { box.style.display = 'none'; }
    }, 320);
  }

  async function introResolveTypedPlace(inputId, latId, lonId) {
    const input = document.getElementById(inputId);
    const lat = document.getElementById(latId);
    const lon = document.getElementById(lonId);
    if (!input || !lat || !lon || !input.value.trim() || (lat.value && lon.value)) return;
    try {
      const data = await introSearchPlace(input.value.trim(), 1);
      if (!data.length) return;
      input.value = introFormatPlace(data[0]);
      lat.value = parseFloat(data[0].lat);
      lon.value = parseFloat(data[0].lon);
    } catch(_) {}
  }

  function introWxGeolocate() {
    if (!navigator.geolocation) { introSetStatus('geolocation unavailable'); return; }
    introSetStatus('locating...');
    navigator.geolocation.getCurrentPosition(async pos => {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;
      try {
        const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`, { headers: { 'Accept-Language': 'en' } });
        const d = await r.json();
        const name = introFormatPlace(d) || 'your location';
        document.getElementById('intro-wx-location').value = name;
        document.getElementById('intro-wx-lat').value = lat;
        document.getElementById('intro-wx-lon').value = lon;
        introSetStatus('');
      } catch(_) { introSetStatus('location lookup failed'); }
    }, () => introSetStatus('location permission denied'));
  }

  async function introStart() {
    const startBtn = document.getElementById('tune-in-btn');
    if (startBtn) startBtn.disabled = true;
    introSetStatus('saving signal...');

    await introResolveTypedPlace('intro-birth-city', 'intro-birth-lat', 'intro-birth-lon');
    await introResolveTypedPlace('intro-wx-location', 'intro-wx-lat', 'intro-wx-lon');

    const user = {
      name: document.getElementById('intro-birth-name')?.value.trim() || '',
      birth: {
        date: document.getElementById('intro-birth-date')?.value.trim() || '',
        time: document.getElementById('intro-birth-time')?.value.trim() || '',
        ampm: document.getElementById('intro-ampm-toggle')?.textContent.trim() || 'AM',
        city: document.getElementById('intro-birth-city')?.value.trim() || '',
        lat: parseFloat(document.getElementById('intro-birth-lat')?.value || ''),
        lon: parseFloat(document.getElementById('intro-birth-lon')?.value || '')
      },
      weather: {
        name: document.getElementById('intro-wx-location')?.value.trim() || '',
        lat: parseFloat(document.getElementById('intro-wx-lat')?.value || ''),
        lon: parseFloat(document.getElementById('intro-wx-lon')?.value || '')
      },
      savedAt: new Date().toISOString()
    };

    if (!user.birth.date || !user.birth.time || !user.birth.city || !user.weather.name) {
      introSetStatus('date, time, birth city, and current location are required');
      if (startBtn) startBtn.disabled = false;
      return;
    }

    localStorage.setItem(SUBLUNA_USER_KEY, JSON.stringify(user));
    if (Number.isFinite(user.weather.lat) && Number.isFinite(user.weather.lon)) {
      localStorage.setItem(WX_STORAGE_KEY, JSON.stringify(user.weather));
    }
    tuneIn();
  }

  function logoutSubluna() {
    const current = localStorage.getItem(SUBLUNA_USER_KEY);
    if (current) localStorage.setItem(SUBLUNA_USER_KEY + '_backup', current);
    localStorage.removeItem(SUBLUNA_USER_KEY);
    window.location.reload();
  }

  function tuneIn(options) {
    const instant = !!(options && options.instant);
    const overlay = document.getElementById('intro-overlay');
    if (_sublunaBooted) {
      if (overlay) overlay.remove();
      return;
    }
    _sublunaBooted = true;

    document.getElementById('subluna-topbar')?.classList.add('active');
    document.getElementById('subluna-bottombar')?.classList.add('active');
    document.getElementById('subscreen-toggle')?.classList.add('active');
    rEnsureRadioInit();
    moonRefresh();
    if (!_moonInterval) _moonInterval = setInterval(moonRefresh, 12 * 60 * 1000);
    if (!_radioInterval) _radioInterval = setInterval(() => { if (!rPlaying) rInit(); }, 30 * 60 * 1000);

    if (!overlay) return;
    if (instant) {
      overlay.remove();
      return;
    }

    const loginSfx = new Audio('AUDIO/subluna_login_sfx.mp3');
    loginSfx.preload = 'auto';
    loginSfx.play().catch(() => {});
    overlay.classList.add('intro-glitching');
    const dismiss = () => {
      loginSfx.pause();
      overlay.style.transition = 'opacity 1.2s ease';
      overlay.style.opacity = '0';
      setTimeout(() => overlay.remove(), 1200);
    };
    loginSfx.addEventListener('ended', dismiss, { once: true });
    setTimeout(dismiss, 2000);
  }

  document.addEventListener('click', e => {
    if (!e.target.closest('.intro-city-wrap')) {
      const box = document.getElementById('intro-city-suggestions');
      if (box) box.style.display = 'none';
    }
    if (!e.target.closest('.intro-location-wrap')) {
      const box = document.getElementById('intro-wx-suggestions');
      if (box) box.style.display = 'none';
    }
  });

  document.addEventListener('DOMContentLoaded', () => {
    const dateEl = document.getElementById('intro-birth-date');
    const timeEl = document.getElementById('intro-birth-time');
    if (dateEl) dateEl.addEventListener('input', () => maskBirthDate(dateEl));
    if (timeEl) timeEl.addEventListener('input', () => maskBirthTime(timeEl));
    document.getElementById('intro-birth-city')?.addEventListener('input', e => introCityInput(e.target.value));
    document.getElementById('intro-wx-location')?.addEventListener('input', e => introWxInput(e.target.value));
    document.getElementById('intro-birth-city')?.addEventListener('keydown', e => { if (e.key === 'Enter') introStart(); });
    document.getElementById('intro-wx-location')?.addEventListener('keydown', e => { if (e.key === 'Enter') introStart(); });
    document.getElementById('intro-ampm-toggle')?.addEventListener('click', toggleAmPm);
    document.getElementById('intro-wx-geolocate-btn')?.addEventListener('click', introWxGeolocate);
    document.getElementById('intro-load-recent-btn')?.addEventListener('click', loadRecentUser);
    document.getElementById('tune-in-btn')?.addEventListener('click', introStart);
    document.getElementById('subluna-logout-btn')?.addEventListener('click', logoutSubluna);

    const saved = readSublunaUser();
    if (hasValidSublunaUser(saved)) {
      if (saved.weather && Number.isFinite(Number(saved.weather.lat)) && Number.isFinite(Number(saved.weather.lon))) {
        localStorage.setItem(WX_STORAGE_KEY, JSON.stringify(saved.weather));
      }
      tuneIn({ instant: true });
      return;
    }

    const overlay = document.getElementById('intro-overlay');
    if (overlay) overlay.hidden = false;
    // Show LOAD RECENT if there's any saved data (active session or post-logout backup)
    const backup = (() => {
      try { return JSON.parse(localStorage.getItem(SUBLUNA_USER_KEY + '_backup') || 'null'); } catch(_) { return null; }
    })();
    if (saved || backup) {
      const btn = document.getElementById('intro-load-recent-btn');
      if (btn) btn.style.display = 'inline-block';
    }
  });
  </script>

  <script>
  // ── Decorative background: full-page twinkling starfield + approaching asteroids ──
  (function(){
    const cvs = document.getElementById('bg-stars-canvas');
    if (!cvs) return;
    const ctx = cvs.getContext('2d');
    const DPR = Math.min(window.devicePixelRatio || 1, 2);

    let W = 0, H = 0;
    function resize(){
      W = window.innerWidth; H = window.innerHeight;
      cvs.width = W * DPR; cvs.height = H * DPR;
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }
    resize();
    window.addEventListener('resize', resize);

    // ── Stars ────────────────────────────────────────────────────────────────────
    const STAR_COUNT = 70;
    const stars = Array.from({ length: STAR_COUNT }, () => ({
      x: Math.random() * W,
      y: Math.random() * H,
      r: 0.6 + Math.random() * 1.3,
      phase: Math.random() * Math.PI * 2,
      speed: 0.4 + Math.random() * 0.8
    }));

    // ── Asteroid system ──────────────────────────────────────────────────────────
    const MAX_ASTEROIDS = 3;
    const APPROACH_DUR = 7000;
    const MAX_R = 34;
    const SPAWN_INTERVAL = 3200;

    const asteroidImgs = [new Image(), new Image()];
    asteroidImgs[0].src = 'IMAGES/asteroid-1.png';
    asteroidImgs[1].src = 'IMAGES/asteroid-2.png';

    const asteroids = [];
    let lastSpawn = 0;

    function makeAsteroid(now) {
      return {
        x: 0.08 * W + Math.random() * 0.84 * W,
        y: 0.08 * H + Math.random() * 0.84 * H,
        born: now,
        rotation: Math.random() * Math.PI * 2,
        spinSpeed: (0.004 + Math.random() * 0.008) * (Math.random() < 0.5 ? 1 : -1),
        img: asteroidImgs[Math.random() < 0.5 ? 0 : 1],
        glowPhase: Math.random() * Math.PI * 2,
        state: 'alive',
        particles: [],
      };
    }

    function spawnAsteroid(now) {
      if (asteroids.filter(a => a.state === 'alive').length < MAX_ASTEROIDS) {
        asteroids.push(makeAsteroid(now));
      }
    }

    function asteroidRadius(a, now) {
      const age = now - a.born;
      const t = Math.min(age / APPROACH_DUR, 1);
      const eased = t * t;
      return 1 + eased * (MAX_R - 1);
    }

    function drawAsteroid(a, now, t, alphaMult = 1) {
      const r = asteroidRadius(a, now);
      const alpha = Math.min(r / 6, 1) * alphaMult;
      const glowBreathe = 0.5 + 0.5 * Math.sin(t * 1.1 + a.glowPhase);
      const glowR = r * (2.4 + glowBreathe * 0.7);

      ctx.save();
      ctx.translate(a.x, a.y);

      const grd = ctx.createRadialGradient(0, 0, r * 0.3, 0, 0, glowR);
      grd.addColorStop(0, `rgba(180, 160, 120, ${(0.18 + glowBreathe * 0.1) * alpha})`);
      grd.addColorStop(0.5, `rgba(100, 85, 60, ${0.06 * alpha})`);
      grd.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.beginPath();
      ctx.arc(0, 0, glowR, 0, Math.PI * 2);
      ctx.fillStyle = grd;
      ctx.fill();

      ctx.rotate(a.rotation);
      ctx.globalAlpha = alpha;
      if (a.img.complete && a.img.naturalWidth > 0) {
        const d = r * 2.1;
        ctx.drawImage(a.img, -d / 2, -d / 2, d, d);
      } else {
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(160, 140, 110, ${alpha})`;
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      ctx.restore();
    }

    function explodeAsteroid(a, now) {
      if (a.state !== 'alive') return;
      a.state = 'exploding';
      const r = asteroidRadius(a, now);
      const count = 18 + Math.floor(Math.random() * 8);
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 0.3 + Math.random() * 2.8;
        a.particles.push({
          x: a.x + (Math.random() - 0.5) * r,
          y: a.y + (Math.random() - 0.5) * r,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          r: 0.8 + Math.random() * 2.2,
        });
      }
      a.explodeStart = now;
    }

    function fadeAsteroid(a, now) {
      if (a.state !== 'alive') return;
      a.state = 'fading';
      a.fadeStart = now;
    }

    function drawFade(a, now, t) {
      const FADE_DUR = 700;
      const age = now - a.fadeStart;
      if (age > FADE_DUR) { a.state = 'dead'; return; }
      const alphaMult = 1 - (age / FADE_DUR);
      drawAsteroid(a, now, t, alphaMult);
    }

    function drawExplosion(a, now) {
      const age = now - a.explodeStart;
      const dur = 800;
      if (age > dur) { a.state = 'dead'; return; }
      const progress = age / dur;
      const fade = (1 - progress) * (1 - progress);
      for (const p of a.particles) {
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.97;
        p.vy *= 0.97;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * (1 + progress * 0.5), 0, Math.PI * 2);
        ctx.fillStyle = `rgba(210, 175, 110, ${fade})`;
        ctx.fill();
      }
    }

    function handleTap(e) {
      const rect = cvs.getBoundingClientRect();
      const scaleX = W / rect.width;
      const scaleY = H / rect.height;
      const cx = (e.clientX - rect.left) * scaleX;
      const cy = (e.clientY - rect.top) * scaleY;
      const now = performance.now();
      for (const a of asteroids) {
        if (a.state !== 'alive') continue;
        const r = asteroidRadius(a, now);
        if (Math.hypot(cx - a.x, cy - a.y) < r * 1.4) {
          explodeAsteroid(a, now);
          return;
        }
      }
    }
    cvs.addEventListener('click', handleTap);
    cvs.addEventListener('touchstart', (e) => {
      if (e.touches.length > 0) handleTap(e.touches[0]);
    }, { passive: true });

    // ── Render loop ──────────────────────────────────────────────────────────────
    const FPS = 20, FRAME_MS = 1000 / FPS;
    let lastFrame = 0, rafId = null;

    function tick(now){
      rafId = requestAnimationFrame(tick);
      if (now - lastFrame < FRAME_MS) return;
      lastFrame = now;
      ctx.clearRect(0, 0, W, H);
      const t = now * 0.001;

      for (const s of stars) {
        const tw = 0.35 + 0.65 * (0.5 + 0.5 * Math.sin(t * s.speed + s.phase));
        ctx.beginPath();
        ctx.fillStyle = `rgba(255, 250, 240, ${tw.toFixed(3)})`;
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      }

      if (now - lastSpawn > SPAWN_INTERVAL) {
        spawnAsteroid(now);
        lastSpawn = now;
      }

      for (const a of asteroids) {
        if (a.state === 'dead') continue;
        if (a.state === 'alive') {
          a.rotation += a.spinSpeed;
          if (now - a.born >= APPROACH_DUR) {
            fadeAsteroid(a, now);
          } else {
            drawAsteroid(a, now, t);
          }
        }
        if (a.state === 'fading') {
          drawFade(a, now, t);
        }
        if (a.state === 'exploding') {
          drawExplosion(a, now);
        }
      }

      for (let i = asteroids.length - 1; i >= 0; i--) {
        if (asteroids[i].state === 'dead') asteroids.splice(i, 1);
      }
    }
    rafId = requestAnimationFrame(tick);

    spawnAsteroid(performance.now() - 2000);
    spawnAsteroid(performance.now() - 500);

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) { if (rafId) cancelAnimationFrame(rafId); rafId = null; }
      else if (!rafId) { lastFrame = 0; rafId = requestAnimationFrame(tick); }
    });
  })();
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
  // ── Decorative background: photorealistic moon + distant Earth ───────────────
  (function(){
    const wrap = document.getElementById('bg-moon-wrap');
    const cvs = document.getElementById('bg-moon-canvas');
    if (!wrap || !cvs || !window.THREE) return;

    const TEX_BASE = 'https://raw.githubusercontent.com/mrdoob/three.js/r128/examples/textures/planets/';

    const DPR = Math.min(window.devicePixelRatio || 1, 2);

    function getSize(){
      const r = wrap.getBoundingClientRect();
      return r.width > 0 ? Math.round(r.width) : (wrap.offsetWidth || 300);
    }
    let SZ = getSize();
    cvs.width = SZ * DPR;
    cvs.height = SZ * DPR;

    const renderer = new THREE.WebGLRenderer({ canvas: cvs, antialias: true, alpha: true });
    renderer.setSize(SZ * DPR, SZ * DPR, false);
    renderer.setClearColor(0x000000, 0);

    const scene = new THREE.Scene();
    const cam = new THREE.PerspectiveCamera(42, 1, 0.1, 100);
    cam.position.z = 3.0;

    const loader = new THREE.TextureLoader();
    loader.crossOrigin = 'anonymous';

    // ── Moon ───────────────────────────────────────────────────────
    const MOON_R = 1;
    const moon = new THREE.Mesh(
      new THREE.SphereGeometry(MOON_R, 64, 64),
      new THREE.MeshPhongMaterial({ color: 0xffffff, shininess: 2, specular: 0x111111 })
    );
    scene.add(moon);
    moon.rotation.y = Math.PI * 0.5;

    loader.load(TEX_BASE + 'moon_1024.jpg', (tex) => {
      moon.material.map = tex;
      moon.material.bumpMap = tex;     // reuse diffuse as a cheap bump pass for crater depth
      moon.material.bumpScale = 0.012;
      moon.material.needsUpdate = true;
    }, undefined, (err) => console.warn('[bg-moon] failed to load moon texture', err));

    // ── Earth Position (distant, behind/beside the moon) ─────────────────────
    const EARTH_R = 0.46;
    const earthGroup = new THREE.Group();
    earthGroup.position.set(1.05, 1.05, -1.7);
    scene.add(earthGroup);

    const earth = new THREE.Mesh(
      new THREE.SphereGeometry(EARTH_R, 48, 48),
      new THREE.MeshPhongMaterial({ color: 0xffffff, shininess: 12 })
    );
    earthGroup.add(earth);

    loader.load(TEX_BASE + 'earth_atmos_2048.jpg', (tex) => {
      earth.material.map = tex; earth.material.needsUpdate = true;
    }, undefined, (err) => console.warn('[bg-moon] failed to load earth diffuse', err));
    loader.load(TEX_BASE + 'earth_normal_2048.jpg', (tex) => {
      earth.material.normalMap = tex; earth.material.needsUpdate = true;
    }, undefined, (err) => console.warn('[bg-moon] failed to load earth normal map', err));
    loader.load(TEX_BASE + 'earth_specular_2048.jpg', (tex) => {
      earth.material.specularMap = tex; earth.material.needsUpdate = true;
    }, undefined, (err) => console.warn('[bg-moon] failed to load earth specular map', err));
    loader.load(TEX_BASE + 'earth_lights_2048.png', (tex) => {
      earth.material.emissiveMap = tex;
      earth.material.emissive = new THREE.Color(0xffdd99);
      earth.material.emissiveIntensity = 1.1;
      earth.material.needsUpdate = true;
    }, undefined, (err) => console.warn('[bg-moon] failed to load earth night lights', err));

    // Clouds — separate slightly-larger sphere, independent slow rotation
    const clouds = new THREE.Mesh(
      new THREE.SphereGeometry(EARTH_R * 1.015, 48, 48),
      new THREE.MeshPhongMaterial({ color: 0xffffff, transparent: true, opacity: 0.55, depthWrite: false })
    );
    earthGroup.add(clouds);
    loader.load(TEX_BASE + 'earth_clouds_1024.png', (tex) => {
      clouds.material.map = tex;
      clouds.material.alphaMap = tex;
      clouds.material.needsUpdate = true;
    }, undefined, (err) => console.warn('[bg-moon] failed to load earth clouds', err));

    // Thin atmosphere glow — fresnel rim, additive, back-side only
    const atmosphere = new THREE.Mesh(
      new THREE.SphereGeometry(EARTH_R * 1.09, 48, 48),
      new THREE.ShaderMaterial({
        uniforms: {},
        vertexShader: `
          varying vec3 vNormal;
          void main(){
            vNormal = normalize(normalMatrix * normal);
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          varying vec3 vNormal;
          void main(){
            float intensity = pow(0.65 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 3.0);
            gl_FragColor = vec4(0.45, 0.65, 1.0, 1.0) * intensity;
          }
        `,
        blending: THREE.AdditiveBlending,
        side: THREE.BackSide,
        transparent: true
      })
    );
    earthGroup.add(atmosphere);

    // ── Lighting (shared by moon + Earth, same sun direction) ───────
    scene.add(new THREE.AmbientLight(0x888880, 0.35));
    const sun = new THREE.DirectionalLight(0xfff8f0, 1.1);
    sun.position.set(4, 1.5, 3);
    scene.add(sun);

    // ── Continuous slow auto-rotation ───────────────────────────
    const FPS = 23, FRAME_MS = 1000 / FPS;
    const MOON_SPIN = 0.0005, EARTH_SPIN = 0.0016, CLOUD_SPIN = 0.0022;
    let lastFrame = 0, rafId = null;

    function tick(now){
      rafId = requestAnimationFrame(tick);
      if (now - lastFrame < FRAME_MS) return;
      lastFrame = now;
      moon.rotation.y += MOON_SPIN;
      earth.rotation.y += EARTH_SPIN;
      clouds.rotation.y += CLOUD_SPIN;
      renderer.render(scene, cam);
    }
    rafId = requestAnimationFrame(tick);

    // Keep canvas crisp on resize
    window.addEventListener('resize', () => {
      const newSZ = getSize();
      if (newSZ === SZ || newSZ <= 0) return;
      SZ = newSZ;
      cvs.width = SZ * DPR;
      cvs.height = SZ * DPR;
      renderer.setSize(SZ * DPR, SZ * DPR, false);
    });

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) { if (rafId) cancelAnimationFrame(rafId); rafId = null; }
      else if (!rafId) { lastFrame = 0; rafId = requestAnimationFrame(tick); }
    });
  })();
  </script>
